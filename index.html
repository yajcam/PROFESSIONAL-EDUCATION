ctivities for community betterment.", "D": "Yes, if given other assignments, justice demands proper compensation."}, "answer": "C", "rationale": "The Code of Ethics expects teachers to provide leadership and initiative for community development beyond classroom teaching ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 64, "question": "To what is the Tyler Model of curriculum evaluation focused on?", "options": {"A": "Assessment results", "B": "Responsiveness of students", "C": "Instructional effectiveness", "D": "Curriculum objectives"}, "answer": "D", "rationale": "Tyler's model evaluates curriculum based on whether stated objectives were achieved ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 65, "question": "Which approach was used in teaching Science and Math before the K-12 Curriculum Reform?", "options": {"A": "Constructivist", "B": "Child-centered", "C": "Integrative", "D": "Discipline-based"}, "answer": "D", "rationale": "Pre-K-12 curriculum used discipline-based approach where subjects were taught separately ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 66, "question": "What kind of teaching-learning approach is adopted in teaching the same major subjects (English, Math, Science) in the K-to-12 curriculum?", "options": {"A": "Redundant teaching-learning", "B": "Higher order thinking teaching-learning", "C": "Differentiated teaching-learning", "D": "Spiral teaching-learning"}, "answer": "D", "rationale": "K-12 uses spiral progression—same topics revisited with increasing complexity across grade levels ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 67, "question": "As every teacher is a curricularist, what is the teacher's role in teaching along the curricular program of schools?", "options": {"A": "As evaluator", "B": "As implementer", "C": "As writer", "D": "As knower"}, "answer": "B", "rationale": "The teacher primarily implements the curriculum in the classroom ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 68, "question": "With PPST as guide, an ideal learning environment should have the following characteristic, EXCEPT:", "options": {"A": "The learning environment promotes fairness", "B": "Build many professional linkages", "C": "Establishes and maintains consistent standards of learner's behavior", "D": "Is safe and conducive for learning"}, "answer": "B", "rationale": "While professional linkages are important, they are not a direct characteristic of the learning environment itself ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 69, "question": "According to RA 10533 (Enhanced Basic Education Act of 2013), which language is the medium of instruction from K to 3?", "options": {"A": "Mother Tongue of the learners", "B": "The language chosen by parents", "C": "The language chosen by the school", "D": "English as official language"}, "answer": "A", "rationale": "RA 10533 mandates Mother Tongue-Based Multilingual Education (MTB-MLE) from Kindergarten to Grade 3 ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 70, "question": "Which of the following activities can guide student low-performance to achieve learning outcomes?", "options": {"A": "Lecturing", "B": "Mentoring", "C": "Demonstrating", "D": "Testing"}, "answer": "B", "rationale": "Mentoring provides personalized guidance and support for struggling students ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 71, "question": "Which of the following follows the principle of involving more senses for effective teaching-learning?", "options": {"A": "Rubrics assessment", "B": "Lecture lesson delivery", "C": "Multi-media presentation", "D": "Demonstration of skills"}, "answer": "C", "rationale": "Multi-media presentation engages multiple senses (visual, auditory), enhancing learning retention ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 72, "question": "What is a concrete instance of flexible learning?", "options": {"A": "Basic Education Curriculum initiative", "B": "Early childhood education program", "C": "Online learning during a pandemic", "D": "K-to-12 education approach"}, "answer": "C", "rationale": "Flexible learning adapts to learner needs and contexts—online learning during a pandemic is a clear example ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 73, "question": "Who is the prime mover of the educational wheel in the teaching-learning process?", "options": {"A": "Teacher", "B": "Learner", "C": "Parent", "D": "Community"}, "answer": "B", "rationale": "The learner is central—all educational efforts revolve around the learner's development ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 74, "question": "The promulgation of the Code of Ethics for Professional Teachers under Resolution 435 of the PRC expressly covers teachers in all educational institutions at the following levels, and implicitly at the:", "options": {"A": "Preschool and primary", "B": "Secondary", "C": "Elementary", "D": "Tertiary level"}, "answer": "D", "rationale": "While the Code explicitly covers basic education, it implicitly applies to tertiary level teachers as professionals ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 75, "question": "Why are routines helpful for class management?", "options": {"A": "To eliminate stress", "B": "To ensure order", "C": "To punish offenders", "D": "To reward performers"}, "answer": "B", "rationale": "Routines establish predictable patterns that maintain classroom order and efficiency ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 76, "question": "A branch of Psychology that studies how people grow and change throughout their lives is _______________.", "options": {"A": "Social psychology", "B": "Biological Psychology", "C": "Developmental Psychology", "D": "Behavioral Psychology"}, "answer": "C", "rationale": "Developmental Psychology specifically focuses on human growth and changes across the lifespan, from conception to death ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 77, "question": "The term for the developing organism from 2 weeks to 8 weeks of conception is:", "options": {"A": "Zygote", "B": "Fetus", "C": "Embryo", "D": "Chromosomes"}, "answer": "C", "rationale": "The embryonic period spans from 2 to 8 weeks after conception, during which major organs and body systems begin to form ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 78, "question": "A developmental issue concerned with whether an individual is a product of his/her genes or of his/her culture is called:", "options": {"A": "Prenatal and postnatal", "B": "Nature and nurture", "C": "Continuity and stage", "D": "Stability and change"}, "answer": "B", "rationale": "The nature-nurture debate examines whether genetics (nature) or environment/culture (nurture) primarily shapes human development ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 79, "question": "Which principle is NOT TRUE about development?", "options": {"A": "Development is a function of nature and nurture", "B": "Development occurs at different rates", "C": "Development occurs in a predictable manner", "D": "Development occurs in an unpredictable manner"}, "answer": "D", "rationale": "Development follows predictable patterns and sequences, though individual rates may vary ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 80, "question": "During a counseling session, the student expressed distress in getting low scores because she feels that she has been doing her part in studying but still finds it hard to memorize for exams. What factor may have contributed to this?", "options": {"A": "Environment", "B": "Study habits", "C": "Heredity", "D": "None of the above"}, "answer": "C", "rationale": "Difficulty in memorization despite effort may be influenced by hereditary factors affecting cognitive processing and memory capacity ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 81, "question": "In which way does heredity affect the development of the learner?", "options": {"A": "By providing equal potential to all", "B": "By placing limits beyond which the learner cannot develop", "C": "By compensating for what environment fails to develop", "D": "By making acquired traits hereditary"}, "answer": "B", "rationale": "Heredity sets biological limits or ranges within which development can occur, though environment determines where within that range an individual falls ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 82, "question": "It is the brain's ability to change from experience:", "options": {"A": "Learning", "B": "Growth", "C": "Tabula rasa", "D": "Plasticity"}, "answer": "D", "rationale": "Neuroplasticity refers to the brain's capacity to reorganize and form new neural connections in response to learning and experience ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 83, "question": "It refers to an individual's bodily change in size and structure:", "options": {"A": "Maturation", "B": "Learning", "C": "Growth", "D": "Development"}, "answer": "C", "rationale": "Growth specifically refers to quantitative physical changes in size, height, weight, and bodily structure ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 84, "question": "Developmental changes due to aging is called:", "options": {"A": "Maturation", "B": "Learning", "C": "Growth", "D": "Development"}, "answer": "A", "rationale": "Maturation refers to the natural unfolding of biological changes programmed by genetics, independent of learning or experience ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 85, "question": "The degradation of synapses and dying off of neurons that are not strengthened by experience is called:", "options": {"A": "Retardation", "B": "Pruning", "C": "Forgetting", "D": "Aging"}, "answer": "B", "rationale": "Synaptic pruning eliminates unused neural connections to increase efficiency of frequently used pathways ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 86, "question": "Studies in the area of neurosciences disclosed that the human brain has limitless capacity. What does this imply?", "options": {"A": "Pupils can possibly reach a point where they have learned everything", "B": "Every child is a potential genius", "C": "Some pupils are admittedly not capable of learning", "D": "Every pupil has his own native ability and his learning is limited to this native ability"}, "answer": "B", "rationale": "The brain's neuroplasticity and limitless capacity suggest all children have high learning potential when properly stimulated ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 87, "question": "Which statement on IQ and EQ is correct?", "options": {"A": "EQ has greater contribution to performance than IQ", "B": "It is the blending of both IQ and EQ that can make a difference in performance", "C": "The contribution of IQ and EQ to performance is dependent on factors like age and gender", "D": "IQ has a greater contribution to performance than EQ"}, "answer": "B", "rationale": "Research shows both cognitive and emotional intelligence work together to predict success and performance outcomes ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 88, "question": "It was noticed by the mother that her 6-month-old child no longer cries when left in the room. What was developed by the child?", "options": {"A": "A feeling of trust", "B": "Independence", "C": "Object permanence", "D": "Initiative"}, "answer": "C", "rationale": "Object permanence—understanding that objects/people continue to exist when out of sight—develops around 6-8 months, reducing separation anxiety ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 89, "question": "During the first day of school, crying children are a common sight especially in the pre-school department. What explains this?", "options": {"A": "Object permanence", "B": "Stranger shyness", "C": "Separation anxiety", "D": "Egocentrism"}, "answer": "B", "rationale": "Stranger anxiety/shyness is a normal developmental phase where children show distress around unfamiliar people ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 90, "question": "UNESCO's four pillars of learning include all EXCEPT:", "options": {"A": "Learning to know", "B": "Learning to do", "C": "Learning to compete", "D": "Learning to be"}, "answer": "C", "rationale": "UNESCO's four pillars are: Learning to Know, Learning to Do, Learning to Live Together, and Learning to Be—not competition ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 91, "question": "According to Jacques Delors, the highest pillar of learning that involves changing oneself and achieving sustainability is:", "options": {"A": "Learning to know", "B": "Learning to do", "C": "Learning to be", "D": "Learning to transform"}, "answer": "D", "rationale": "Learning to Transform is the highest pillar, focusing on changing oneself and achieving sustainability ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 92, "question": "Morality is defined as the study of:", "options": {"A": "Human behavior", "B": "Right and wrong", "C": "Social norms", "D": "Cultural practices"}, "answer": "B", "rationale": "Morality is the study of right and wrong, focusing on principles of conduct ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 93, "question": "A conscience that is hypocritical—where one does not practice what they preach—is called:", "options": {"A": "Erroneous conscience", "B": "Pharisaical conscience", "C": "Scrupulous conscience", "D": "Lax conscience"}, "answer": "B", "rationale": "Pharisaical conscience refers to hypocrisy—saying one thing but doing another, not practicing what is preached ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 94, "question": "A teacher who feels guilty and anxious, always thinking they did something wrong, has what type of conscience?", "options": {"A": "Doubtful conscience", "B": "Scrupulous conscience", "C": "Lax conscience", "D": "Callous conscience"}, "answer": "B", "rationale": "Scrupulous conscience involves excessive guilt and anxiety, constantly feeling that one has done something wrong ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 95, "question": "A conscience that denies wrongdoing, makes excuses, and rationalizes behavior is called:", "options": {"A": "Erroneous conscience", "B": "Scrupulous conscience", "C": "Lax conscience", "D": "Callous conscience"}, "answer": "C", "rationale": "Lax conscience denies wrongdoing, makes excuses, and rationalizes behavior to avoid guilt ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 96, "question": "Good moral character includes being fully human, loving, virtuous, and:", "options": {"A": "Wealthy", "B": "Morally mature", "C": "Popular", "D": "Powerful"}, "answer": "B", "rationale": "Good moral character includes being fully human, a loving person, virtuous, and morally mature ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Ra // ── Audio (Web Audio API – no external files) ─────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;

function getACtx() {
  if (!actx) actx = new AudioCtx();
  return actx;
}

function playCorrect() {
  try {
    const ctx = getACtx();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, now);      // C5
    osc.frequency.setValueAtTime(659, now + .1); // E5
    osc.frequency.setValueAtTime(784, now + .2); // G5
    gain.gain.setValueAtTime(.35, now);
    gain.gain.exponentialRampToValueAtTime(.001, now + .5);
    osc.start(now); osc.stop(now + .5);
  } catch(e) {}
}

function playWrong() {
  try {
    const ctx = getACtx();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.setValueAtTime(200, now + .15);
    gain.gain.setValueAtTime(.3, now);
    gain.gain.exponentialRampToValueAtTime(.001, now + .4);
    osc.start(now); osc.stop(now + .4);
  } catch(e) {}
}

// ── State ─────────────────────────────────────────────────────────────────
let answered = {};   // key = "setLetter-num" → true
let scoreCorrect = 0;
let scoreTotal = 0;

// ── Render ────────────────────────────────────────────────────────────────
const container = document.getElementById('quizContainer');
const noResults  = document.getElementById('noResults');

function getSetLetter(setStr) {
  const m = setStr.match(/SET ([A-E]):/);
  return m ? m[1] : '?';
}

function renderQuestions(questions) {
  container.innerHTML = '';
  noResults.style.display = 'none';

  if (!questions.length) {
    noResults.style.display = 'block';
    return;
  }

  let lastSet = null;

  questions.forEach(q => {
    const sl = getSetLetter(q.set);
    const key = sl + '-' + q.num;

    // Set banner
    if (q.set !== lastSet) {
      const banner = document.createElement('div');
      banner.className = 'set-banner';
      banner.textContent = q.set;
      container.appendChild(banner);
      lastSet = q.set;
    }

    // Card
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'card-' + key;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'q-header';

    const numBadge = document.createElement('span');
    numBadge.className = 'q-num';
    numBadge.textContent = 'Set ' + sl + ' · Q' + q.num;

    const qtxt = document.createElement('div');
    qtxt.className = 'q-text';
    qtxt.textContent = q.question;

    hdr.appendChild(numBadge);
    hdr.appendChild(qtxt);
    card.appendChild(hdr);

    // Options
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';

    ['A','B','C','D'].forEach(letter => {
      if (!q.options[letter]) return;

      const opt = document.createElement('div');
      opt.className = 'option';
      opt.dataset.letter = letter;
      opt.dataset.key = key;

      const lspan = document.createElement('span');
      lspan.className = 'opt-letter';
      lspan.textContent = letter + '.';

      const tspan = document.createElement('span');
      tspan.textContent = q.options[letter];

      opt.appendChild(lspan);
      opt.appendChild(tspan);
      optsDiv.appendChild(opt);

      // Restore state if already answered
      if (answered[key]) {
        restoreOptionState(opt, letter, q.answer);
      }

      // Double-click handler
      opt.addEventListener('dblclick', () => {
        if (answered[key]) return;
        answered[key] = true;
        scoreTotal++;

        const isCorrect = (letter === q.answer);
        if (isCorrect) {
          scoreCorrect++;
          opt.classList.add('correct');
          playCorrect();
        } else {
          opt.classList.add('wrong');
          playWrong();
        }

        // Reveal correct answer on all options
        optsDiv.querySelectorAll('.option').forEach(o => {
          o.classList.add('disabled');
          if (o.dataset.letter === q.answer && !isCorrect) {
            o.classList.add('reveal-correct');
          }
        });

        // Show explanation
        document.getElementById('exp-' + key).classList.add('show');

        updateScore();
      });
    });

    card.appendChild(optsDiv);

    // Hint
    const hint = document.createElement('div');
    hint.className = 'dbl-hint';
    hint.textContent = '💡 Double-click an option to answer';
    if (answered[key]) hint.style.display = 'none';
    card.appendChild(hint);

    // Explanation
    const exp = document.createElement('div');
    exp.className = 'explanation' + (answered[key] ? ' show' : '');
    exp.id = 'exp-' + key;
    exp.innerHTML = '<strong>✅ Correct Answer: ' + q.answer + ' &nbsp;|&nbsp; Rationale</strong>' + escapeHtml(q.rationale);
    card.appendChild(exp);

    container.appendChild(card);
  });
}

function restoreOptionState(opt, letter, correctAnswer) {
  opt.classList.add('disabled');
  if (letter === correctAnswer) {
    opt.classList.add('reveal-correct');
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateScore() {
  document.getElementById('scoreCorrect').textContent = scoreCorrect;
  document.getElementById('scoreTotal').textContent   = scoreTotal;
}

// ── Filter / Search ───────────────────────────────────────────────────────
function getFiltered() {
  const set    = document.getElementById('setSelect').value;
  const search = document.getElementById('searchBox').value.trim().toLowerCase();

  return ALL_QUESTIONS.filter(q => {
    const sl = getSetLetter(q.set);
    if (set !== 'all' && sl !== set) return false;
    if (search) {
      const haystack = (q.question + ' ' + Object.values(q.options).join(' ')).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
}

document.getElementById('setSelect').addEventListener('change', () => renderQuestions(getFiltered()));
document.getElementById('searchBox').addEventListener('input',  () => renderQuestions(getFiltered()));

// ── Reset ─────────────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('Reset all progress and scores?')) return;
  answered = {};
  scoreCorrect = 0;
  scoreTotal   = 0;
  updateScore();
  renderQuestions(getFiltered());
});

// ── Scroll to top ─────────────────────────────────────────────────────────
const topBtn = document.getElementById('topBtn');
window.addEventListener('scroll', () => {
  topBtn.style.display = window.scrollY > 400 ? 'block' : 'none';
});
topBtn.addEventListener('click', () => window.scrollTo({ top:0, behavior:'smooth' }));

// ── Init ──────────────────────────────────────────────────────────────────
renderQuestions(getFiltered());
</script>
</body>
</html>
