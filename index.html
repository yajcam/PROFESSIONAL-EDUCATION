": "B", "rationale": "Human relations leadership emphasizes relationships, morale, communication, and involving teachers in decisions."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 54, "question": "A \"transactional\" leader primarily uses:", "options": {"A": "Vision and inspiration", "B": "Rewards and punishments based on performance", "C": "Participatory democracy", "D": "Laissez-faire approach"}, "answer": "B", "rationale": "Transactional leadership focuses on exchanges (rewards for compliance, consequences for non-compliance)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 55, "question": "A \"transformational\" leader is characterized by:", "options": {"A": "Maintaining the status quo", "B": "Inspiring followers toward a shared vision", "C": "Micromanaging all tasks", "D": "Avoiding change"}, "answer": "B", "rationale": "Transformational leadership inspires and motivates followers to transcend self-interest for the collective vision."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 56, "question": "The \"Fiedler Contingency Model\" suggests that leadership effectiveness depends on:", "options": {"A": "Only the leader's personality", "B": "The match between leadership style and situational control", "C": "Only the followers' skills", "D": "Random chance"}, "answer": "B", "rationale": "Fiedler's model posits that leadership effectiveness depends on aligning leadership style with situational favorability."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 57, "question": "\"Span of control\" in school administration refers to:", "options": {"A": "The number of students per class", "B": "The number of subordinates directly managed by one supervisor", "C": "The length of the school day", "D": "The budget allocation"}, "answer": "B", "rationale": "Span of control is the number of subordinates a manager/supervisor can effectively oversee."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 58, "question": "The \"unity of command\" principle means:", "options": {"A": "Employees report to multiple supervisors", "B": "Each employee reports to only one supervisor", "C": "There is only one department", "D": "All decisions are made by one person"}, "answer": "B", "rationale": "Unity of command dictates that each subordinate should have only one direct supervisor to avoid conflicting orders."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 59, "question": "In the context of school budgeting, \"MOOE\" stands for:", "options": {"A": "Maintenance and Other Operating Expenses", "B": "Major Office Operating Expenditures", "C": "Municipal Office of Educational Expenses", "D": "Management of Official Educational Evaluation"}, "answer": "A", "rationale": "MOOE includes funds for school maintenance, utilities, supplies, and co-curricular activities."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 60, "question": "Which of the following is NOT typically considered a \"liquid asset\" of a school?", "options": {"A": "Cash", "B": "School building", "C": "Bank deposits", "D": "Accounts receivable"}, "answer": "B", "rationale": "A school building is a fixed (non-liquid) asset that cannot be quickly converted to cash."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 61, "question": "The \"Project MOOE\" in the Department of Education is a:", "options": {"A": "Teacher training program", "B": "Computerization program", "C": "School-based management initiative giving schools direct control of funds", "D": "Scholarship program"}, "answer": "C", "rationale": "Project MOOE transfers maintenance and operating funds directly to schools to empower SBM (School-Based Management)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 62, "question": "In educational planning, \"situational analysis\" involves:", "options": {"A": "Ignoring the current context", "B": "Analyzing the internal and external environment before planning", "C": "Jumping directly to solutions", "D": "Copying another school's plan"}, "answer": "B", "rationale": "Situational analysis (SWOT analysis) examines strengths, weaknesses, opportunities, and threats before planning."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 63, "question": "A \"curriculum audit\" in school administration is done to:", "options": {"A": "Punish teachers", "B": "Evaluate the alignment between curriculum, instruction, and assessment", "C": "Reduce student enrollment", "D": "Eliminate non-core subjects"}, "answer": "B", "rationale": "A curriculum audit examines the coherence and alignment of written, taught, and tested curriculum."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 64, "question": "The \"Child Protection Policy\" in Philippine schools (DepEd Order No. 40, s. 2012) prohibits:", "options": {"A": "Extracurricular activities", "B": "Corporal punishment and bullying", "C": "Parent-teacher conferences", "D": "Student organizations"}, "answer": "B", "rationale": "DO 40, s. 2012 explicitly prohibits corporal punishment, child abuse, exploitation, bullying, and discrimination."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 65, "question": "\"Brigada Eskwela\" (National Schools Maintenance Week) is primarily about:", "options": {"A": "Academic competition", "B": "Teacher salary increases", "C": "Community volunteerism to prepare schools for opening", "D": "Student testing"}, "answer": "C", "rationale": "Brigada Eskwela engages stakeholders to clean, repair, and prepare schools before the academic year begins."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 66, "question": "According to DepEd Order No. 8, s. 2015, classroom assessment should be based on:", "options": {"A": "Only quarterly exams", "B": "Content and performance standards", "C": "Only written works", "D": "Teacher's personal preference"}, "answer": "B", "rationale": "DO 8, s. 2015 mandates assessment based on Content Standards (what students should know) and Performance Standards (what they can do)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 67, "question": "The \"Grading System\" in the K-12 curriculum uses which level of proficiency?", "options": {"A": "50% as passing", "B": "60% as passing", "C": "75% as passing", "D": "85% as passing"}, "answer": "C", "rationale": "The K-12 grading system sets 75% as the minimum passing mark for all subjects."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 68, "question": "The \"Multi-Year RRLIP\" in the Department of Education refers to the:", "options": {"A": "Teacher recruitment plan", "B": "Research and Learning Implementation Plan", "C": "Student report card", "D": "Budget allocation form"}, "answer": "B", "rationale": "The RRLIP (Research and Learning Implementation Plan) is a multi-year research and development plan for DepEd."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 69, "question": "\"Technical Assistance\" (TA) provided by DepEd supervisors to teachers primarily involves:", "options": {"A": "Punishing poor teachers", "B": "Providing support, coaching, and mentoring", "C": "Increasing paperwork", "D": "Reducing teacher benefits"}, "answer": "B", "rationale": "Technical Assistance is developmental support to improve teacher competence, not punitive action."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 70, "question": "The \"School Improvement Plan\" (SIP) is a document that covers how many years?", "options": {"A": "1 year", "B": "3 years", "C": "5 years", "D": "10 years"}, "answer": "B", "rationale": "The SIP is typically a three-year rolling plan that guides school development priorities."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 71, "question": "In the School Improvement Plan, the \"AIP\" stands for:", "options": {"A": "Annual Implementation Plan", "B": "Academic Instruction Program", "C": "Administrative Incentive Package", "D": "Assessment of Internal Processes"}, "answer": "A", "rationale": "The AIP is the one-year operational plan derived from the three-year SIP."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 72, "question": "Which of the following is NOT a stage in the Appreciative Inquiry (AI) model used in some school planning?", "options": {"A": "Discovery", "B": "Dream", "C": "Design", "D": "Criticism"}, "answer": "D", "rationale": "The 4-D Cycle of Appreciative Inquiry is Discovery, Dream, Design, and Destiny (or Delivery) – not Criticism."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 73, "question": "The \"Literacy Training Service\" (LTS) is a component of:", "options": {"A": "Senior High School curriculum", "B": "The National Service Training Program (NSTP)", "C": "The Alternative Learning System", "D": "The Special Education program"}, "answer": "B", "rationale": "LTS is one of three NSTP components (with CWTS and ROTC) focusing on teaching literacy and numeracy skills."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 74, "question": "RA 9163 established the:", "options": {"A": "K-12 program", "B": "National Service Training Program (NSTP)", "C": "Professional Regulation Commission", "D": "Commission on Higher Education"}, "answer": "B", "rationale": "RA 9163 (NSTP Act of 2001) established mandatory NSTP for all tertiary students."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 75, "question": "The \"Civic Welfare Training Service\" (CWTS) under NSTP focuses on:", "options": {"A": "Military training", "B": "Community service and welfare", "C": "Literacy training", "D": "Sports competition"}, "answer": "B", "rationale": "CWTS involves community engagement projects like health, environment, and livelihood programs."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 76, "question": "The \"Reserve Officers' Training Corps\" (ROTC) became optional for all students under:", "options": {"A": "RA 7077", "B": "RA 9163", "C": "RA 7722", "D": "RA 10533"}, "answer": "B", "rationale": "RA 9163 (NSTP Act) made ROTC optional and one of three components students can choose from."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 77, "question": "The \"Drug Education Program\" in schools is mandated by:", "options": {"A": "RA 6425", "B": "RA 9165 (Comprehensive Dangerous Drugs Act)", "C": "RA 7877", "D": "RA 9262"}, "answer": "B", "rationale": "RA 9165 (Dangerous Drugs Act) mandates drug education and prevention programs in all schools."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 78, "question": "RA 7877, also known as the \"Anti-Sexual Harassment Act,\" applies to:", "options": {"A": "Workplaces only", "B": "Workplaces and educational institutions", "C": "Homes only", "D": "Public spaces only"}, "answer": "B", "rationale": "RA 7877 applies to work, education, and training environments, prohibiting sexual harassment by superiors or persons with authority."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 79, "question": "RA 9262 (Anti-Violence Against Women and Children Act) requires schools to:", "options": {"A": "Ignore reports of abuse", "B": "Report suspected cases and conduct awareness programs", "C": "Punish victims", "D": "Dismiss all female students"}, "answer": "B", "rationale": "Schools are mandated to report suspected VAWC cases and integrate VAWC awareness into their curriculum."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 80, "question": "\"Special Protection of Children Against Abuse, Exploitation and Discrimination Act\" is also known as:", "options": {"A": "RA 7610", "B": "RA 7877", "C": "RA 9165", "D": "RA 9344"}, "answer": "A", "rationale": "RA 7610 provides special protection to children from all forms of abuse, neglect, cruelty, exploitation, and discrimination."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 81, "question": "The \"Juvenile Justice and Welfare Act\" (RA 9344) establishes the minimum age of criminal responsibility at:", "options": {"A": "9 years old", "B": "12 years old", "C": "15 years old", "D": "18 years old"}, "answer": "C", "rationale": "RA 9344 set the minimum age of criminal responsibility at 15 years (amended by RA 10630)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 82, "question": "Under RA 9710 (Magna Carta of Women), educational institutions must:", "options": {"A": "Exclude women from certain courses", "B": "Integrate gender and development (GAD) in curriculum", "C": "Separate male and female students", "D": "Hire only female teachers"}, "answer": "B", "rationale": "RA 9710 requires gender-sensitive curriculum and GAD integration in all educational levels."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 83, "question": "\"Inclusive education\" under DepEd policies aims to:", "options": {"A": "Exclude students with disabilities", "B": "Include all learners regardless of diversity in regular classes", "C": "Create separate schools for each group", "D": "Reduce the number of students"}, "answer": "B", "rationale": "Inclusive education ensures all learners (including those with disabilities, indigenous, and marginalized) learn together in regular classrooms."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 84, "question": "The \"Indigenous Peoples Education\" (IPEd) curriculum framework is designed to:", "options": {"A": "Replace indigenous culture with mainstream culture", "B": "Be culturally responsive and community-based", "C": "Eliminate indigenous languages", "D": "Segregate IP learners"}, "answer": "B", "rationale": "The IPEd framework respects indigenous knowledge systems, practices, and languages in the curriculum."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 85, "question": "\"Mother Tongue-Based Multilingual Education\" (MTB-MLE) is implemented from:", "options": {"A": "Kindergarten to Grade 3", "B": "Grades 4 to 6", "C": "Junior High School only", "D": "Senior High School only"}, "answer": "A", "rationale": "MTB-MLE uses the learner's mother tongue as medium of instruction from Kindergarten to Grade 3."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 86, "question": "Under MTB-MLE, the designated \"bridge language\" after Grade 3 is:", "options": {"A": "Filipino and English", "B": "Spanish", "C": "Japanese", "D": "Arabic"}, "answer": "A", "rationale": "After Grade 3, Filipino and English are gradually introduced as additional languages of instruction."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 87, "question": "The \"Philippine Qualifications Framework\" (PQF) describes the:", "options": {"A": "Curriculum for elementary", "B": "Levels of educational qualifications and their standards", "C": "Salary grade of teachers", "D": "School building requirements"}, "answer": "B", "rationale": "The PQF is a national standards framework defining the levels and outcomes of qualifications in basic, technical, and higher education."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 88, "question": "\"ASEAN Integration\" in education aims to:", "options": {"A": "Isolate Philippine education", "B": "Harmonize educational standards and mutual recognition of qualifications", "C": "Eliminate all local languages", "D": "Copy Western education"}, "answer": "B", "rationale": "ASEAN Integration promotes comparability and mutual recognition of educational qualifications among member states."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 89, "question": "The \"ASEAN Teachers' Competency Framework\" includes all EXCEPT:", "options": {"A": "Knowing the curriculum", "B": "Mastering the subject matter", "C": "Winning international competitions", "D": "Engaging the community"}, "answer": "C", "rationale": "Winning competitions is not part of the ASEAN competency framework; it focuses on professional knowledge, practice, and engagement."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 90, "question": "A \"learning management system\" (LMS) like Google Classroom is an example of:", "options": {"A": "Traditional chalkboard", "B": "Educational technology for course delivery and management", "C": "Student evaluation tool only", "D": "Physical textbook"}, "answer": "B", "rationale": "An LMS is software that delivers, tracks, and manages educational courses and content."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 91, "question": "\"Flipped Classroom\" is a pedagogical approach where:", "options": {"A": "Students never do homework", "B": "Students learn content at home and practice in class", "C": "Teachers lecture the entire period", "D": "No technology is used"}, "answer": "B", "rationale": "Flipped classroom reverses traditional instruction: content is learned at home (videos) and application is done in class."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 92, "question": "\"Gamification\" in education involves:", "options": {"A": "Playing games without learning goals", "B": "Applying game design elements to learning activities", "C": "Eliminating all assessments", "D": "Replacing teachers with computers"}, "answer": "B", "rationale": "Gamification uses elements like points, badges, levels, and leaderboards to engage students in learning."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 93, "question": "\"Blended learning\" combines:", "options": {"A": "Two different subjects only", "B": "Face-to-face instruction and online learning", "C": "Morning and afternoon sessions", "D": "Lecture and recitation only"}, "answer": "B", "rationale": "Blended learning integrates traditional classroom methods with digital/online activities."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 94, "question": "\"Synchronous learning\" refers to instruction that happens:", "options": {"A": "At different times for each student", "B": "In real-time with live interaction", "C": "Without any teacher", "D": "Only through printed modules"}, "answer": "B", "rationale": "Synchronous learning occurs simultaneously with real-time interaction (live video, chat, or in-person)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 95, "question": "\"Asynchronous learning\" refers to instruction that:", "options": {"A": "Requires all students to meet at the same time", "B": "Allows students to access materials at different times", "C": "Is always teacher-led", "D": "Cannot use technology"}, "answer": "B", "rationale": "Asynchronous learning provides flexibility—students access materials and complete work on their own schedule."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 96, "question": "The \"Digital Divide\" in education refers to:", "options": {"A": "Gap between students who have access to technology/internet and those who do not", "B": "Gap between math and reading scores", "C": "Difference between public and private school salaries", "D": "Difference between urban and rural school buildings"}, "answer": "A", "rationale": "The digital divide refers to unequal access to technology and internet connectivity, affecting learning opportunities."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 97, "question": "\"Cyberbullying\" in schools is addressed under which DepEd order?", "options": {"A": "DO 40, s. 2012 (Child Protection Policy)", "B": "DO 8, s. 2015 (Assessment Guidelines)", "C": "DO 36, s. 2016 (Employee Discipline)", "D": "DO 55, s. 2013 (Vacation Leave)"}, "answer": "A", "rationale": "DO 40, s. 2012 explicitly includes cyberbullying (online bullying) as a prohibited act under the Child Protection Policy."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 98, "question": "RA 11313, also known as the \"Safe Spaces Act\" (Bawal Bastos Law), penalizes:", "options": {"A": "Only physical assault", "B": "Gender-based sexual harassment in public spaces, online, and workplaces", "C": "Only verbal abuse", "D": "Only online crimes"}, "answer": "B", "rationale": "RA 11313 covers gender-based sexual harassment in streets, public spaces, online, workplaces, and educational institutions."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 99, "question": "\"Wash in Schools\" (WinS) program of DepEd promotes:", "options": {"A": "Washing of school uniforms only", "B": "Water, sanitation, and hygiene practices", "C": "Washing money for the school", "D": "Washing hands only before eating"}, "answer": "B", "rationale": "WinS promotes access to water, sanitation facilities (toilets), and hygiene education (handwashing)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 100, "question": "The \"School Dental Health Program\" is mandated to:", "options": {"A": "Extract all teeth", "B": "Provide oral health services and education", "C": "Ignore dental problems", "D": "Only give toothbrushes"}, "answer": "B", "rationale": "The program includes toothbrushing drills, dental check-ups, oral health education, and treatment."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 101, "question": "\"School-Based Feeding Program\" (SBFP) targets:", "options": {"A": "All students regardless of nutritional status", "B": "Severely wasted and wasted students", "C": "Only obese students", "D": "Only honor students"}, "answer": "B", "rationale": "SBFP provides nutritious food to address malnutrition among severely wasted and wasted learners."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 102, "question": "The \"National Drug Education Program\" (NDEP) in schools includes:", "options": {"A": "Teaching students how to use drugs safely", "B": "Prevention, intervention, and rehabilitation education", "C": "Ignoring drug issues", "D": "Punishing all students"}, "answer": "B", "rationale": "NDEP has three components: prevention, intervention (counseling), and rehabilitation/referral."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 103, "question": "\"Comprehensive Sexuality Education\" (CSE) in DepEd focuses on:", "options": {"A": "Encouraging early pregnancy", "B": "Age-appropriate information on reproductive health and rights", "C": "Abstinence-only without information", "D": "Excluding boys from the program"}, "answer": "B", "rationale": "CSE provides accurate, age-appropriate information on puberty, reproductive health, consent, and prevention of early pregnancy and STIs."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 104, "question": "The \"Girls Education Program\" of DepEd aims to:", "options": {"A": "Exclude boys from school", "B": "Address barriers to girls' education and promote gender equality", "C": "Lower standards for girls", "D": "Segregate girls in separate schools"}, "answer": "B", "rationale": "The program addresses issues like child marriage, teenage pregnancy, and lack of sanitary pads to keep girls in school."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 105, "question": "The \"Abot-Alam\" program is DepEd's initiative for:", "options": {"A": "Advanced placement", "B": "Out-of-school youth re-enrollment and completion of basic education", "C": "Teacher salary increase", "D": "School building construction"}, "answer": "B", "rationale": "Abot-Alam is a convergence program for OSY and adults to complete basic education through ALS or formal school."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 106, "question": "\"Adopt-a-School Program\" (ASP) under RA 8525 allows:", "options": {"A": "Private companies to take over public schools", "B": "Private entities to contribute resources to public schools", "C": "Selling of school properties", "D": "Charging tuition in public schools"}, "answer": "B", "rationale": "ASP encourages private sector partnership through donations, services, and resources to public schools."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 107, "question": "The \"Government Assistance to Students and Teachers in Private Education\" (GASTPE) is implemented by:", "options": {"A": "DepEd", "B": "CHED", "C": "TESDA", "D": "DSWD"}, "answer": "A", "rationale": "GASTPE provides subsidies to students in private schools (e.g., ESC, QVR, and SHS Voucher Program)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 108, "question": "The \"Senior High School Voucher Program\" provides financial assistance to:", "options": {"A": "All SHS students regardless of school", "B": "Grade 10 completers who opt to enroll in private or non-DepEd public SHS", "C": "Only public school teachers", "D": "Only college students"}, "answer": "B", "rationale": "The voucher program subsidizes tuition for Grade 10 completers choosing private or non-DepEd SHS."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 109, "question": "\"Last Mile Schools\" are DepEd priority schools that are:", "options": {"A": "The highest performing schools", "B": "Geographically isolated, disadvantaged, with low resources", "C": "The newest schools in Metro Manila", "D": "Science high schools"}, "answer": "B", "rationale": "Last Mile Schools are the farthest, most disadvantaged schools needing targeted resources and support."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 110, "question": "The \"Rapid Assessment of Learning Outcomes\" (RALO) is a tool used by DepEd to:", "options": {"A": "Assess teacher performance", "B": "Quickly measure learning loss and recovery needs", "C": "Evaluate school buildings", "D": "Assess principal competence"}, "answer": "B", "rationale": "RALO identifies learning gaps and recovery needs, especially after disruptions like the pandemic."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 111, "question": "The \"Philippine Informal Reading Inventory\" (Phil-IRI) assesses:", "options": {"A": "Math skills", "B": "Reading comprehension and reading levels", "C": "Writing skills only", "D": "Science literacy"}, "answer": "B", "rationale": "Phil-IRI determines students' reading levels (frustration, instructional, independent) to guide reading intervention."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 112, "question": "\"EGRA\" (Early Grade Reading Assessment) is an international tool used in the Philippines to assess:", "options": {"A": "High school math", "B": "Early literacy skills (Grades 1-3)", "C": "College entrance", "D": "Teacher competence"}, "answer": "B", "rationale": "EGRA measures foundational reading skills (letter sounds, phonemic awareness, fluency, comprehension) in early grades."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 113, "question": "\"EGMA\" (Early Grade Mathematics Assessment) measures:", "options": {"A": "Reading comprehension", "B": "Early numeracy skills", "C": "Writing composition", "D": "Science process skills"}, "answer": "B", "rationale": "EGMA assesses foundational math skills like number identification, addition, subtraction, and word problems in early grades."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 114, "question": "The \"Program for International Student Assessment\" (PISA) is conducted by:", "options": {"A": "UNESCO", "B": "OECD (Organisation for Economic Co-operation and Development)", "C": "World Bank", "D": "Asian Development Bank"}, "answer": "B", "rationale": "PISA is an OECD international assessment measuring 15-year-old students' reading, math, and science literacy."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 115, "question": "The \"Trends in International Mathematics and Science Study\" (TIMSS) is conducted by:", "options": {"A": "OECD", "B": "IEA (International Association for the Evaluation of Educational Achievement)", "C": "UNESCO", "D": "World Bank"}, "answer": "B", "rationale": "TIMSS is an IEA international assessment comparing math and science achievement across countries at Grades 4 and 8."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 116, "question": "The Philippines' low performance in PISA 2018 (ranking last in reading) led to which major reform?", "options": {"A": "Elimination of K-12", "B": "The \"Sulong EduKalidad\" program and learning recovery initiatives", "C": "Banning of English instruction", "D": "Return to old curriculum"}, "answer": "B", "rationale": "Sulong EduKalidad was DepEd's response to PISA results, focusing on quality, access, and learning recovery."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 117, "question": "The \"MATATAG Curriculum\" recently introduced by DepEd aims to:", "options": {"A": "Make curriculum more congested", "B": "Decongest and focus on foundational skills", "C": "Remove all subjects except Math and English", "D": "Return to Spanish as medium of instruction"}, "answer": "B", "rationale": "The MATATAG curriculum (2023) decongests the K-12 curriculum, focusing on essential competencies and foundational skills."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 118, "question": "The four critical components of the MATATAG Curriculum are: MAke the curriculum relevant, TAke steps to accelerate, TAke good care of learners, and:", "options": {"A": "Give more tests", "B": "TAke less subjects", "C": "GAin from technology", "D": "TAke international exams"}, "answer": "C", "rationale": "MATATAG stands for: MAke curriculum relevant, TAke steps to accelerate, TAke good care of learners, and GAin from technology."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 119, "question": "The \"National Learning Recovery Program\" (NLRP) of DepEd was a response to:", "options": {"A": "High teacher salaries", "B": "Learning loss due to the COVID-19 pandemic", "C": "Low teacher enrollment", "D": "Overpopulation of schools"}, "answer": "B", "rationale": "NLRP addressed learning loss and gaps resulting from prolonged remote learning during the pandemic."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 120, "question": "\"Catch-up Fridays\" in DepEd are dedicated to which learning areas?", "options": {"A": "Math and Science only", "B": "Reading and Values/Peace Education", "C": "Sports only", "D": "Arts only"}, "answer": "B", "rationale": "Catch-up Fridays focus on reading improvement and values/peace education across all grade levels."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 121, "question": "The \"National Reading Program\" (NRP) is DepEd's flagship program to:", "options": {"A": "Eliminate reading", "B": "Improve reading proficiency and reduce non-readers", "C": "Ban English books", "D": "Focus only on Filipino"}, "answer": "B", "rationale": "NRP aims to address reading difficulties and increase the number of learners at appropriate reading levels."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 122, "question": "The \"National Mathematics Program\" (NMP) focuses on:", "options": {"A": "Removing math from curriculum", "B": "Strengthening foundational numeracy skills", "C": "Only algebra for high school", "D": "Memorizing formulas without application"}, "answer": "B", "rationale": "NMP targets early numeracy and foundational math skills to improve mathematics proficiency."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 123, "question": "The \"National Science and Technology Fair\" (NSTF) is DepEd's platform for:", "options": {"A": "Selling science projects", "B": "Showcasing student research and innovations", "C": "Replacing science teachers", "D": "Eliminating science labs"}, "answer": "B", "rationale": "NSTF is a competition and showcase for student science research, projects, and inventions."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 124, "question": "The \"Palarong Pambansa\" is organized by DepEd to promote:", "options": {"A": "Academic competition only", "B": "Athletics, sports, and physical fitness", "C": "Chess only", "D": "International travel"}, "answer": "B", "rationale": "Palarong Pambansa is the national sports competition for student-athletes from all regions."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 125, "question": "The \"National Festival of Talents\" (NFOT) is DepEd's competition for:", "options": {"A": "Sports", "B": "Arts, culture, and creativity", "C": "Math only", "D": "Science only"}, "answer": "B", "rationale": "NFOT showcases student talents in visual arts, performing arts, music, dance, and cultural presentations."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 126, "question": "The \"Gulayan sa Paaralan\" program promotes:", "options": {"A": "Flower planting only", "B": "Vegetable gardening and food security in schools", "C": "Tree cutting", "D": "Imported fruits only"}, "answer": "B", "rationale": "Gulayan sa Paaralan promotes vegetable gardening to improve nutrition and supplement school feeding programs."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 127, "question": "The \"National Drug Education Program\" (NDEP) coordinator in a school is typically:", "options": {"A": "Any student volunteer", "B": "A trained teacher designated by the principal", "C": "The janitor", "D": "A police officer assigned to school"}, "answer": "B", "rationale": "The NDEP coordinator is a trained teacher responsible for planning and implementing drug education activities."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 128, "question": "\"Youth for Environment in Schools\" (YES) Organization is DepEd's program for:", "options": {"A": "Commercial tree cutting", "B": "Environmental protection and awareness", "C": "Pollution promotion", "D": "Factory construction"}, "answer": "B", "rationale": "YES Organization engages students in environmental projects, tree planting, waste management, and ecological awareness."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 129, "question": "The \"School Governance Council\" (SGC) under DepEd Order 45, s. 2015 is composed of:", "options": {"A": "Only teachers", "B": "School head, teachers, parents, students, and community representatives", "C": "Only parents", "D": "Only students"}, "answer": "B", "rationale": "SGC is a multi-stakeholder body ensuring shared governance and accountability."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 130, "question": "\"Child Find Policy\" (DepEd Order 44, s. 2019) requires schools to:", "options": {"A": "Hide children with disabilities", "B": "Identify, locate, and screen children with disabilities for inclusion", "C": "Exclude children with special needs", "D": "Only serve typical children"}, "answer": "B", "rationale": "Child Find is a mandate to identify children with disabilities and provide appropriate support and placement."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 131, "question": "\"Early Intervention\" for children with developmental delays should ideally begin:", "options": {"A": "Only in elementary school", "B": "As early as possible (0-6 years)", "C": "Only in high school", "D": "Never"}, "answer": "B", "rationale": "Early intervention (birth to 6 years) maximizes developmental outcomes for children with delays or disabilities."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 132, "question": "The \"Individualized Education Plan\" (IEP) for learners with disabilities is developed by:", "options": {"A": "Only the teacher", "B": "A team including teacher, parent, specialist, and learner (when appropriate)", "C": "Only the parent", "D": "Only the principal"}, "answer": "B", "rationale": "The IEP team is multidisciplinary and collaborative, ensuring all perspectives inform the plan."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 133, "question": "Under RA 7277 (Magna Carta for Disabled Persons), educational institutions must provide:", "options": {"A": "No accommodation for disabled persons", "B": "Reasonable accommodation and accessibility", "C": "Separate facilities only", "D": "Lower standards"}, "answer": "B", "rationale": "RA 7277 mandates reasonable accommodation, accessibility, and non-discrimination for persons with disabilities."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 134, "question": "The \"National Council on Disability Affairs\" (NCDA) is the Philippine government agency that:", "options": {"A": "Builds roads", "B": "Formulates policies and coordinates programs for persons with disabilities", "C": "Manages airports", "D": "Controls the stock market"}, "answer": "B", "rationale": "NCDA (formerly NCWDP) is the lead agency for disability-related policies and programs."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 135, "question": "\"Universal Design for Learning\" (UDL) is a framework that:", "options": {"A": "Creates one-size-fits-all curriculum", "B": "Provides multiple means of engagement, representation, and expression", "C": "Excludes students with disabilities", "D": "Eliminates all choices"}, "answer": "B", "rationale": "UDL provides flexible options for how students access information, engage, and demonstrate learning."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 136, "question": "The \"Assistive Technology\" (AT) for students with visual impairments includes:", "options": {"A": "Only wheelchairs", "B": "Screen readers, Braille displays, and magnifiers", "C": "Hearing aids only", "D": "Regular textbooks"}, "answer": "B", "rationale": "AT for visual impairments includes software and devices that provide non-visual access to information."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 137, "question": "The \"Deaf and Hard of Hearing\" learners may use:", "options": {"A": "Only sign language", "B": "Sign language, hearing aids, cochlear implants, and FM systems", "C": "No communication methods", "D": "Only written English"}, "answer": "B", "rationale": "DHH learners use various assistive devices and communication modalities based on individual needs."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 138, "question": "\"Differentiated Instruction\" means:", "options": {"A": "Teaching all students exactly the same way", "B": "Tailoring instruction to meet individual student needs", "C": "Eliminating all group work", "D": "Using only lecture method"}, "answer": "B", "rationale": "Differentiated instruction adjusts content, process, product, or environment based on learner readiness, interest, or learning profile."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 139, "question": "\"Accommodations\" for students with disabilities involve:", "options": {"A": "Lowering academic standards", "B": "Changing how a student accesses learning without changing content", "C": "Removing the student from school", "D": "Giving automatic passing grades"}, "answer": "B", "rationale": "Accommodations provide equal access without altering content or performance standards."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 140, "question": "\"Modifications\" for students with disabilities involve:", "options": {"A": "Same access as accommodations", "B": "Changing what a student learns or expected outcomes", "C": "No changes at all", "D": "Only physical changes to classroom"}, "answer": "B", "rationale": "Modifications alter content, requirements, or performance standards (different from accommodations)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 141, "question": "The \"Least Restrictive Environment\" (LRE) principle mandates that:", "options": {"A": "All students with disabilities must be in separate classes", "B": "Students with disabilities should be educated with non-disabled peers to maximum extent appropriate", "C": "Students with disabilities cannot be in regular classes", "D": "No support should be provided"}, "answer": "B", "rationale": "LRE requires placement in regular classroom with supports before considering more restrictive settings."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 142, "question": "\"Mainstreaming\" refers to:", "options": {"A": "Placing all students with disabilities in special schools", "B": "Placing students with disabilities in regular classes for specific subjects", "C": "Excluding students with disabilities", "D": "No placement options"}, "answer": "B", "rationale": "Mainstreaming places students with disabilities in regular classes for part of the day, usually when they can keep up."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 143, "question": "\"Inclusion\" goes beyond mainstreaming by:", "options": {"A": "Keeping students in separate rooms", "B": "Full-time placement with appropriate supports in regular classroom", "C": "Ignoring support needs", "D": "Lowering all standards"}, "answer": "B", "rationale": "Inclusion provides full-time regular class placement with supports, not just part-time or conditional access."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 144, "question": "The \"Autism Spectrum Disorder\" (ASD) is characterized by:", "options": {"A": "Only high intelligence", "B": "Challenges in social communication and restricted/repetitive behaviors", "C": "Only physical disabilities", "D": "Only speech problems"}, "answer": "B", "rationale": "Core features of ASD include social communication difficulties and restricted, repetitive patterns of behavior or interests."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 145, "question": "\"ADHD\" (Attention-Deficit/Hyperactivity Disorder) is primarily characterized by:", "options": {"A": "Only physical aggression", "B": "Inattention, hyperactivity, and impulsivity", "C": "Only learning disabilities", "D": "Only sleep problems"}, "answer": "B", "rationale": "ADHD has three presentations: predominantly inattentive, predominantly hyperactive-impulsive, or combined."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 146, "question": "\"Dyslexia\" is a specific learning disability affecting:", "options": {"A": "Math computation only", "B": "Accurate and fluent word recognition and spelling", "C": "Handwriting only", "D": "Physical movement"}, "answer": "B", "rationale": "Dyslexia is characterized by difficulties with phonological processing, decoding, and spelling."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 147, "question": "\"Dyscalculia\" is a specific learning disability affecting:", "options": {"A": "Reading comprehension", "B": "Number sense, arithmetic facts, and mathematical reasoning", "C": "Writing composition", "D": "Social skills"}, "answer": "B", "rationale": "Dyscalculia involves difficulty understanding numbers, calculations, and mathematical concepts."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 148, "question": "\"Dysgraphia\" is a specific learning disability affecting:", "options": {"A": "Reading", "B": "Handwriting and written expression", "C": "Oral communication", "D": "Physical coordination"}, "answer": "B", "rationale": "Dysgraphia affects handwriting legibility, spelling, and written expression despite adequate instruction."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 149, "question": "\"Speech and Language Impairment\" includes difficulties with:", "options": {"A": "Only physical movement", "B": "Articulation, fluency (stuttering), voice, or language comprehension/expression", "C": "Only reading", "D": "Only math"}, "answer": "B", "rationale": "Speech and language impairments encompass various communication disorders affecting production or understanding of language."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 150, "question": "The \"Gifted and Talented Learners\" require differentiated education because:", "options": {"A": "They cannot learn anything", "B": "They have advanced abilities needing challenge beyond regular curriculum", "C": "They should be ignored", "D": "They learn exactly like everyone else"}, "answer": "B", "rationale": "Gifted learners need acceleration, enrichment, and complexity beyond grade-level curriculum to prevent boredom and underachievement."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 1, "question": "What is the special program given to the students who cannot read?", "options": {"A": "Reading program", "B": "Literary program", "C": "Phonic program", "D": "Language program"}, "answer": "A", "rationale": "A reading program is specifically designed to address the needs of non-readers through targeted intervention strategies ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 2, "question": "Developmental reading indicates that a reader is ________.", "options": {"A": "Placed in an individualized reading program and his progress is monitored closely using standardized reading assessment", "B": "Guided both by teacher in-charge and family in reading for him to achieve reading proficiency", "C": "Under a comprehensive reading program that lets him go through stages", "D": "Taught reading skills and strategies and is given daily practice in reading"}, "answer": "C", "rationale": "Developmental reading involves a comprehensive, stage-based program where readers progress through sequential levels of reading proficiency ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 3, "question": "Research indicates that a relationship exists between reading and writing. Which of the following statements supports that finding?", "options": {"A": "Reading is a constructive process, and writing is a recursive one.", "B": "Reading emphasizes syllabication, and writing emphasizes semantics.", "C": "Reading and writing share similar processes and require using the same kinds of knowledge.", "D": "Readers and writers proceed through the same five stages and in the same order."}, "answer": "C", "rationale": "Reading and writing are interconnected processes that share cognitive and linguistic foundations, including vocabulary, grammar, and discourse structures ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 4, "question": "Teacher Algie wants to develop her pupils' comprehension skills. Which order of skills will she develop?  I. Literal comprehension  II. Interpretation  III. Critical evaluation  IV. Creative", "options": {"A": "II – III – IV – I", "B": "III – IV – I – II", "C": "I – II – III – IV", "D": "IV – III – II – I"}, "answer": "C", "rationale": "Comprehension skills develop hierarchically from literal (basic understanding) to interpretive (reading between the lines), then critical (evaluating), and finally creative (generating new ideas) ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 5, "question": "The class of Mr. Balita read about a successful gardening project. After coming from school, Vanessa went around their backyard and decided to plant camote tops. What level of comprehension did Vanessa demonstrate?", "options": {"A": "Literal", "B": "Interpretative", "C": "Applied", "D": "Critical"}, "answer": "C", "rationale": "Applied comprehension involves taking information from text and using it in real-life situations, as Vanessa did by applying what she read about gardening ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 6, "question": "Creative reading is _________.", "options": {"A": "Reading beyond the lines", "B": "Reading for evaluation", "C": "Acquiring ideas that are directly stated", "D": "Assessing the clarity and precision of ideas"}, "answer": "A", "rationale": "Creative reading goes beyond literal and inferential comprehension to generate new ideas, insights, and applications from the text ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 7, "question": "An integrative, conceptual approach introduced by Eson has as its highest level in the development of ________ thinking skills.", "options": {"A": "Interpretative", "B": "Critical", "C": "Creative", "D": "Literal"}, "answer": "C", "rationale": "Eson's approach places creative thinking as the highest level of cognitive development in reading comprehension ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 8, "question": "The following statements are descriptions of critical readers EXCEPT ______.", "options": {"A": "Think while they are reading", "B": "Read with a questioning attitude", "C": "Can distinguish between fact and opinion", "D": "Can identify explicitly stated information"}, "answer": "D", "rationale": "Identifying explicitly stated information is literal comprehension, not critical reading. Critical readers analyze, evaluate, and question the text ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 9, "question": "Teachers can first foster critical thinking in _____.", "options": {"A": "Fourth grade", "B": "Kindergarten", "C": "Sixth grade", "D": "Seventh grade"}, "answer": "B", "rationale": "Critical thinking can be fostered as early as kindergarten through age-appropriate activities like questioning, comparing, and problem-solving ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 10, "question": "Literal comprehension involves _____.", "options": {"A": "Evaluating information", "B": "Making inferences", "C": "Reading beyond the lines", "D": "None of these"}, "answer": "D", "rationale": "Literal comprehension involves understanding explicitly stated information—facts, details, and ideas directly presented in the text ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 11, "question": "Critical reading involves _____.", "options": {"A": "Elaborating on or modifying what is read", "B": "Paraphrasing the material for understanding", "C": "Identifying the accuracy of the information", "D": "Interpreting the ideas in the text"}, "answer": "C", "rationale": "Critical reading involves evaluating the accuracy, validity, and quality of information presented in the text ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 12, "question": "Interpretive reading is _____.", "options": {"A": "Reading beyond the lines", "B": "Reading for stated details", "C": "Reading between the lines", "D": "Reading below the lines"}, "answer": "C", "rationale": "Interpretive reading involves understanding implied meanings, making inferences, and drawing conclusions not explicitly stated ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 13, "question": "Teacher Janus provides varied reading experiences that involve children sitting quietly, silently reading library books or making books based on their own experiences. What theoretical model of reading does Mr. Janus show?", "options": {"A": "Interactive model", "B": "Top-down model", "C": "Schema model", "D": "Bottom-up model"}, "answer": "B", "rationale": "The top-down model emphasizes using prior knowledge and experiences to construct meaning, as seen in student-driven, experience-based reading activities ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 14, "question": "Mr. Soriano uses flashcards so pupils can sound out syllables and words correctly. What reading model is reflected in Mr. Soriano's instruction?", "options": {"A": "Bottom-up model", "B": "Interactive model", "C": "Top-down model", "D": "Schema model"}, "answer": "A", "rationale": "The bottom-up model builds meaning from smaller units (letters, sounds, syllables) to larger units (words, sentences), as reflected in phonics-based instruction ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 15, "question": "Which of the following objectives state a criterion level of success?", "options": {"A": "Heat and water", "B": "Assembles the materials in five minutes", "C": "Answers the questions given in the book", "D": "Differentiates between good and bad materials"}, "answer": "B", "rationale": "A criterion level specifies the acceptable performance standard. \"In five minutes\" provides a measurable criterion for success ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 16, "question": "For advanced pupils, what kind of activity should be given after the lesson is taught?", "options": {"A": "Corrective activity", "B": "Interest activity", "C": "Reinforcement activity", "D": "Enrichment activity"}, "answer": "D", "rationale": "Enrichment activities provide advanced learners with additional challenges and depth beyond the regular curriculum ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 17, "question": "In leading students to formulate generalizations, what kind of question should be asked?", "options": {"A": "Evaluation question", "B": "Rote-memory question", "C": "Hypothetical question", "D": "Focusing question"}, "answer": "A", "rationale": "Evaluation questions require students to synthesize information, make judgments, and formulate generalizations from specific instances ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 18, "question": "Which of the following is NOT true when using the discovery approach?", "options": {"A": "The teacher uses many materials.", "B": "The steps in inductive method are used.", "C": "The lesson taught is evaluated.", "D": "The teacher begins the lesson by telling what the students are expected to learn."}, "answer": "D", "rationale": "The discovery approach begins with exploration and inquiry, not by telling students what they will learn. Learning outcomes emerge from the discovery process ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 19, "question": "Usually, children learn mainly by observation. By doing this, they can get the information they need and incorporate it into their schemata. Which theory of learning is observed?", "options": {"A": "Cognitive learning", "B": "Humanistic learning", "C": "Social learning", "D": "Behavioristic learning"}, "answer": "C", "rationale": "Social learning theory (Bandura) emphasizes observational learning where children acquire knowledge and behaviors by watching others ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 20, "question": "By and large, educational authorities agree that character is \"caught\" and not \"taught.\" What is the rationale for this?", "options": {"A": "Character is generally dependent on reasoning and intelligent thinking.", "B": "Character is inborn and therefore resists changes.", "C": "Character is generally dependent on what are seen and experienced.", "D": "Character is developed through the process of trial and error."}, "answer": "C", "rationale": "Character develops through modeling and experiencing values in action—students learn from what they observe and experience, not just from direct instruction ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 21, "question": "Miss X gives this activity to her pupils for ten minutes after the discussion to help them transfer new information into long-term memory and relate them with old lessons. What do you call this activity?", "options": {"A": "Drill", "B": "Practice", "C": "Motivation", "D": "Review"}, "answer": "B", "rationale": "Practice strengthens neural connections and helps integrate new information with existing knowledge, facilitating transfer to long-term memory ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 22, "question": "If a teacher discovers a mathematically-gifted child in her class, what best arrangement will be observed?", "options": {"A": "Provide him with enrichment activities.", "B": "Let him teach the slow learners.", "C": "Place him in a special class.", "D": "Accelerate him to the next grade level."}, "answer": "A", "rationale": "Enrichment activities provide appropriate challenge for gifted learners while keeping them with age-appropriate peers ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 23, "question": "Accordingly, one of the disadvantages of the recitation strategy is that it does not encourage understanding of information. How can teachers improve the strategy?", "options": {"A": "Ask many questions about the topic.", "B": "Ask thought-provoking questions.", "C": "Assign study topics beforehand.", "D": "Give students time to think before answering."}, "answer": "B", "rationale": "Thought-provoking questions require higher-order thinking and analysis, promoting deeper understanding rather than simple recall ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 24, "question": "Generally before planning activities and experiences for his class, what would the teacher do first?", "options": {"A": "Give a diagnostic test", "B": "Identify the resources of the community", "C": "Consult the principal about his class", "D": "Review the past lesson"}, "answer": "A", "rationale": "Diagnostic assessment identifies students' prior knowledge, strengths, and weaknesses, informing instructional planning ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 25, "question": "Which of the following activities should a teacher provide to pupils who need more practice to learn the skills?", "options": {"A": "Review", "B": "Practice", "C": "Drill", "D": "Seatwork"}, "answer": "C", "rationale": "Drill provides focused, repetitive practice to develop automaticity and mastery of specific skills ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 26, "question": "If you recall, there are four variables in the teaching-learning process: the teacher, the nature of the subject matter, the learner, and the?", "options": {"A": "References", "B": "Materials to use", "C": "Learning process", "D": "Objectives"}, "answer": "D", "rationale": "The four variables in the teaching-learning process are teacher, learner, subject matter/content, and objectives (or goals) ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 27, "question": "Miss W reviews past lessons before introducing new ones. She tries to establish continuity in learning and upholds the principle of ________.", "options": {"A": "Cause and effect", "B": "Motivation", "C": "Retention", "D": "Apperception"}, "answer": "D", "rationale": "Apperception is the process of relating new information to prior knowledge, making learning meaningful and connected ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 28, "question": "Logically, a teacher delegates some responsibilities to the whole class with monitors for attendance, distributing materials, etc. The teacher is good in?", "options": {"A": "Classroom management", "B": "Application of theories", "C": "Development of values", "D": "Instructional planning"}, "answer": "A", "rationale": "Delegating responsibilities demonstrates effective classroom management by creating structure and student ownership ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 29, "question": "The teacher who maintains discipline and sustains student interest despite a large class size is said to be skilled in the ________ aspect of classroom management.", "options": {"A": "Group focus", "B": "Movement management", "C": "With-it-ness", "D": "Overlapping activities"}, "answer": "A", "rationale": "Group focus involves keeping all students engaged and attentive regardless of class size—a key Kounin classroom management skill ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 30, "question": "All of the following are characteristics of a good question, EXCEPT:", "options": {"A": "Requires brief and direct answers", "B": "Stimulates students to think", "C": "Calls for straightforward response", "D": "Appropriate to its purpose"}, "answer": "A", "rationale": "Good questions should stimulate thinking, not merely elicit brief, direct answers that require minimal cognitive processing ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 31, "question": "In solving problems in Mathematics, questions like \"What is given?\" \"What is asked?\" and \"What process will you use?\" are?", "options": {"A": "Diagnostic", "B": "Thought-provoking", "C": "Recall", "D": "Analytical"}, "answer": "D", "rationale": "Analytical questions break down problems into components and guide students through the problem-solving process ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 32, "question": "Logically, how can a teacher maintain the standard of quality and effectiveness of audio-visual materials in her room?", "options": {"A": "Following closely the correct procedure in presenting them.", "B": "Constantly using them whenever possible.", "C": "Having various types of materials.", "D": "Continuously evaluating and revising materials."}, "answer": "D", "rationale": "Continuous evaluation and revision ensure materials remain effective, relevant, and aligned with learning objectives ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 33, "question": "It is stated that audio-visual aids complement teaching to make perception quicker and clearer. Why?", "options": {"A": "They present programmed information.", "B": "They present multi-sensory experience.", "C": "They provide verbal and symbolic experiences.", "D": "They make information readily available."}, "answer": "B", "rationale": "Multi-sensory experiences (visual, auditory, kinesthetic) enhance perception and retention by engaging multiple learning pathways ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 34, "question": "A new teacher wants to prepare instructional material focusing on informal activities with goals, rules, and rewards. Which of the following can she prepare without necessarily spending money?", "options": {"A": "Puppets", "B": "Games", "C": "Drawings", "D": "Plays"}, "answer": "B", "rationale": "Games can be created using classroom rules and goals without expensive materials, utilizing existing classroom resources ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 35, "question": "The first task in the selection of media in teaching is to determine the:", "options": {"A": "Choice of the students", "B": "Techniques to be used", "C": "Availability of the media", "D": "Strategies and techniques"}, "answer": "D", "rationale": "Strategies and techniques (learning objectives and instructional methods) must be determined first before selecting appropriate media ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 36, "question": "It is accepted practice that in preparing a lesson for a day, setting objectives is followed by selection of ________ to achieve the objectives.", "options": {"A": "Activities and references", "B": "Methods and procedures", "C": "Group leaders and members", "D": "Strategies and techniques"}, "answer": "D", "rationale": "After setting objectives, teachers select strategies and techniques aligned with achieving those learning outcomes ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 37, "question": "Which of these skills is basic and necessary in all investigative activities of learners?", "options": {"A": "Inferring", "B": "Comparing", "C": "Observing", "D": "Measuring"}, "answer": "C", "rationale": "Observation is the foundational science process skill from which all other investigative skills derive ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 38, "question": "Why should learning activities be carefully planned?", "options": {"A": "The accomplishment of the objectives depends on it.", "B": "The learner's skills and attitudes are developed.", "C": "They are centered in the children's energies.", "D": "The teacher's ability to plan is tested."}, "answer": "A", "rationale": "Careful planning ensures that activities directly support achievement of stated learning objectives ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 39, "question": "Which is manifested if there are available textbooks and materials for every learner?", "options": {"A": "Improvement of quality education", "B": "Development of study skills", "C": "Encouragement of the student to study", "D": "Improvement of school and community relation"}, "answer": "A", "rationale": "Adequate learning resources are a key indicator and contributor to quality education ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 40, "question": "In a new class where pupils answer without being called, call out \"Ma'am\" to get attention, and laugh when someone commits mistakes, what should you do?", "options": {"A": "Involve the whole class in setting rules of conduct for the class.", "B": "Write the parents about their children's misbehavior.", "C": "Send the pupils who are misbehaving to the guidance counselor.", "D": "Set the rules for the class to observe."}, "answer": "A", "rationale": "Involving students in rule-setting creates ownership, understanding, and commitment to classroom norms ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 41, "question": "During a typhoon, your room was damaged and you were advised to hold classes on the stage. What should you do to manage the class?", "options": {"A": "Create the most conducive and comfortable setting out of the situation.", "B": "Instruct other pupils not to loiter.", "C": "Post a sign \"Class is Going On\" so as not to disrupt classes.", "D": "Arrange the pupils to the left side of the stage."}, "answer": "A", "rationale": "Effective classroom management involves adapting to constraints and creating the best possible learning environment given available resources ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 42, "question": "What can you do to adapt yourself to the technological advances in teaching and learning?", "options": {"A": "Encourage my co-teachers to make use of them.", "B": "Do away with the traditional methods.", "C": "Learn and apply the technology.", "D": "Be acquainted with the new technology."}, "answer": "C", "rationale": "Active learning and application of technology is the most effective way for teachers to adapt to technological advances ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 43, "question": "How does the Department of Education respond primarily to changes occurring in the modern world?", "options": {"A": "Simplifying administrative function.", "B": "Establishing schools in every barangay.", "C": "Modifying the curriculum.", "D": "Giving more emphasis on teacher's roles."}, "answer": "C", "rationale": "Curriculum modification is DepEd's primary response to address changing societal needs and global developments ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 44, "question": "Mr. X provides his class with abstractions of the real world involving objects, processes, or situations with goals, rules, and rewards. What approach is used by him?", "options": {"A": "Discussion", "B": "Role playing", "C": "Activity", "D": "Simulation"}, "answer": "D", "rationale": "Simulation creates simplified representations of real-world systems with rules, goals, and consequences for learner engagement ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 45, "question": "Mr. Cruz is tired of his discussion method, so he tried inviting resource persons who speak, then the class participates. This is called ________.", "options": {"A": "Debate", "B": "Symposium", "C": "Round table conference", "D": "Brainstorming"}, "answer": "B", "rationale": "A symposium involves multiple speakers presenting different perspectives on a topic, followed by audience participation ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 46, "question": "What method is used when imaginative ideas or solutions are elicited from a group encouraged to expand thinking beyond routine suggestions?", "options": {"A": "Buzz session", "B": "Brainstorming", "C": "Fish bowl technique", "D": "Critiquing session"}, "answer": "B", "rationale": "Brainstorming encourages free-flowing idea generation without immediate criticism to maximize creative output ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 47, "question": "What method is used for students who need closely monitored practice and drills with corrective feedback before proceeding?", "options": {"A": "Programmed", "B": "Independent study", "C": "Remedial", "D": "Self-directed"}, "answer": "C", "rationale": "Remedial instruction provides targeted support and corrective feedback for students who have not mastered prerequisite skills ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 48, "question": "Miss Santos grouped her class into small groups of 3-4 members. Each group discussed problems, then reporters presented solutions to the whole class. This technique is called?", "options": {"A": "Buzz session", "B": "Fish bowl technique", "C": "Forum", "D": "Simulation"}, "answer": "A", "rationale": "Buzz sessions are small group discussions that generate ideas, followed by whole-class sharing of conclusions ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 49, "question": "What method is used when a teacher provides various exercises with increasing difficulty and students are receptive?", "options": {"A": "Story grammar, structural", "B": "Diagnostic perspective", "C": "Multi-level", "D": "Dimensional"}, "answer": "C", "rationale": "Multi-level instruction provides differentiated tasks at varying difficulty levels to accommodate diverse learner readiness ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 50, "question": "An experienced teacher is requested to assist and help inexperienced teachers. This strategy is called ________.", "options": {"A": "Peer teaching", "B": "Pair teaching", "C": "Peer coaching", "D": "Team teaching"}, "answer": "C", "rationale": "Peer coaching involves experienced teachers providing support, feedback, and guidance to less experienced colleagues ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 51, "question": "According to progressivist educators like Carl Rogers, what is the essence of creativity among school learners?", "options": {"A": "Novelty", "B": "Industry", "C": "Convention", "D": "Conformity"}, "answer": "A", "rationale": "Progressivism values creativity as the production of novel, original ideas and solutions, not mere conformity to established norms ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 52, "question": "What is the philosophy behind Philippine schools that seek to promote democratic opportunities for all and humanistic education through lifelong learning?", "options": {"A": "Progressivism", "B": "Classical education", "C": "Perennialism", "D": "Positivism"}, "answer": "A", "rationale": "Progressivism advocates democratic education, equal opportunities, and lifelong learning—aligning with Philippine educational philosophy ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 53, "question": "Which philosophy supports universal values in education, as these are important in molding young minds toward broad ideals such as democracy, freedom, and human rights?", "options": {"A": "Pragmatism", "B": "Empiricism", "C": "Existentialism", "D": "Essentialism"}, "answer": "C", "rationale": "Existentialism emphasizes individual choice and universal human values, supporting education that develops democratic and human rights consciousness ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 54, "question": "What is the teacher's \"window\" or viewpoint of the world?", "options": {"A": "Philosophy of life", "B": "Love of children", "C": "Ethical values", "D": "Behaviorist classroom"}, "answer": "A", "rationale": "A teacher's philosophy of life shapes their perspective, decisions, and actions in the classroom ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 55, "question": "What factor should Teacher Julie be careful about when teaching in a school for children in a poverty-stricken slum area?", "options": {"A": "Children's socio-economic status", "B": "Children's beliefs", "C": "Children's ethnicity", "D": "Children's race"}, "answer": "A", "rationale": "Socio-economic status affects resources, nutrition, and home support—teachers must be sensitive to these factors ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 56, "question": "Which is an effective way of developing a sense of ownership among students?", "options": {"A": "Abide totally by the students' suggestions", "B": "Make students participate in the formulation of class rules", "C": "Let students formulate the class rules", "D": "Involve students in all decision-making that involves the class"}, "answer": "C", "rationale": "Allowing students to formulate class rules creates the strongest sense of ownership and responsibility ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 57, "question": "Which of the following is one of the best practices in using learning resources for indigenous learners?", "options": {"A": "Highlight English language in primary years", "B": "Observe cultural sensitivity and protocols", "C": "Dismiss indigenous artifacts and other cultural resources", "D": "Violate indigenous community property rights"}, "answer": "B", "rationale": "Cultural sensitivity and respect for indigenous protocols are essential when using resources for indigenous learners ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 58, "question": "How would you best interpret the old proverb \"It takes the whole village to educate a child\"?", "options": {"A": "All teachers are responsible for child education.", "B": "All stakeholders support education of the child.", "C": "School buildings are needed for education.", "D": "The community plays a role in child education."}, "answer": "B", "rationale": "The proverb means education requires collective responsibility from all stakeholders—family, school, and community ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 59, "question": "Your emphasis is the learner's affective development. Which pillar/s of learning should you focus on?", "options": {"A": "Learning to know and learning to be", "B": "Learning to live together", "C": "Learning to be and learning to live together", "D": "Learning to do"}, "answer": "C", "rationale": "Affective development aligns with \"Learning to Be\" (personal development) and \"Learning to Live Together\" (social-emotional skills) ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 60, "question": "Which of the following is the best relationship for the school and community?", "options": {"A": "Community rule", "B": "Partnership", "C": "School supervision", "D": "Teacher-led projects"}, "answer": "B", "rationale": "Partnership implies equal, collaborative relationship between school and community for mutual benefit ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 61, "question": "What is the appropriate teaching-learning strategy to respond to cultural diversity among learners?", "options": {"A": "Group entire class homogenously", "B": "Variety of teaching and assessment methods", "C": "One set of teaching-learning methods", "D": "Use of comparative assessment tools"}, "answer": "B", "rationale": "Diverse learners require diverse methods—differentiated instruction addresses cultural diversity effectively ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 62, "question": "Which of the following shows the teacher's respect for human dignity?", "options": {"A": "Practicing diligence and industry", "B": "Using social media", "C": "Joining professional associations", "D": "Working with people of different views"}, "answer": "D", "rationale": "Respecting human dignity means accepting and working with people holding different beliefs and perspectives ."}, {"set": "SET E: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 63, "question": "Teachers often complain of numerous non-teaching assignments. Does this mean teachers must be preoccupied only with teaching?", "options": {"A": "No, because to lead in community activities is the job of elected officials.", "B": "Yes, because teaching is more than enough full time job.", "C": "No, because every teacher is expected to provide leadership in a
