: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 30, "question": "Which term describes the tendency to attribute one's own success to internal factors and failure to external factors?", "options": {"A": "Fundamental attribution error", "B": "Self-serving bias", "C": "Confirmation bias", "D": "Halo effect"}, "answer": "B", "rationale": "Self-serving bias is the tendency to credit internal factors for success but blame external factors for failure."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 31, "question": "A teacher notices a student consistently performs poorly despite obvious effort. The teacher should first:", "options": {"A": "Refer the student for special education testing", "B": "Confer with parents about home support", "C": "Rule out possible learning disabilities through assessment", "D": "Lower expectations for the student"}, "answer": "C", "rationale": "Systematic assessment should first determine if a learning disability is present before other interventions."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 32, "question": "The \"zone of proximal development\" is the gap between:", "options": {"A": "What a child can do alone vs. with help", "B": "Intelligence and achievement", "C": "Motivation and performance", "D": "Heredity and environment"}, "answer": "A", "rationale": "ZPD is Vygotsky's concept of the distance between actual independent performance and potential performance with guidance."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 33, "question": "Which assessment type is most appropriate for measuring a student's ability to apply knowledge in real-world contexts?", "options": {"A": "Standardized multiple choice", "B": "Performance-based assessment", "C": "True-false test", "D": "Matching type"}, "answer": "B", "rationale": "Performance-based assessment requires demonstration of skills and application in authentic contexts."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 34, "question": "According to Bloom's Revised Taxonomy, the highest level of cognitive processing is:", "options": {"A": "Evaluation", "B": "Synthesis", "C": "Creating", "D": "Analyzing"}, "answer": "C", "rationale": "Creating (formerly synthesis) is the highest level, involving generating new ideas or products from existing knowledge."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 35, "question": "Teacher-centered instruction is most appropriate when the learning objective is:", "options": {"A": "Developing creative problem-solving", "B": "Acquiring basic factual knowledge", "C": "Building collaborative skills", "D": "Exploring multiple perspectives"}, "answer": "B", "rationale": "Direct instruction efficiently transmits foundational facts and basic knowledge to learners."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 36, "question": "Which practice best promotes transfer of learning?", "options": {"A": "Teaching isolated facts", "B": "Using only one example to illustrate concepts", "C": "Teaching concepts in multiple varied contexts", "D": "Relying exclusively on drill and practice"}, "answer": "C", "rationale": "Varied contexts help learners recognize when and how to apply knowledge in new situations."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 37, "question": "A student with learned helplessness typically:", "options": {"A": "Persists longer on difficult tasks", "B": "Attributes failure to lack of effort", "C": "Believes efforts are futile regardless of ability", "D": "Seeks help when struggling"}, "answer": "C", "rationale": "Learned helplessness is the belief that outcomes are uncontrollable, leading to passivity and giving up."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 38, "question": "Which instructional strategy is most effective for teaching problem-solving skills?", "options": {"A": "Lecture with examples", "B": "Drill and practice", "C": "Inquiry-based learning", "D": "Rote memorization"}, "answer": "C", "rationale": "Inquiry-based learning engages students in active problem-solving, developing critical thinking skills."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 39, "question": "The primary purpose of formative assessment is to:", "options": {"A": "Assign final grades", "B": "Compare students to peers", "C": "Monitor progress and guide instruction", "D": "Evaluate teacher effectiveness"}, "answer": "C", "rationale": "Formative assessment provides ongoing feedback to adjust teaching and improve student learning."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 40, "question": "A student demonstrates mastery of a learning competency. According to mastery learning, the teacher should:", "options": {"A": "Move the student to the next unit", "B": "Provide enrichment activities", "C": "Have the student tutor peers", "D": "All of the above"}, "answer": "D", "rationale": "Mastery learning allows advanced students to move forward, engage in enrichment, or help others."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 41, "question": "Which type of reinforcement schedule produces the most consistent response rate?", "options": {"A": "Fixed ratio", "B": "Variable ratio", "C": "Fixed interval", "D": "Variable interval"}, "answer": "B", "rationale": "Variable ratio schedules produce high, steady response rates and are most resistant to extinction."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 42, "question": "The concept of \"curriculum mapping\" helps teachers:", "options": {"A": "Create lesson plans", "B": "Align instruction with standards and identify gaps", "C": "Grade student work", "D": "Manage classroom behavior"}, "answer": "B", "rationale": "Curriculum mapping documents what is taught and when to ensure alignment and identify overlaps or gaps."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 43, "question": "A teacher who adjusts instruction based on ongoing assessment results is practicing:", "options": {"A": "Differentiated instruction", "B": "Data-driven instruction", "C": "Mastery learning", "D": "Direct instruction"}, "answer": "B", "rationale": "Data-driven instruction uses assessment results to inform and modify teaching decisions."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 44, "question": "Which questioning technique extends student thinking by asking for clarification or justification?", "options": {"A": "Closed question", "B": "Probing question", "C": "Leading question", "D": "Rhetorical question"}, "answer": "B", "rationale": "Probing questions ask students to elaborate, explain reasoning, or provide evidence for answers."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 45, "question": "Students learn better when they can relate new information to existing knowledge. This principle is called:", "options": {"A": "Meaningful learning", "B": "Rote learning", "C": "Spaced learning", "D": "Active learning"}, "answer": "A", "rationale": "Ausubel's meaningful learning occurs when new information connects to existing cognitive structures."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 46, "question": "The Hawthorne Effect in educational research refers to:", "options": {"A": "Students learning better in groups", "B": "Improved performance due to awareness of being observed", "C": "Decline in performance after initial success", "D": "Teacher expectations affecting student outcomes"}, "answer": "B", "rationale": "The Hawthorne Effect describes behavior change resulting from attention received, not treatment itself."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 47, "question": "Which is NOT a characteristic of 21st-century learning?", "options": {"A": "Teacher-centered instruction", "B": "Collaboration and communication", "C": "Critical thinking and problem-solving", "D": "Creativity and innovation"}, "answer": "A", "rationale": "21st-century learning emphasizes student-centered, collaborative approaches over traditional teacher-centered methods."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 48, "question": "What is the primary benefit of using rubrics for assessment?", "options": {"A": "Saves grading time", "B": "Provides clear expectations and consistent feedback", "C": "Eliminates the need for comments", "D": "Guarantees high scores"}, "answer": "B", "rationale": "Rubrics clarify performance criteria and provide consistent, specific feedback aligned with expectations."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 49, "question": "According to research, which feedback characteristic is most effective for learning?", "options": {"A": "General praise", "B": "Task-specific and timely", "C": "Comparison with peers", "D": "Focused only on weaknesses"}, "answer": "B", "rationale": "Effective feedback is specific to task performance and provided soon after the learning event."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 50, "question": "A student with a fixed mindset believes that intelligence is:", "options": {"A": "Malleable and can grow with effort", "B": "Stable and unchangeable", "C": "Determined solely by environment", "D": "Unrelated to academic success"}, "answer": "B", "rationale": "Fixed mindset views intelligence as static trait; growth mindset sees it as developable through effort."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 51, "question": "What does \"interrater reliability\" measure?", "options": {"A": "Consistency of a test over time", "B": "Agreement between different scorers", "C": "Internal consistency of test items", "D": "Correlation with other measures"}, "answer": "B", "rationale": "Interrater reliability assesses the degree of agreement among different raters scoring the same performance."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 52, "question": "Which of the following is the best example of a performance-based task?", "options": {"A": "Multiple-choice final exam", "B": "Vocabulary matching quiz", "C": "Science investigation report with data collection", "D": "True-false reading comprehension check"}, "answer": "C", "rationale": "A science investigation requires applying skills, collecting data, and producing original work."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 53, "question": "The practice of \"looping\" in education refers to:", "options": {"A": "Teaching the same content repeatedly", "B": "Staying with the same class for multiple years", "C": "Rotating students through different teachers", "D": "Returning to previously mastered skills"}, "answer": "B", "rationale": "Looping keeps the same teacher with a class for two or more consecutive years, building relationships."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 54, "question": "According to research on class size, reduced class size has the greatest positive effect on:", "options": {"A": "High school students", "B": "College students", "C": "Early primary grades", "D": "Gifted students"}, "answer": "C", "rationale": "Small class size benefits are most pronounced in early primary grades (K-3), especially for at-risk students."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 55, "question": "A teacher using \"wait time\" after asking a question allows students to:", "options": {"A": "Avoid answering", "B": "Process and formulate thoughtful responses", "C": "Ask for clarification immediately", "D": "Change the subject"}, "answer": "B", "rationale": "Wait time (3-5 seconds) gives students time to process questions and develop higher-quality answers."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 56, "question": "Which activity best promotes metacognitive development?", "options": {"A": "Copying notes from the board", "B": "Completing worksheets", "C": "Reflective journaling about learning strategies", "D": "Listening to lectures"}, "answer": "C", "rationale": "Reflective journaling encourages students to think about their own thinking and learning processes."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 57, "question": "According to the \"curse of knowledge\" bias, expert teachers may struggle because they:", "options": {"A": "Know too little about the subject", "B": "Cannot remember what it was like not to understand", "C": "Lack teaching credentials", "D": "Use too many visual aids"}, "answer": "B", "rationale": "The curse of knowledge is difficulty imagining what it's like not to know something one already knows."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 58, "question": "Which is an example of a non-academic factor affecting student achievement?", "options": {"A": "Prior knowledge of content", "B": "Reading comprehension level", "C": "Sleep quality and nutrition", "D": "Math calculation skills"}, "answer": "C", "rationale": "Sleep and nutrition are non-academic factors that significantly impact learning readiness and performance."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 59, "question": "The \"hidden curriculum\" refers to:", "options": {"A": "Subjects not officially taught", "B": "Unwritten social rules and values learned in school", "C": "Advanced placement courses", "D": "Extracurricular activities"}, "answer": "B", "rationale": "Hidden curriculum includes implicit lessons about norms, values, and social expectations conveyed through school routines."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 60, "question": "A student who disrupts class to gain peer approval is motivated by:", "options": {"A": "Intrinsic motivation", "B": "Extrinsic motivation", "C": "Social motivation", "D": "Amotivation"}, "answer": "C", "rationale": "Social motivation involves behaving to gain acceptance, approval, or status within peer groups."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 61, "question": "According to Vygotsky, language plays what role in cognitive development?", "options": {"A": "No significant role", "B": "A tool for thinking and self-regulation", "C": "Only for communication with others", "D": "Distracts from cognitive tasks"}, "answer": "B", "rationale": "Vygotsky emphasized that language internalizes as inner speech, guiding thought and self-regulation."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 62, "question": "Which learning environment factor has the strongest correlation with student achievement?", "options": {"A": "New textbooks", "B": "Classroom management quality", "C": "Building age", "D": "Number of computers"}, "answer": "B", "rationale": "Effective classroom management creates conditions for learning and correlates strongly with achievement."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 63, "question": "What is the recommended teacher-student ratio for optimal learning in early grades?", "options": {"A": "1:10 or less", "B": "1:15 to 1:18", "C": "1:25 to 1:30", "D": "1:35 or more"}, "answer": "B", "rationale": "Research suggests smaller classes of 15-18 students in early grades produce significant benefits."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 64, "question": "A teacher who says \"You can do this\" to a struggling student is attempting to build:", "options": {"A": "Self-efficacy", "B": "Self-esteem", "C": "Self-concept", "D": "Self-regulation"}, "answer": "A", "rationale": "Verbal persuasion is a source of self-efficacy – belief in one's capability to succeed."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 65, "question": "Which is the most effective way to reduce stereotype threat in the classroom?", "options": {"A": "Ignore differences among students", "B": "Emphasize that ability can grow with effort", "C": "Separate students by perceived ability", "D": "Avoid discussing diversity"}, "answer": "B", "rationale": "Growth mindset messaging reduces stereotype threat by emphasizing developable rather than fixed ability."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 66, "question": "The \"forgetting curve\" research by Ebbinghaus shows that most forgetting occurs:", "options": {"A": "Evenly over time", "B": "Immediately after learning", "C": "After one month", "D": "Only when not reviewed"}, "answer": "B", "rationale": "Ebbinghaus found forgetting is rapid initially (within hours) then levels off."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 67, "question": "Spaced practice is more effective than massed practice because it:", "options": {"A": "Takes less total time", "B": "Allows for memory consolidation between sessions", "C": "Is less mentally demanding", "D": "Requires no review"}, "answer": "B", "rationale": "Spacing allows consolidation and strengthens neural connections through retrieval practice."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 68, "question": "Which is the best example of a student using elaboration as a study strategy?", "options": {"A": "Rereading notes multiple times", "B": "Explaining how new concepts relate to personal experiences", "C": "Highlighting key terms", "D": "Copying definitions verbatim"}, "answer": "B", "rationale": "Elaboration involves connecting new information to prior knowledge and personal experiences."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 69, "question": "A student with test anxiety is likely to perform poorly due to:", "options": {"A": "Lack of knowledge", "B": "Working memory interference", "C": "Low intelligence", "D": "Poor study habits only"}, "answer": "B", "rationale": "Anxiety consumes working memory capacity, leaving fewer cognitive resources for test performance."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 70, "question": "Which classroom practice best supports English language learners?", "options": {"A": "Isolating them from English-speaking peers", "B": "Using visuals, gestures, and simplified language", "C": "Requiring only written responses", "D": "Avoiding any translation"}, "answer": "B", "rationale": "Comprehensible input using multiple modalities supports ELL comprehension and participation."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 71, "question": "According to Rosenthal and Jacobson's Pygmalion study, teacher expectations:", "options": {"A": "Have no effect on student performance", "B": "Can become self-fulfilling prophecies", "C": "Only affect low-achieving students", "D": "Are impossible to change"}, "answer": "B", "rationale": "The Pygmalion effect shows teacher expectations influence student performance, creating self-fulfilling outcomes."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 72, "question": "Which is a characteristic of culturally responsive teaching?", "options": {"A": "Ignoring cultural differences", "B": "Using students' cultural backgrounds as learning resources", "C": "Expecting all students to assimilate", "D": "Avoiding multicultural content"}, "answer": "B", "rationale": "Culturally responsive teaching validates and leverages students' cultural knowledge as assets for learning."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 73, "question": "What is the primary purpose of a portfolio assessment?", "options": {"A": "Easy grading", "B": "Showcasing growth and achievement over time", "C": "Reducing teacher workload", "D": "Standardized comparison"}, "answer": "B", "rationale": "Portfolios document learning progress, effort, and achievement across multiple samples over time."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 74, "question": "Which instructional approach is most consistent with brain-based learning research?", "options": {"A": "Long, uninterrupted lectures", "B": "Varied activities with movement and processing time", "C": "Silent independent work only", "D": "Repetitive drill without variation"}, "answer": "B", "rationale": "Brain-based learning incorporates varied stimuli, movement, and processing time aligned with brain function."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 75, "question": "The \"testing effect\" refers to the finding that:", "options": {"A": "Tests cause anxiety", "B": "Retrieval practice improves long-term retention", "C": "Multiple-choice tests are ineffective", "D": "Testing takes too much time"}, "answer": "B", "rationale": "The testing effect demonstrates that actively retrieving information strengthens memory more than restudying."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 76, "question": "Which practice reduces cognitive load for learners?", "options": {"A": "Presenting all information simultaneously", "B": "Chunking information and removing extraneous content", "C": "Using complex terminology without explanation", "D": "Fast-paced delivery without pauses"}, "answer": "B", "rationale": "Chunking and eliminating extraneous information reduces working memory demands, enhancing learning."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 77, "question": "A student with dyslexia primarily struggles with:", "options": {"A": "Mathematical computation", "B": "Phonological processing and word recognition", "C": "Social interaction", "D": "Motor coordination"}, "answer": "B", "rationale": "Dyslexia is a language-based learning disability affecting phonological awareness and decoding."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 78, "question": "Which is an appropriate accommodation for a student with ADHD?", "options": {"A": "Longer assignments", "B": "Preferential seating and frequent movement breaks", "C": "Removing all structure", "D": "Reducing all expectations"}, "answer": "B", "rationale": "Structured environment, preferential seating, and movement breaks support attention regulation."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 79, "question": "According to IDEA, the least restrictive environment principle requires that students with disabilities:", "options": {"A": "Be educated separately from peers", "B": "Be educated with non-disabled peers to maximum extent appropriate", "C": "Receive no accommodations", "D": "Have the same expectations regardless of disability"}, "answer": "B", "rationale": "LRE mandates inclusion with non-disabled peers to the greatest appropriate extent."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 80, "question": "Response to Intervention (RTI) is primarily used to:", "options": {"A": "Label students with disabilities", "B": "Identify and support struggling students early", "C": "Reduce special education funding", "D": "Eliminate classroom interventions"}, "answer": "B", "rationale": "RTI provides tiered interventions to struggling students before formal special education referral."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 81, "question": "Gifted students may be at risk for underachievement due to:", "options": {"A": "Lack of intellectual ability", "B": "Boredom and lack of challenge", "C": "Too much support", "D": "Excessive homework"}, "answer": "B", "rationale": "Gifted students may underachieve when curriculum lacks sufficient challenge and engagement."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 82, "question": "Which is an effective strategy for differentiating instruction for advanced learners?", "options": {"A": "More worksheets", "B": "Acceleration and curriculum compacting", "C": "Lowering expectations", "D": "Peer tutoring only"}, "answer": "B", "rationale": "Acceleration and compacting allow advanced learners to move through content at appropriate pace."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 83, "question": "The primary characteristic of authentic assessment is:", "options": {"A": "Easy to score", "B": "Real-world relevance and application", "C": "Multiple-choice format", "D": "Timed administration"}, "answer": "B", "rationale": "Authentic assessment requires students to perform real-world tasks demonstrating meaningful application."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 84, "question": "Which is the best way to provide feedback on student writing?", "options": {"A": "Only final grade", "B": "Specific comments on strengths and areas for improvement", "C": "General praise", "D": "Correction of every error"}, "answer": "B", "rationale": "Specific, balanced feedback helps writers understand what works and what needs improvement."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 85, "question": "Peer tutoring is most effective when:", "options": {"A": "Tutors are significantly older", "B": "Both tutor and tutee receive training and structure", "C": "Only high-achieving students tutor", "D": "No monitoring occurs"}, "answer": "B", "rationale": "Structured peer tutoring with trained participants produces the strongest learning gains for both."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 86, "question": "Which type of question promotes the highest level of thinking?", "options": {"A": "\"What year did World War II end?\"", "B": "\"Who was the first president?\"", "C": "\"What would happen if the treaty had been different?\"", "D": "\"Define photosynthesis\""}, "answer": "C", "rationale": "Hypothetical \"what if\" questions require analysis, evaluation, and creative thinking at higher Bloom's levels."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 87, "question": "A teacher using think-pair-shalk is implementing:", "options": {"A": "Individual competition", "B": "Cooperative learning structure", "C": "Lecture method", "D": "Independent study"}, "answer": "B", "rationale": "Think-pair-share is a cooperative learning structure promoting individual thinking followed by collaboration."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 88, "question": "The jigsaw method is designed to promote:", "options": {"A": "Individual accountability and interdependence", "B": "Competition between groups", "C": "Teacher-centered instruction", "D": "Rote memorization"}, "answer": "A", "rationale": "Jigsaw creates positive interdependence where each student's part is essential to group success."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 89, "question": "Which is NOT a principle of Universal Design for Learning (UDL)?", "options": {"A": "Multiple means of engagement", "B": "Multiple means of representation", "C": "One-size-fits-all instruction", "D": "Multiple means of action and expression"}, "answer": "C", "rationale": "UDL provides multiple options, not a single approach, to address learner variability."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 90, "question": "A student with high academic self-efficacy is likely to:", "options": {"A": "Give up easily when challenged", "B": "Persist longer on difficult tasks", "C": "Avoid challenging work", "D": "Attribute success to luck"}, "answer": "B", "rationale": "Self-efficacy influences persistence, effort, and resilience when facing challenges."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 91, "question": "According to attribution theory, students who attribute failure to lack of effort will likely:", "options": {"A": "Give up permanently", "B": "Increase effort in the future", "C": "Blame the teacher", "D": "Avoid the subject entirely"}, "answer": "B", "rationale": "Effort attributions are controllable – students believe they can change outcomes by trying harder."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 92, "question": "Which is an example of authentic intellectual work?", "options": {"A": "Memorizing dates for a test", "B": "Writing a letter to the editor about a community issue", "C": "Copying notes from the board", "D": "Completing vocabulary definitions"}, "answer": "B", "rationale": "Authentic intellectual work has real-world purpose, audience, and application beyond the classroom."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 93, "question": "The primary benefit of interdisciplinary teaching is:", "options": {"A": "Less planning for teachers", "B": "Helping students see connections across subjects", "C": "Reducing content standards", "D": "Eliminating subjects"}, "answer": "B", "rationale": "Interdisciplinary instruction helps students recognize and apply connections between different subject areas."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 94, "question": "A student's zone of proximal development can be identified by:", "options": {"A": "Standardized test scores", "B": "What they can do with and without assistance", "C": "IQ test results", "D": "Grade point average"}, "answer": "B", "rationale": "ZPD is determined by comparing independent performance with performance under guidance."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 95, "question": "Which practice is most likely to increase student motivation?", "options": {"A": "Frequent high-stakes testing", "B": "Choice in learning activities", "C": "Public comparison of grades", "D": "Repetitive drill work"}, "answer": "B", "rationale": "Autonomy and choice are key intrinsic motivators according to self-determination theory."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 96, "question": "According to research, praise for intelligence (e.g., \"You're so smart\") compared to praise for effort:", "options": {"A": "Is equally effective", "B": "May lead to fixed mindset and risk avoidance", "C": "Always improves performance", "D": "Is preferred by all students"}, "answer": "B", "rationale": "Intelligence praise promotes fixed mindset; effort praise promotes growth mindset and resilience."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 97, "question": "A student who refuses to attempt challenging work may be demonstrating:", "options": {"A": "High self-efficacy", "B": "Fear of failure and self-protection", "C": "Strong intrinsic motivation", "D": "Overconfidence"}, "answer": "B", "rationale": "Avoiding challenge can protect self-worth by avoiding potential failure evidence."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 98, "question": "Which is the most effective way to reduce academic dishonesty?", "options": {"A": "Harsher punishments", "B": "Teaching integrity and designing cheat-resistant assessments", "C": "Increasing surveillance", "D": "Ignoring minor incidents"}, "answer": "B", "rationale": "Prevention through integrity instruction and authentic assessment design is more effective than punishment."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 99, "question": "Formative assessment should be:", "options": {"A": "Graded and recorded", "B": "Low-stakes and used for improvement", "C": "Given only at year end", "D": "Standardized across all students"}, "answer": "B", "rationale": "Formative assessment is low-stakes, providing feedback for improvement without final grade pressure."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 100, "question": "The primary purpose of a diagnostic test is to:", "options": {"A": "Assign final grades", "B": "Identify strengths and weaknesses before instruction", "C": "Compare students nationally", "D": "Certify mastery"}, "answer": "B", "rationale": "Diagnostic assessment identifies prior knowledge and learning needs to guide instruction."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 101, "question": "A norm-referenced test is designed to:", "options": {"A": "Measure mastery of specific standards", "B": "Compare student performance to peers", "C": "Diagnose learning difficulties", "D": "Assess growth over time"}, "answer": "B", "rationale": "Norm-referenced tests rank students relative to a comparison group (norm group)."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 102, "question": "Criterion-referenced test interpretation answers the question:", "options": {"A": "\"How does this student compare to others?\"", "B": "\"What can this student do independently?\"", "C": "\"Is this student gifted?\"", "D": "\"What is the student's percentile rank?\""}, "answer": "B", "rationale": "Criterion-referenced tests describe what a student knows and can do against defined standards."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 103, "question": "A raw score alone is insufficient because it lacks:", "options": {"A": "Difficulty level", "B": "Meaning without interpretive context", "C": "Number of items", "D": "Student name"}, "answer": "B", "rationale": "Raw scores need interpretation through norms, standards, or comparison to have meaning."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 104, "question": "Standard deviation measures:", "options": {"A": "Average performance", "B": "Spread or variability of scores", "C": "Most frequent score", "D": "Middle score"}, "answer": "B", "rationale": "Standard deviation quantifies how spread out scores are from the mean."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 105, "question": "A test with high validity accurately:", "options": {"A": "Produces consistent results", "B": "Measures what it intends to measure", "C": "Is easy to administer", "D": "Takes little time"}, "answer": "B", "rationale": "Validity is the degree to which a test measures what it claims to measure."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 106, "question": "A reliable test produces:", "options": {"A": "Accurate measurement of intended construct", "B": "Consistent results across administrations", "C": "Easy-to-interpret scores", "D": "High scores for all"}, "answer": "B", "rationale": "Reliability is consistency of measurement across time, forms, or raters."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 107, "question": "Which type of validity is most important for a employment selection test?", "options": {"A": "Content validity", "B": "Predictive validity", "C": "Face validity", "D": "Construct validity"}, "answer": "B", "rationale": "Predictive validity shows how well test scores predict future job performance."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 108, "question": "A split-half reliability coefficient is used to measure:", "options": {"A": "Stability over time", "B": "Internal consistency", "C": "Inter-rater agreement", "D": "Equivalence of forms"}, "answer": "B", "rationale": "Split-half reliability assesses how consistently test items measure the same construct."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 109, "question": "Which is NOT a recommended practice for constructing multiple-choice items?", "options": {"A": "Using plausible distractors", "B": "Making all options similar length", "C": "Using \"all of the above\" frequently", "D": "Avoiding unintentional clues"}, "answer": "C", "rationale": "Overusing \"all of the above\" reduces item discrimination and may encourage guessing."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 110, "question": "A test item with a difficulty index of 0.90 is:", "options": {"A": "Very difficult", "B": "Very easy", "C": "Moderately difficult", "D": "Ideal"}, "answer": "B", "rationale": "A 0.90 difficulty index means 90% answered correctly – very easy item."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 111, "question": "A discrimination index of 0.10 indicates the item:", "options": {"A": "Excellent discriminator", "B": "Poor discriminator", "C": "Negative discriminator", "D": "Perfect discriminator"}, "answer": "B", "rationale": "Discrimination below 0.20 indicates poor ability to distinguish high from low performers."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 112, "question": "Items with negative discrimination should be:", "options": {"A": "Kept unchanged", "B": "Revised or discarded", "C": "Made more difficult", "D": "Made easier"}, "answer": "B", "rationale": "Negative discrimination suggests item flaws – revision or removal is needed."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 113, "question": "Which is a characteristic of effective distractors?", "options": {"A": "Obviously incorrect", "B": "Plausible and attractive to unprepared students", "C": "Identical in meaning to correct answer", "D": "Grammatically inconsistent"}, "answer": "B", "rationale": "Effective distracters are plausible options that attract students lacking knowledge."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 114, "question": "The primary limitation of true-false items is:", "options": {"A": "Difficulty of construction", "B": "High guessing probability (50%)", "C": "Time required to answer", "D": "Scoring difficulty"}, "answer": "B", "rationale": "True-false items have 50% chance of correct guessing, reducing reliability."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 115, "question": "Essay questions are most appropriate for assessing:", "options": {"A": "Recall of isolated facts", "B": "Ability to organize and synthesize information", "C": "Recognition of correct answers", "D": "Speed of response"}, "answer": "B", "rationale": "Essays assess higher-order thinking including organization, synthesis, and written expression."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 116, "question": "A major disadvantage of essay tests is:", "options": {"A": "Ease of construction", "B": "Low reliability in scoring (subjectivity)", "C": "Guessing factor", "D": "Quick administration"}, "answer": "B", "rationale": "Essay scoring suffers from low inter-rater reliability due to subjective judgment."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 117, "question": "Scoring rubrics improve essay test reliability by:", "options": {"A": "Eliminating all judgment", "B": "Providing explicit criteria for evaluation", "C": "Making all answers correct", "D": "Reducing scoring time"}, "answer": "B", "rationale": "Rubrics standardize scoring by specifying criteria and performance levels."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 118, "question": "A holistic rubric evaluates student work:", "options": {"A": "As separate criteria", "B": "As a single overall score", "C": "Without any criteria", "D": "Only on errors"}, "answer": "B", "rationale": "Holistic rubrics provide one integrated score reflecting overall quality."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 119, "question": "Which assessment is most appropriate for measuring a psychomotor skill?", "options": {"A": "Written test", "B": "Performance checklist with demonstration", "C": "Oral examination", "D": "Essay question"}, "answer": "B", "rationale": "Psychomotor skills require direct observation of physical performance using checklists."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 120, "question": "Anecdotal records are useful for:", "options": {"A": "Standardized comparison", "B": "Documenting specific incidents and behaviors", "C": "Measuring intelligence", "D": "Assigning final grades"}, "answer": "B", "rationale": "Anecdotal records capture authentic observations of specific behaviors in natural settings."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 121, "question": "A portfolio should include:", "options": {"A": "Only final products", "B": "Evidence of process, progress, and reflection", "C": "Only teacher-selected items", "D": "Only best work"}, "answer": "B", "rationale": "Comprehensive portfolios include drafts, revisions, reflections, and multiple work samples."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 122, "question": "Student self-assessment primarily develops:", "options": {"A": "Dependency on teacher", "B": "Metacognition and self-regulation", "C": "Competition with peers", "D": "Test-taking skills"}, "answer": "B", "rationale": "Self-assessment requires students to reflect on their own learning, building metacognitive awareness."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 123, "question": "Peer assessment is most effective when:", "options": {"A": "Students receive no training", "B": "Students are trained and given clear criteria", "C": "Only grades are shared", "D": "Anonymous only"}, "answer": "B", "rationale": "Structured peer assessment with training and rubrics produces reliable, beneficial feedback."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 124, "question": "Which is a summative assessment?", "options": {"A": "Exit ticket", "B": "Weekly quiz", "C": "Final exam", "D": "Classroom observation"}, "answer": "C", "rationale": "Summative assessment evaluates learning at the end of an instructional period."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 125, "question": "Which is a formative assessment?", "options": {"A": "Final exam", "B": "End-of-unit test", "C": "Thumbs up/down check", "D": "Standardized achievement test"}, "answer": "C", "rationale": "Quick checks like thumbs up/down provide immediate formative feedback during instruction."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 126, "question": "Assessment AS learning emphasizes:", "options": {"A": "Teacher judgment only", "B": "Students monitoring their own learning", "C": "External testing", "D": "Final grades"}, "answer": "B", "rationale": "Assessment as learning positions students as self-regulated learners who monitor their progress."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 127, "question": "Assessment FOR learning is characterized by:", "options": {"A": "Summative evaluation", "B": "Using results to adjust ongoing instruction", "C": "Ranking students", "D": "Certification"}, "answer": "B", "rationale": "Assessment for learning uses information formatively to improve teaching and learning."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 128, "question": "Which statement about grading is most accurate?", "options": {"A": "Grades should be based on single assessments", "B": "Multiple sources of evidence improve grade validity", "C": "Effort should be the only grading basis", "D": "Attendance determines grades"}, "answer": "B", "rationale": "Multiple assessment types and occasions provide more valid evidence of learning."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 129, "question": "Zeroes for missing work are problematic because they:", "options": {"A": "Accurately reflect learning", "B": "Distort achievement measurement with non-achievement factors", "C": "Motivate all students", "D": "Are mathematically appropriate"}, "answer": "B", "rationale": "Zeroes punish behavior, not measure learning, skewing grade meaning."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 130, "question": "Standards-based grading reports student progress on:", "options": {"A": "Comparison to peers", "B": "Specific learning standards", "C": "Effort and participation", "D": "Behavior only"}, "answer": "B", "rationale": "Standards-based grading communicates mastery of defined learning targets."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 131, "question": "A bell curve (normal distribution) in grading assumes:", "options": {"A": "All students should master content", "B": "Some students must fail by design", "C": "Grades reflect absolute mastery", "D": "Standards are irrelevant"}, "answer": "B", "rationale": "Norm-referenced grading distributes grades along a curve, assuming fixed proportions at each level."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 132, "question": "Which is a legal requirement for student records under FERPA?", "options": {"A": "Public posting of grades", "B": "Parent/guardian access rights", "C": "Permanent retention of all records", "D": "No confidentiality required"}, "answer": "B", "rationale": "FERPA guarantees parents and eligible students access to educational records."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 133, "question": "A teacher should share student progress information with:", "options": {"A": "Any interested party", "B": "Only parents/guardians and appropriate school personnel", "C": "All teachers regardless of role", "D": "Community members"}, "answer": "B", "rationale": "Student records are confidential, shared only with those having legitimate educational interest."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 134, "question": "Which is an appropriate response to a parent concerned about a low grade?", "options": {"A": "\"Your child doesn't try hard enough\"", "B": "\"Let's review the work together and discuss improvement strategies\"", "C": "\"Grades are final, nothing can be done\"", "D": "\"It's not my problem\""}, "answer": "B", "rationale": "Collaborative problem-solving with parents supports student success and maintains positive relationships."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 135, "question": "According to the Code of Ethics, teacher-parent conferences should be:", "options": {"A": "Avoided when possible", "B": "Conducted professionally with student welfare focus", "C": "Used to blame parents", "D": "Held only for complaints"}, "answer": "B", "rationale": "Professional teacher-parent communication focuses on collaborative support for student welfare."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 136, "question": "A student discloses abuse at home. The teacher should:", "options": {"A": "Promise complete confidentiality", "B": "Report immediately to designated authorities", "C": "Confront the parents", "D": "Ignore the disclosure"}, "answer": "B", "rationale": "Teachers are mandated reporters legally required to report suspected child abuse."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 137, "question": "Which is a violation of the Code of Ethics for Professional Teachers?", "options": {"A": "Accepting gifts from students during holidays", "B": "Soliciting gifts in exchange for grades", "C": "Attending professional development", "D": "Joining teacher organizations"}, "answer": "B", "rationale": "Soliciting favors for grades is unethical and violates professional standards."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 138, "question": "A teacher's right to academic freedom includes:", "options": {"A": "Teaching any content regardless of curriculum", "B": "Professional judgment within curriculum guidelines", "C": "Ignoring school policies", "D": "Changing grades arbitrarily"}, "answer": "B", "rationale": "Academic freedom allows professional instructional decisions aligned with curriculum."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 139, "question": "The \"Teacher and the Community\" section of the Code of Ethics requires teachers to:", "options": {"A": "Avoid community involvement", "B": "Provide leadership for community betterment", "C": "Only work during school hours", "D": "Ignore local issues"}, "answer": "B", "rationale": "Teachers are expected to provide leadership and initiative for community development."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 140, "question": "Continuing Professional Development (CPD) is required to:", "options": {"A": "Maintain and update professional competence", "B": "Increase salary automatically", "C": "Reduce teaching hours", "D": "Avoid classroom duties"}, "answer": "A", "rationale": "CPD ensures teachers maintain current knowledge and skills throughout their careers."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 141, "question": "A teacher may be administratively charged for:", "options": {"A": "Professional disagreements", "B": "Immoral conduct or gross misconduct", "C": "Joining professional organizations", "D": "Pursuing graduate studies"}, "answer": "B", "rationale": "Immoral or unethical conduct violates professional standards and may result in charges."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 142, "question": "According to RA 4670 (Magna Carta for Teachers), teachers are entitled to:", "options": {"A": "Unlimited sick leave", "B": "Study leave with pay", "C": "Free housing", "D": "Lifetime pension regardless of service"}, "answer": "B", "rationale": "RA 4670 provides study leave privileges for professional development."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 143, "question": "The \"teacher as a person\" section of the Code emphasizes that teachers should:", "options": {"A": "Have no personal life", "B": "Maintain a dignified and professional personality", "C": "Hide all personal beliefs", "D": "Avoid community interactions"}, "answer": "B", "rationale": "Teachers are expected to maintain dignity, integrity, and professional conduct in personal life."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 144, "question": "Which action demonstrates professional collegiality?", "options": {"A": "Competing aggressively with colleagues", "B": "Sharing materials and supporting new teachers", "C": "Criticizing colleagues publicly", "D": "Hoarding successful strategies"}, "answer": "B", "rationale": "Professional collegiality includes collaboration, support, and resource sharing."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 145, "question": "A teacher who publicly criticizes school administration without exhausting internal remedies violates:", "options": {"A": "No violation", "B": "Professional ethics requiring orderly redress", "C": "Academic freedom", "D": "Union rights"}, "answer": "B", "rationale": "Professional ethics require addressing concerns through proper channels before public criticism."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 146, "question": "The principle of \"in loco parentis\" means teachers:", "options": {"A": "Replace parents completely", "B": "Act in place of parents during school hours", "C": "Have no responsibility for students", "D": "Cannot discipline students"}, "answer": "B", "rationale": "Teachers stand in parental role for student safety and welfare during school hours."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 147, "question": "A teacher's responsibility for student safety includes:", "options": {"A": "Only during instructional time", "B": "During all school-sponsored activities and supervision periods", "C": "Never off school grounds", "D": "Only in the classroom"}, "answer": "B", "rationale": "Duty of care extends to all school-supervised activities, including field trips and extracurriculars."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 148, "question": "Which is an example of reasonable force in student discipline?", "options": {"A": "Physical punishment of any kind", "B": "Restraining a student from harming others", "C": "Hitting with objects", "D": "Shoving as punishment"}, "answer": "B", "rationale": "Corporal punishment is prohibited; reasonable force is limited to protecting safety."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 149, "question": "A teacher's duty to report suspected child abuse is:", "options": {"A": "Optional", "B": "Mandatory by law", "C": "Only if confirmed", "D": "Only for physical abuse"}, "answer": "B", "rationale": "Mandated reporting laws require reporting reasonable suspicion, not confirmation."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 150, "question": "The professional teacher's ultimate responsibility is to:", "options": {"A": "Satisfy administrators", "B": "Promote student learning and welfare", "C": "Maximize personal income", "D": "Minimize workload"}, "answer": "B", "rationale": "Student learning and welfare is the primary professional responsibility of teachers."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 1, "question": "Which Republic Act is known as the \"Governance of Basic Education Act\"?", "options": {"A": "RA 9155", "B": "RA 7836", "C": "RA 10533", "D": "RA 4670"}, "answer": "A", "rationale": "RA 9155 (Governance of Basic Education Act) decentralized the management of basic education and renamed the DECS to DepEd, focusing on stakeholder accountability and local governance."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 2, "question": "Under RA 9155, who is the \"administrator of the school\" who is primarily responsible for the instructional program?", "options": {"A": "Principal", "B": "Superintendent", "C": "Division Supervisor", "D": "Master Teacher"}, "answer": "A", "rationale": "The Principal is the head of the school and is directly responsible for the instructional and administrative management of the school under RA 9155."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 3, "question": "In statistical treatment of test scores, a measure that indicates the \"spread\" or dispersion of scores is called:", "options": {"A": "Central tendency", "B": "Standard error", "C": "Variability", "D": "Correlation"}, "answer": "C", "rationale": "Variability (measured by range, standard deviation, or variance) describes how scores are spread out or clustered together."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 4, "question": "A standard deviation of 0 (zero) means that:", "options": {"A": "The test was very difficult", "B": "The test was very easy", "C": "All scores are identical", "D": "The scores are widely spread"}, "answer": "C", "rationale": "Zero standard deviation indicates no variability—every student got exactly the same score."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 5, "question": "A positive correlation of +0.85 between hours studied and test scores indicates:", "options": {"A": "High negative relationship", "B": "Low positive relationship", "C": "High positive relationship", "D": "No relationship"}, "answer": "C", "rationale": "A correlation of +0.85 is strong positive, meaning more study hours are strongly associated with higher test scores."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 6, "question": "In a normal distribution, what percentage of scores falls within one standard deviation above and below the mean?", "options": {"A": "50%", "B": "68%", "C": "95%", "D": "99%"}, "answer": "B", "rationale": "In a normal bell curve, approximately 68.26% of scores lie within ±1 standard deviation from the mean."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 7, "question": "The median is the preferred measure of central tendency when:", "options": {"A": "Scores are normally distributed", "B": "There are extreme scores (outliers)", "C": "The data is nominal", "D": "Measuring the most frequent score"}, "answer": "B", "rationale": "The median is not affected by outliers or extreme scores, making it more representative than the mean for skewed distributions."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 8, "question": "Which historical event established the use of English as the medium of instruction in Philippine schools?", "options": {"A": "Jones Law of 1916", "B": "Taft Commission of 1901", "C": "Educational Decree of 1863", "D": "Monroe Survey of 1925"}, "answer": "B", "rationale": "The Taft Commission (Philippine Commission) Act No. 74 of 1901 established the public school system and mandated English as the medium of instruction."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 9, "question": "The \"Pangasinan Plan\" is notable in Philippine education history for introducing:", "options": {"A": "The vernacular as medium of instruction in Grade 1", "B": "Free secondary education", "C": "The double-single session", "D": "The National College Entrance Examination (NCEE)"}, "answer": "A", "rationale": "The Pangasinan Plan (experimental in the 1950s) pioneered the use of the local vernacular as medium of instruction for Grade 1 to improve literacy."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 10, "question": "The \"Ten-Movement\" in Philippine educational history refers to:", "options": {"A": "Ten years of compulsory education", "B": "Ten reforms proposed by the Quezon administration", "C": "Ten months of school calendar", "D": "Ten school districts per division"}, "answer": "B", "rationale": "The Ten-Year Educational Program (Ten-Movement) was proposed during President Quezon's administration to address educational problems like access, quality, and funding."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 11, "question": "According to the Japanese Educational Policy during the occupation (1942-1945), which was emphasized?", "options": {"A": "English language proficiency", "B": "Love for American culture", "C": "Spread of Japanese language and culture", "D": "European classical education"}, "answer": "C", "rationale": "During the Japanese occupation, schools emphasized Nihongo (Japanese language), Oriental cultures, and the cessation of English and American cultural influence."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 12, "question": "The main purpose of the \"tri-focalization\" of Philippine education (CHED, TESDA, DepEd) under RA 7722 and RA 7796 is to:", "options": {"A": "Centralize all education under one body", "B": "Provide specialized focus on basic, tertiary, and technical-vocational education", "C": "Eliminate private education", "D": "Promote only science and math"}, "answer": "B", "rationale": "Tri-focalization created three specialized agencies: DepEd (basic), CHED (higher/tertiary), and TESDA (technical-vocational) for focused governance."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 13, "question": "In the \"Cognitive Domain\" of Bloom's Taxonomy, the lowest level of learning is:", "options": {"A": "Application", "B": "Comprehension", "C": "Knowledge", "D": "Analysis"}, "answer": "C", "rationale": "Knowledge (remembering/recall) is the foundation level of Bloom's Cognitive Taxonomy."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 14, "question": "The highest level of the Affective Domain in Krathwohl's Taxonomy is:", "options": {"A": "Responding", "B": "Valuing", "C": "Characterization", "D": "Organization"}, "answer": "C", "rationale": "Characterization (internalizing values to control behavior) is the highest level of the affective domain."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 15, "question": "In the Psychomotor Domain, the level where a learner performs a skill with precision and without error is called:", "options": {"A": "Imitation", "B": "Manipulation", "C": "Precision", "D": "Articulation"}, "answer": "C", "rationale": "Precision is the third level of Simpson's Psychomotor Domain where the skill is performed accurately and independently."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 16, "question": "A teacher gives a zero for a student who submitted a project two weeks late. This is an example of:", "options": {"A": "Positive reinforcement", "B": "Negative reinforcement", "C": "Presentation punishment (positive punishment)", "D": "Removal punishment (negative punishment)"}, "answer": "C", "rationale": "Presentation punishment (positive punishment) involves adding an aversive consequence (zero) to decrease the behavior (lateness)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 17, "question": "Taking away a child's cellphone for breaking a rule is an example of:", "options": {"A": "Positive reinforcement", "B": "Negative reinforcement", "C": "Positive punishment", "D": "Negative punishment"}, "answer": "D", "rationale": "Negative punishment (removal punishment) involves removing a pleasant stimulus (cellphone) to decrease behavior."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 18, "question": "A student studies hard to avoid being scolded by parents. This motivation is:", "options": {"A": "Intrinsic", "B": "Extrinsic", "C": "Cognitive", "D": "Metacognitive"}, "answer": "B", "rationale": "Extrinsic motivation comes from external consequences (avoiding punishment) rather than internal satisfaction."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 19, "question": "\"Self-actualization\" is the highest need in Maslow's Hierarchy. This term was coined by:", "options": {"A": "Carl Rogers", "B": "Abraham Maslow", "C": "Kurt Goldstein", "D": "B.F. Skinner"}, "answer": "C", "rationale": "Kurt Goldstein originally coined the term \"self-actualization,\" though Maslow popularized it in his hierarchy."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 20, "question": "The \"Looking Glass Self\" theory explains that self-concept develops from:", "options": {"A": "Genetic inheritance", "B": "How we think others perceive us", "C": "Academic achievement", "D": "Physical appearance"}, "answer": "B", "rationale": "Charles Horton Cooley's Looking Glass Self theory states self-concept develops by imagining how others see and judge us."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 21, "question": "In Philippine education, the \"School-Based Management\" (SBM) principle empowers:", "options": {"A": "The Principal only", "B": "The School Head and stakeholders", "C": "The District Supervisor", "D": "The Regional Director"}, "answer": "B", "rationale": "SBM empowers the school head, teachers, parents, students, and community stakeholders in school decision-making."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 22, "question": "RA 10157 institutionalized which educational level in the Philippines?", "options": {"A": "Senior High School", "B": "Kindergarten", "C": "Alternative Learning System", "D": "Special Education"}, "answer": "B", "rationale": "RA 10157 (Kindergarten Education Act) made Kindergarten compulsory and mandatory for all five-year-old children."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 23, "question": "In the K-12 curriculum, a \"Spiral Progression\" approach means:", "options": {"A": "Teaching the same topics at increasing depth each year", "B": "Teaching all topics only once", "C": "Students choose their own sequence", "D": "Subjects are taught separately"}, "answer": "A", "rationale": "Spiral progression revisits the same concepts each year with increasing complexity and depth, rather than one-time coverage."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 24, "question": "Which of the following is NOT a core subject in the Senior High School curriculum?", "options": {"A": "Oral Communication", "B": "Earth and Life Science", "C": "Plumbing and Pipefitting", "D": "Personal Development"}, "answer": "C", "rationale": "Plumbing is a specialized TVL track subject, not a core subject. Core subjects are common to all SHS students."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 25, "question": "The \"Magna Carta for Public School Teachers\" (RA 4670) grants teachers the right to:", "options": {"A": "Go on strike anytime", "B": "Academic freedom without limits", "C": "Organize and join unions", "D": "Refuse assignments without reason"}, "answer": "C", "rationale": "RA 4670 Section 14 guarantees teachers the right to form, join, and maintain labor organizations."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 26, "question": "In the Code of Ethics, a teacher should NOT:", "options": {"A": "Attend professional development", "B": "Use school property for personal gain", "C": "Vote in local elections", "D": "Join teacher organizations"}, "answer": "B", "rationale": "The Code prohibits using school property or resources for personal gain or private business."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 27, "question": "Which Philippine president signed into law the creation of the Professional Regulation Commission (PRC)?", "options": {"A": "Ferdinand Marcos", "B": "Corazon Aquino", "C": "Fidel Ramos", "D": "Joseph Estrada"}, "answer": "A", "rationale": "Presidential Decree 223, signed by President Ferdinand Marcos in 1973, created the Professional Regulation Commission."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 28, "question": "PD 1006 is the legal basis for the professionalization of teachers. PD stands for:", "options": {"A": "Public Decree", "B": "Presidential Decree", "C": "Professional Decree", "D": "Philippine Decree"}, "answer": "B", "rationale": "PD 1006 was issued by President Marcos as a Presidential Decree before the 1987 Constitution."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 29, "question": "The \"Teacher Education Council\" (TEC) was established under:", "options": {"A": "RA 7722", "B": "RA 7784", "C": "RA 7796", "D": "RA 9155"}, "answer": "B", "rationale": "RA 7784 (Teacher Education Council Act) created the TEC to improve teacher education quality in the Philippines."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 30, "question": "In research terminology, the \"independent variable\" is the variable that is:", "options": {"A": "Measured as the outcome", "B": "Manipulated by the researcher", "C": "Controlled by the participant", "D": "Irrelevant to the study"}, "answer": "B", "rationale": "The independent variable is the presumed cause or treatment that the researcher manipulates."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 31, "question": "The \"dependent variable\" in an experiment is:", "options": {"A": "The treatment applied", "B": "The measured outcome or effect", "C": "The control group", "D": "The research hypothesis"}, "answer": "B", "rationale": "The dependent variable is the measured outcome expected to change due to the independent variable manipulation."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 32, "question": "Action research in education is primarily aimed at:", "options": {"A": "Publishing in international journals", "B": "Solving immediate classroom problems", "C": "Generalizing findings to all schools", "D": "Replacing traditional teaching"}, "answer": "B", "rationale": "Action research is practitioner-focused research to solve specific, immediate problems in one's own classroom or school."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 33, "question": "A \"case study\" research design focuses on:", "options": {"A": "Large sample sizes", "B": "Statistical correlations", "C": "In-depth analysis of a single subject or group", "D": "Random assignment"}, "answer": "C", "rationale": "Case studies provide detailed, contextual analysis of one or few bounded systems (individual, class, school)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 34, "question": "The \"Hawthorne Effect\" in research refers to:", "options": {"A": "Participants acting naturally", "B": "Participants changing behavior because they know they are observed", "C": "The placebo effect", "D": "Researcher bias"}, "answer": "B", "rationale": "The Hawthorne Effect is the alteration of behavior due to awareness of being studied, not the treatment itself."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 35, "question": "Which is NOT an ethical requirement in educational research?", "options": {"A": "Informed consent", "B": "Anonymity and confidentiality", "C": "Deception of participants without disclosure", "D": "Right to withdraw"}, "answer": "C", "rationale": "Deception is generally prohibited unless justified and followed by debriefing; undisclosed deception is unethical."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 36, "question": "The \"DECS Order\" that abolished the NCEE (National College Entrance Examination) was issued in what year?", "options": {"A": "1972", "B": "1986", "C": "1994", "D": "2001"}, "answer": "C", "rationale": "DECS Order No. 35, s. 1994 abolished the NCEE to promote access to tertiary education and align with the constitution on educational rights."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 37, "question": "The \"Educational Decree of 1863\" during the Spanish colonial period is significant because it:", "options": {"A": "Established the University of Santo Tomas", "B": "Established a normal school for male teachers", "C": "Established free public education system", "D": "Abolished religious instruction"}, "answer": "C", "rationale": "The Educational Decree of 1863 provided for free public primary education and the establishment of a normal school (male teachers) in Manila."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 38, "question": "The first normal school in the Philippines, the \"Philippine Normal School\" (now PNU), was established by the Americans in:", "options": {"A": "1898", "B": "1901", "C": "1907", "D": "1916"}, "answer": "B", "rationale": "Act No. 74 of 1901 established the Philippine Normal School in Manila to train Filipino teachers."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 39, "question": "The \"Jones Law of 1916\" (Philippine Autonomy Act) mandated that:", "options": {"A": "English is the sole medium of instruction", "B": "The Governor-General appoints the Director of Education", "C": "Religious instruction is mandatory", "D": "The University of the Philippines is established"}, "answer": "B", "rationale": "The Jones Law gave the Governor-General authority to appoint the Director of Education, centralizing educational control."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 40, "question": "In qualitative research, \"triangulation\" means:", "options": {"A": "Using three research assistants", "B": "Using multiple data sources or methods to verify findings", "C": "Conducting three rounds of interviews", "D": "Statistically analyzing three variables"}, "answer": "B", "rationale": "Triangulation uses multiple methods, sources, or investigators to cross-validate findings and reduce bias."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 41, "question": "A Type I error in hypothesis testing means:", "options": {"A": "Accepting a true null hypothesis", "B": "Rejecting a false null hypothesis", "C": "Rejecting a true null hypothesis", "D": "Accepting a false null hypothesis"}, "answer": "C", "rationale": "Type I error (false positive) is rejecting the null hypothesis when it is actually true."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 42, "question": "A Type II error means:", "options": {"A": "Rejecting a true null hypothesis", "B": "Accepting a false null hypothesis", "C": "Rejecting a false null hypothesis", "D": "Accepting a true null hypothesis"}, "answer": "B", "rationale": "Type II error (false negative) is failing to reject a null hypothesis that is actually false."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 43, "question": "The \"p-value\" in statistics represents:", "options": {"A": "The probability that the null hypothesis is true", "B": "The probability of obtaining results as extreme as observed if null is true", "C": "The effect size of the treatment", "D": "The sample size adequacy"}, "answer": "B", "rationale": "The p-value is the probability of observing the data (or more extreme) assuming the null hypothesis is true."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 44, "question": "The historical \"Rizal Law\" (RA 1425) requires:", "options": {"A": "Teaching English only in schools", "B": "Teaching the life and works of Jose Rizal in all schools", "C": "Mandatory military training", "D": "Free public college education"}, "answer": "B", "rationale": "RA 1425 mandates the inclusion of Rizal's life, works, and writings (Noli Me Tangere and El Filibusterismo) in school curricula."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 45, "question": "The \"Gabaldon Act\" (Act No. 1801) of 1907 provided for:", "options": {"A": "Free high school education", "B": "The construction of public school buildings", "C": "The establishment of the University of the Philippines", "D": "The pensionado program"}, "answer": "B", "rationale": "The Gabaldon Act appropriated funds for the construction of permanent public school buildings across the Philippines."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 46, "question": "In the context of Philippine educational history, \"Pensionados\" were:", "options": {"A": "Teachers who retired early", "B": "Filipino scholars sent to the US for higher education", "C": "American volunteer teachers (Thomasites)", "D": "Spanish missionaries"}, "answer": "B", "rationale": "Pensionados were Filipino students sponsored by the Philippine government to study in the United States under the Pensionado Act (1903)."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 47, "question": "The \"Thomasites\" were:", "options": {"A": "The first Filipino teachers", "B": "American teachers who arrived on the USS Thomas in 1901", "C": "Spanish friar educators", "D": "Japanese occupation teachers"}, "answer": "B", "rationale": "The Thomasites were approximately 600 American teachers who arrived in 1901 on the USS Thomas to establish the American public school system in the Philippines."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 48, "question": "Which law abolished the \"two-year\" lower tertiary education and created the K-12 program?", "options": {"A": "RA 7722", "B": "RA 10533", "C": "RA 9155", "D": "RA 7796"}, "answer": "B", "rationale": "RA 10533 (Enhanced Basic Education Act of 2013) added Kindergarten, Grades 11 and 12, creating the K-12 system."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 49, "question": "Under RA 10533, the core subjects for Senior High School are taken by:", "options": {"A": "Only students in Academic track", "B": "Only students in TVL track", "C": "All students regardless of track", "D": "Only honor students"}, "answer": "C", "rationale": "Core subjects (e.g., Oral Communication, Reading and Writing, Earth Science) are required for all SHS students across all tracks."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 50, "question": "The \"Alternative Learning System\" (ALS) is designed for:", "options": {"A": "Gifted students", "B": "Out-of-school youth and adults who cannot attend formal school", "C": "Private school students only", "D": "College students"}, "answer": "B", "rationale": "ALS provides a flexible, non-formal education path for OSY (Out-of-School Youth) and adults to complete basic education."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 51, "question": "The \"Gulick's POSDCORB\" refers to the functions of:", "options": {"A": "Teaching", "B": "Administration", "C": "Learning", "D": "Research"}, "answer": "B", "rationale": "Luther Gulick's POSDCORB (Planning, Organizing, Staffing, Directing, Coordinating, Reporting, Budgeting) outlines administrative functions."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 52, "question": "In school administration, \"delegation of authority\" means:", "options": {"A": "Complete loss of control by the principal", "B": "Assigning responsibility while retaining accountability", "C": "Avoiding decision-making", "D": "Centralizing all power"}, "answer": "B", "rationale": "Delegation transfers responsibility for tasks while the delegator remains ultimately accountable for outcomes."}, {"set": "SET D: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 53, "question": "Which of the following is a \"human relations\" approach to educational leadership?", "options": {"A": "Strict top-down command", "B": "Focus on teacher morale and participatory decision-making", "C": "Purely bureaucratic structures", "D": "Autocratic leadership"}, "answer
