<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
    color: #fff;
    padding: 20px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .3px; }
  header p  { font-size: .85rem; opacity: .85; margin-top: 4px; }

  /* ── Toolbar ── */
  #toolbar {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }

  #toolbar label { font-size: .85rem; font-weight: 600; color: #4a5568; }

  #setSelect, #searchBox {
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: .88rem;
    color: #2d3748;
    background: #f7fafc;
    outline: none;
    transition: border-color .2s;
  }
  #setSelect:focus, #searchBox:focus { border-color: #3182ce; }
  #setSelect { cursor: pointer; }
  #searchBox { flex: 1; min-width: 180px; max-width: 320px; }

  #scoreBoard {
    margin-left: auto;
    font-size: .84rem;
    background: #ebf8ff;
    border: 1px solid #bee3f8;
    border-radius: 6px;
    padding: 5px 12px;

    background: #e53e3e;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: .84rem;
    cursor: pointer;
    font-weight: 600;
    transition: background .2s;
  }
  #resetBtn:hover { background: #c53030; }

  /* ── Set Banner ── */
  .set-banner {
    margin: 20px 16px 6px;
    padding: 10px 16px;
    background: linear-gradient(90deg, #2b6cb0, #4299e1);
    color: #fff;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: .3px;
  }

  /* ── Question Card ── */
  .q-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    margin: 10px 16px;
    padding: 16px 18px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    transition: box-shadow .2s;
  }
  .q-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1); }

  .q-header {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .q-num {
    background: #2b6cb0;
    color: #fff;
    font-size: .78rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    margin-top: 2px;
  }
  .q-text { font-size: .95rem; line-height: 1.55; font-weight: 500; }

  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 7px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    border: 1.5px solid #e2e8f0;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .1s;
    user-select: none;
    font-size: .9rem;
    line-height: 1.45;
    background: #f7fafc;
  }
  .option:hover { background: #ebf8ff; border-color: #90cdf4; }
  .option .opt-letter {
    font-weight: 700;
    color: #2b6cb0;
    min-width: 18px;
    font-size: .88rem;
    margin-top: 1px;
  }

  /* States */
  .option.correct {
    background: #f0fff4 !important;
    border-color: #38a169 !important;
  }
  .option.correct .opt-letter { color: #276749; }

  .option.wrong {
    background: #fff5f5 !important;
    border-color: #e53e3e !important;
  }
  .option.wrong .opt-letter { color: #9b2c2c; }

  .option.reveal-correct {
    background: #e6ffed !important;
    border-color: #38a169 !important;
    border-width: 2px;
  }

  .option.disabled { cursor: not-allowed; pointer-events: none; }

  /* ── Hint ── */
  .dbl-hint {
    font-size: .72rem;
    color: #a0aec0;
    margin-top: 8px;
    padding-left: 2px;
  }

  /* ── Explanation ── */
  .explanation {
    display: none;
    margin-top: 12px;
    padding: 10px 14px;
    background: #fffbeb;
    border-left: 4px solid #d69e2e;
    border-radius: 0 6px 6px 0;
    font-size: .86rem;
    line-height: 1.6;
    color: #744210;
  }
  .explanation.show { display: block; }
  .explanation strong { font-size: .78rem; text-transform: uppercase;
    letter-spacing: .5px; color: #b7791f; display: block; margin-bottom: 4px; }

  /* ── No results ── */
  #noResults {
    text-align: center;
    padding: 40px;
    color: #718096;
    font-size: .95rem;
    display: none;
  }

  /* ── Scroll to top ── */
  #topBtn {
    position: fixed;
    bottom: 22px;
    right: 22px;
    background: #2b6cb0;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,.25);
    display: none;
    transition: background .2s;
    z-index: 200;
  }
  #topBtn:hover { background: #1a4a8a; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.1rem; }
    .q-card { margin: 8px 8px; padding: 12px 12px; }
    .set-banner { margin: 14px 8px 4px; }
  }
</style>

// ── Data ──────────────────────────────────────────────────────────────────
const ALL_QUESTIONS = [{"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 1, "question": "Which practice does NOT fit in a classroom that recognizes individual differences?", "options": {"A": "Uniform requirements", "B": "Sharing from multiple perspective", "C": "Accommodating student's learning styles", "D": "Various modes of assessing learning"}, "answer": "A", "rationale": "Uniform requirements disregard individual differences among students. Recognizing individual differences means adapting instruction, assessment, and requirements to accommodate diverse learning needs, styles, and abilities ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 2, "question": "A teacher put together the output of her colleagues in one workshop and published it with her name as author. Which is unprofessional about the teacher's behavior?", "options": {"A": "Failing to correct what appears to be unprofessional conduct", "B": "Giving due credit to others for their work", "C": "Not giving due credit to others for their work", "D": "Holding inviolate all confidential information concerning associates"}, "answer": "C", "rationale": "The teacher committed plagiarism by not giving due credit to colleagues for their work. Professional ethics require acknowledging others' contributions and intellectual property ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 3, "question": "\"The greatest happiness lies in the contemplative use of the mind,\" said Plato. Therefore, let us give more opportunities for our students to do __________.", "options": {"A": "Social interaction", "B": "Introspection", "C": "Role playing", "D": "Cooperative learning"}, "answer": "B", "rationale": "Plato emphasized contemplation and introspection as the highest form of mental activity. Introspection allows students to reflect deeply and examine their own thoughts, aligning with Plato's philosophy ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 4, "question": "In what way can teachers uphold the highest possible standards of the teaching profession?", "options": {"A": "By pointing out the advantages of joining the teaching profession", "B": "By good grooming to change people's perception of teacher", "C": "By continuously improving themselves personally and professionally", "D": "None of the above"}, "answer": "C", "rationale": "Continuous professional and personal development is key to upholding professional standards. The Code of Ethics mandates teachers to engage in ongoing professional growth ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 5, "question": "Pavlov is to classical conditioning as ______ is to operant conditioning.", "options": {"A": "A. Bandura", "B": "J. Holt", "C": "J. Watson", "D": "B.F. Skinner"}, "answer": "D", "rationale": "Ivan Pavlov pioneered classical conditioning, while B.F. Skinner is the father of operant conditioning, which focuses on consequences shaping behavior ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 6, "question": "To reach out to clientele who cannot be in the classroom for one reason or another, which of the following was established?", "options": {"A": "Special education (SPED)", "B": "Informal education", "C": "Alternative learning delivery system", "D": "Pre-school education"}, "answer": "C", "rationale": "Alternative Learning System (ALS) was established to provide education to out-of-school youth and adults who cannot attend formal classroom instruction ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 7, "question": "You arrange rows of blocks so a row of 5 blocks is longer than a row of 7 blocks. When asked which row has more, Grade 1 pupils say the row making the longer line. Based on Piaget's theory, what problem is illustrated?", "options": {"A": "Conservation problem", "B": "Assimilation problem", "C": "Egocentrism problem", "D": "Accommodation problem"}, "answer": "A", "rationale": "This illustrates lack of conservation—the inability to recognize that quantity remains the same despite changes in appearance. Pre-operational children focus on perceptual features (length) rather than number ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 8, "question": "In the context of multiple intelligences, which is the weakness of paper-pencil tests?", "options": {"A": "It puts non-linguistically intelligent pupils at a disadvantage", "B": "It requires paper and printing and is so expensive", "C": "It utilizes so much time", "D": "It lacks reliability"}, "answer": "A", "rationale": "Paper-pencil tests primarily measure linguistic and logical-mathematical intelligences, disadvantaging students with other intelligences (e.g., bodily-kinesthetic, spatial, musical) ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 9, "question": "Were teachers in the Philippines required a professional license since the establishment of the Philippine educational system?", "options": {"A": "7836 (Philippine Teachers Professionalization Act of 1994) made the licensure examination mandatory for teachers. Before this law, a teaching certificate sufficed .", "B": "Yes, it was required since the Americans established the educational system", "C": "No, it was only with the effectivity of R.A. 7836 that a professional license was required", "D": "Yes, except for the Thomasites"}, "answer": "C", "rationale": "R.A. 7836 (Philippine Teachers Professionalization Act of 1994) made the licensure examination mandatory for teachers. Before this law, a teaching certificate sufficed ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 10, "question": "The increase in the number of school children left by OFW parents intensifies the teacher role as ______________.", "options": {"A": "Student's friends", "B": "Guidance counselors", "C": "Facilitator of learning", "D": "Substitute parents"}, "answer": "D", "rationale": "With OFW parents abroad, teachers often act as substitute parents (in loco parentis), providing emotional support and guidance alongside academic instruction ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 11, "question": "The Thematic Apperception Test is an example of a (an) __________.", "options": {"A": "Self-report technique", "B": "Projective technique", "C": "Interest inventory", "D": "Socio-metric technique"}, "answer": "B", "rationale": "The Thematic Apperception Test (TAT) is a projective technique where individuals project their unconscious feelings and motives onto ambiguous pictures ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 12, "question": "The following are features of the Restructured Basic Education Curriculum, except:", "options": {"A": "Increased time for tasks to gain mastery of competencies", "B": "Interdisciplinary modes of teaching", "C": "Greater emphasis on content, less on the learning process", "D": "Stronger integration of competencies and values across learning areas"}, "answer": "C", "rationale": "The RBEC emphasized the learning process, not just content. Greater emphasis on content over process contradicts the learner-centered approach of the curriculum ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 13, "question": "Each teacher is a trustee of the cultural and educational heritage of the nation and is under obligation to transmit to learners such heritage. Which practice fulfills such obligation?", "options": {"A": "Use of the latest instructional technology", "B": "Study of the life of Filipino heroes", "C": "Use of interactive teaching strategies", "D": "Observing continuing professional education"}, "answer": "B", "rationale": "Studying Filipino heroes transmits cultural and historical heritage, fulfilling the teacher's role as a cultural trustee as mandated by the Code of Ethics ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 14, "question": "Which of these can measure awareness of values?", "options": {"A": "Projective techniques", "B": "Rating scales", "C": "Moral dilemmas", "D": "Sociogram"}, "answer": "C", "rationale": "Moral dilemmas, like Kohlberg's, effectively measure values awareness by presenting situations requiring moral judgment and revealing value priorities ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 15, "question": "If this need is not met, the adolescent tends to be critical and always tries to find fault. This is the need:", "options": {"A": "For adventure", "B": "For recognition", "C": "To belong", "D": "For material security"}, "answer": "C", "rationale": "According to Maslow, belongingness needs—when unmet—lead to loneliness, social anxiety, and critical behavior, especially during adolescence ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 16, "question": "Which of these systems of learning includes ways and methods used in preserving and building certain within cultural communities?", "options": {"A": "Non-formal learning", "B": "Multi-level learning", "C": "Cultural learning", "D": "Indigenous learning"}, "answer": "D", "rationale": "Indigenous learning systems preserve cultural heritage through traditional methods passed down generations within cultural communities ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 17, "question": "The best way the teacher can be of the appropriateness of an instructional material is to:", "options": {"A": "Try it out before using it in class", "B": "Consider its technical quality", "C": "Consider its availability", "D": "Consider its cost"}, "answer": "A", "rationale": "Field testing materials before classroom use ensures appropriateness, effectiveness, and alignment with learning objectives ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 18, "question": "The educational implementation of research findings relative to the ability of dull learners and bright learners to organize and generalize is for teacher:", "options": {"A": "To make bright learners guide dull ones in learning to generalize", "B": "To make bright learners generalize and dull ones memorize", "C": "To give dull learners more concrete experiences as basis for generalizing", "D": "To give both dull and bright learners concrete and abstract experiences"}, "answer": "C", "rationale": "Dull learners need more concrete experiences before generalizing. Research shows they require hands-on examples before understanding abstract concepts ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 19, "question": "A student was diagnosed to have a high IQ but is failing in his academic subject. What should the teacher do to help him?", "options": {"A": "Talk to his parents", "B": "Examine his study habits", "C": "Talk to the student and find out his problem", "D": "Refer him to the guidance counselor"}, "answer": "C", "rationale": "Direct communication with the student best identifies underlying issues causing underachievement despite high IQ potential ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 20, "question": "Teacher should bear in mind that the period of greatest mental development is from:", "options": {"A": "9 to 12 years", "B": "12 to 15 years", "C": "6 to 9 years", "D": "3 to 6 years"}, "answer": "D", "rationale": "Ages 3-6 represent the period of greatest mental development, with rapid brain growth and cognitive milestone achievement ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 21, "question": "Which is the true foundation of the social order?", "options": {"A": "Strong political leadership", "B": "The reciprocation of rights and duties", "C": "Equitable distribution of wealth", "D": "Obedient citizenry"}, "answer": "B", "rationale": "Social order is built on reciprocal rights and duties where citizens fulfill obligations while enjoying corresponding rights ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 22, "question": "When engaged in external criticism in historical research, what am I occupied with? The _______ of the document.", "options": {"A": "Author", "B": "Authenticity", "C": "Source", "D": "Accuracy"}, "answer": "B", "rationale": "External criticism verifies document authenticity—determining if the document is genuine, not forged or tampered with ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 23, "question": "What should a teacher do before constructing items for a particular test?", "options": {"A": "Prepare a table of specifications", "B": "Review the previous lessons", "C": "Determine the length of time for answering", "D": "Announce to students the scope of the test"}, "answer": "A", "rationale": "A Table of Specifications ensures content validity by mapping test items to learning objectives and topics ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 24, "question": "Who expounded on the need to study the child carefully for individualized instruction?", "options": {"A": "Da Feltre", "B": "Erasmus", "C": "Boccaccio", "D": "Ascham"}, "answer": "D", "rationale": "Roger Ascham, in \"The Schoolmaster,\" advocated studying each child's nature for individualized instruction ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 25, "question": "Which is the best situation wherein you can balance rights and authority?", "options": {"A": "Allow their only daughter's suitor to come and go as she pleases", "B": "Cautioun their only daughter's choice of a boyfriend", "C": "Set required time for the daughter to be home", "D": "Accept all decisions of their only daughter"}, "answer": "C", "rationale": "Setting reasonable rules (like curfew) balances parental authority with growing adolescent autonomy and rights ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 26, "question": "Which Republic Act is known as the \"Philippine Teachers Professionalization Act of 1994\"?", "options": {"A": "RA 4670", "B": "RA 7836", "C": "RA 9155", "D": "RA 10533"}, "answer": "B", "rationale": "RA 7836 professionalized teaching by requiring licensure examinations through PRC ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 27, "question": "Under the Philippine Professional Standards for Teachers (PPST), how are newly graduated and PRC registered teachers commonly known?", "options": {"A": "Distinguished", "B": "Highly Proficient", "C": "Novice", "D": "Proficient"}, "answer": "C", "rationale": "Beginning teachers are classified as \"Novice\" in PPST Career Stage 1 ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 28, "question": "According to the Magna Carta for Public School Teachers (RA 4670), how many hours of workload per week should teachers render?", "options": {"A": "24 hours", "B": "30 hours", "C": "40 hours", "D": "48 hours"}, "answer": "A", "rationale": "RA 4670 mandates maximum six hours of actual teaching per day or 30 hours weekly—six hours daily × five days ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 29, "question": "Which of the following is NOT a provision for teacher welfare under the Magna Carta?", "options": {"A": "Sabbatical leave", "B": "Health insurance", "C": "Free tuition for children", "D": "Salary standardization"}, "answer": "C", "rationale": "Free tuition for teachers' children is not in RA 4670; benefits include leave, insurance, and salary standards ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 30, "question": "What term describes the quantitative increase in height and weight?", "options": {"A": "Development", "B": "Growth", "C": "Learning", "D": "Maturation"}, "answer": "B", "rationale": "Growth refers to quantitative, measurable physical changes like height and weight ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 31, "question": "What is the correct order of Freud's psychosexual stages?", "options": {"A": "Oral, anal, phallic, latency, genital", "B": "Anal, oral, phallic, latency, genital", "C": "Oral, anal, genital, latency, phallic", "D": "Anal, oral, genital, latency, phallic"}, "answer": "A", "rationale": "Freud's stages follow: Oral (0-1), Anal (1-3), Phallic (3-6), Latency (6-12), Genital (12+) ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 32, "question": "According to Erikson, which crisis occurs during elementary school years (6-12 years)?", "options": {"A": "Initiative vs. Guilt", "B": "Industry vs. Inferiority", "C": "Identity vs. Role Confusion", "D": "Autonomy vs. Shame and Doubt"}, "answer": "B", "rationale": "Elementary years (6-12) face Industry vs. Inferiority—developing competence vs. feeling inadequate ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 33, "question": "Which best illustrates Vygotsky's Zone of Proximal Development (ZPD)?", "options": {"A": "Child solving a puzzle alone", "B": "Child repeating teacher's instructions", "C": "Child solving a problem with a more capable peer", "D": "Child refusing to participate in activities"}, "answer": "C", "rationale": "ZPD involves tasks a learner can do with guidance—collaboration with skilled peers or adults ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 34, "question": "In Piaget's theory, the ability to arrange objects according to size and color is called?", "options": {"A": "Centration", "B": "Classification", "C": "Seriation", "D": "Conservation"}, "answer": "C", "rationale": "Seriation is arranging objects by dimension (size, color)—emerging in concrete operational stage ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 35, "question": "At the end of a periodical examination, Teacher R administered a summative test. After scoring, she assigned grades such as 95, 90, 85. What process did Teacher R use?", "options": {"A": "Ranking", "B": "Computation", "C": "Measurement", "D": "Evaluation"}, "answer": "D", "rationale": "Assigning grades is evaluation—qualitative judgment of performance quality ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 36, "question": "It is the study of man's prehistory through buried remains of ancient culture and skeletal remnants.", "options": {"A": "Anthropology", "B": "Archeology", "C": "Ethnology", "D": "Ethnography"}, "answer": "B", "rationale": "Archeology studies human prehistory through material remains like artifacts and fossils ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 37, "question": "Teacher D claims: \"If I give reinforcement, it must be given immediately after the response.\" Which theory supports this?", "options": {"A": "Operant conditioning theory", "B": "Social cognitive theory", "C": "Cognitive theory", "D": "Humanist theory"}, "answer": "A", "rationale": "Skinner's operant conditioning emphasizes immediate reinforcement to strengthen responses ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 38, "question": "Visual imagery helps people store information more effectively. Which teaching implication follows?", "options": {"A": "Allow students to daydream", "B": "Instruct students to take notes", "C": "Encourage imagining characters and situations when reading", "D": "Tell them to read more illustrated comics"}, "answer": "C", "rationale": "Guided imagery while reading enhances memory encoding and comprehension ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 39, "question": "Which is essential in cognitive development according to Vygotsky?", "options": {"A": "Independent thinking", "B": "Social interaction", "C": "Individual mental work", "D": "Scientific thinking"}, "answer": "B", "rationale": "Vygotsky emphasized social interaction as primary for cognitive development through cultural tools ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 40, "question": "Which assessment tool shows evidence of student's writing skills?", "options": {"A": "Project", "B": "Portfolio", "C": "Critiquing sessions", "D": "Daily journal"}, "answer": "B", "rationale": "Portfolios collect writing samples over time, showing skill development and achievement evidence ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 41, "question": "Asked to do a learning task, Joe says \"Mahirap. Ayaw ko. 'Di ko kaya!\" To which problem does this allude?", "options": {"A": "Unmotivated students and difficult tasks", "B": "Uncaring teachers only", "C": "Extremely difficult tasks only", "D": "Unmotivated students, uncaring teachers, difficult tasks, incompetent teachers"}, "answer": "A", "rationale": "The statement indicates lack of motivation (I don't like it) and perceived task difficulty (It's difficult, I can't do it) ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 42, "question": "Teacher S wants to immediately determine her students' learning difficulties. What should she do?", "options": {"A": "Require portfolio preparation", "B": "Administer an achievement test", "C": "Administer a diagnostic test", "D": "Interview students directly"}, "answer": "C", "rationale": "Diagnostic tests specifically identify learning difficulties and gaps in prerequisite skills ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 43, "question": "NSAT and NEAT results are interpreted against set mastery levels. This means they fall under __________.", "options": {"A": "Intelligence test", "B": "Aptitude test", "C": "Criterion-referenced test", "D": "Norm-referenced test"}, "answer": "C", "rationale": "Criterion-referenced tests interpret performance against mastery standards, not peer comparison ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 44, "question": "Item analysis shows item no. 4 has a discrimination index of 0.67. What is true about this item?", "options": {"A": "Difficult", "B": "Valid", "C": "Easy", "D": "Average"}, "answer": "B", "rationale": "A 0.67 discrimination index indicates excellent item validity, distinguishing high from low performers ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 45, "question": "Vygotsky's theory emphasizes appropriate teacher assistance enabling movement from actual to proximal development. This assistance is termed _____.", "options": {"A": "Competency technique", "B": "Scaffolding", "C": "Active participation", "D": "Collaboration"}, "answer": "B", "rationale": "Scaffolding provides temporary support enabling ZPD advancement ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 46, "question": "Which activity is NOT appealing to bodily-kinesthetic learners?", "options": {"A": "Making math moves", "B": "Doing simple calisthenics", "C": "Sketching/illustrating events", "D": "Joining extramural events"}, "answer": "C", "rationale": "Sketching appeals to visual-spatial learners; bodily-kinesthetic learners need whole-body movement ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 47, "question": "Institutions must meet minimum standards but are encouraged to set higher quality standards through _____ as provided in Educational Act of 1982.", "options": {"A": "Lifelong education", "B": "Voluntary accreditation", "C": "Formal education", "D": "Academic freedom"}, "answer": "B", "rationale": "Voluntary accreditation encourages exceeding minimum standards for quality improvement ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 48, "question": "To assess affective attributes like attitudes and behavior, which validity should be established?", "options": {"A": "Construct", "B": "Content", "C": "Criterion-related", "D": "Face"}, "answer": "A", "rationale": "Construct validity ensures the instrument measures theoretical affective attributes ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 49, "question": "Which is the most authentic assessment for an objective on working with and relating to people?", "options": {"A": "Conducting mock election", "B": "Home visitation", "C": "Organizing a community project", "D": "Writing articles"}, "answer": "C", "rationale": "Community projects require real collaboration and people skills—authentic assessment ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 50, "question": "Which is NOT characteristic of an effective classroom manager?", "options": {"A": "Uses instructional time wisely", "B": "Uses power to punish for discipline's sake", "C": "Puts available materials to use", "D": "Uses overlapping techniques"}, "answer": "B", "rationale": "Using punishment solely for discipline contradicts positive, proactive classroom management ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 51, "question": "Keeping track of assessment results from one rating to the next contributes to developing a _____.", "options": {"A": "Regional plan", "B": "Annual implementation plan", "C": "School improvement plan", "D": "Division plan"}, "answer": "C", "rationale": "Longitudinal assessment data informs school improvement planning ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 52, "question": "In the K-W-L technique, K stands for what the pupil already knows, W for what he wants to know, and L for what he _____.", "options": {"A": "Failed to learn", "B": "Likes to learn", "C": "Needs to learn", "D": "Learned"}, "answer": "D", "rationale": "L represents \"Learned\"—reflection on acquired knowledge ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 53, "question": "When curriculum content is fairly distributed in each discipline area, the curriculum is _____.", "options": {"A": "Sequenced", "B": "Balanced", "C": "Integrated", "D": "Continued"}, "answer": "B", "rationale": "Balanced curriculum distributes content appropriately across subject areas ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 54, "question": "Direct instruction is for facts and rules as indirect instruction is for _____.", "options": {"A": "Hypotheses and conclusions", "B": "Concepts, patterns, and abstractions", "C": "Concepts and generalizations", "D": "Guesses and data"}, "answer": "B", "rationale": "Indirect instruction develops concepts, patterns, and abstractions through discovery ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 55, "question": "A difficulty index of 1.0 means the test is _____.", "options": {"A": "A quality item", "B": "Very difficult", "C": "Very easy", "D": "Missed by everybody"}, "answer": "C", "rationale": "Index of 1.0 means all examinees answered correctly—very easy ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 56, "question": "A discrimination index of -0.35 means:", "options": {"A": "More from upper group got it correctly", "B": "More from lower group got it correctly", "C": "The test is quite reliable", "D": "The test item is valid"}, "answer": "B", "rationale": "Negative discrimination means more low-performing students answered correctly—problematic ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 57, "question": "His aim of education is individual participation in life around the individual, not just preparation.", "options": {"A": "Froebel", "B": "Spencer", "C": "Herbart", "D": "Pestalozzi"}, "answer": "D", "rationale": "Pestalozzi emphasized education for active participation in life, not mere preparation ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 58, "question": "Characteristics of a child-friendly school except for _____.", "options": {"A": "Exclusive", "B": "Child-centered", "C": "Gender-sensitive", "D": "Nondiscriminating"}, "answer": "A", "rationale": "Child-friendly schools are inclusive, not exclusive ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 59, "question": "To make lessons meaningful, teachers' examples should be ______.", "options": {"A": "Based on higher level skills", "B": "Interesting with illustrations", "C": "Easy and simple", "D": "Relevant to students' experience"}, "answer": "D", "rationale": "Relevant examples connect to student experience, enhancing meaningful learning ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 60, "question": "Which is NOT an indicator of a supportive learning environment?", "options": {"A": "High drop-out rates", "B": "Warm and friendly atmosphere", "C": "Students take personal responsibility", "D": "Increase in student bonding activities"}, "answer": "A", "rationale": "High drop-out rates indicate poor learning environment, not supportiveness ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 61, "question": "Which statement is NOT true about assessment?", "options": {"A": "Feedback is the most important factor", "B": "Only objectively measurable items should be taught", "C": "Assessment should follow developmental pattern", "D": "Systematic errors should guide remedial instruction"}, "answer": "B", "rationale": "Not all important outcomes are objectively measurable—affective and psychomotor domains matter ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 62, "question": "To maximize community resources for effective instruction, teachers should:", "options": {"A": "Have a learning resource center of teacher-prepared materials", "B": "Request the school to purchase materials", "C": "Require students to bring materials", "D": "Let a company sponsor a resource center"}, "answer": "A", "rationale": "Teacher collaboration maximizes existing community resources cost-effectively ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 63, "question": "In a multiple choice item with four options and 50 examinees, which was the most effective distracter?", "options": {"A": "Correct answer chosen by 6 examinees", "B": "Option chosen by 30 examinees", "C": "Option chosen by 2 examinees", "D": "Option chosen by 12 examinees"}, "answer": "B", "rationale": "Effective distracters attract many examinees; 30 of 50 indicates functional distracter ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 64, "question": "Teacher X subscribes to idealist philosophy. This means belief that knowledge comes through ______.", "options": {"A": "Trial and error", "B": "Concrete experience", "C": "Experimenting", "D": "Reasoning"}, "answer": "D", "rationale": "Idealism holds that true knowledge comes from reason and ideas, not senses ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 65, "question": "Analytic scoring uses the _____ judgment of student's work.", "options": {"A": "Evaluation", "B": "Performance", "C": "Standard", "D": "Criterion"}, "answer": "D", "rationale": "Analytic scoring uses specific criteria to evaluate each component separately ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 66, "question": "A teacher in a remote barrio doesn't file leave to avoid salary deduction, using the amount for poor pupils' supplies. Is she right?", "options": {"A": "Yes, poor students benefit", "B": "No, the end does not justify the means", "C": "Yes, amount is small compared to corruption", "D": "Yes, she's not the only one benefited"}, "answer": "B", "rationale": "Ethical principle: Unethical means cannot be justified by good ends; falsifying records is wrong ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 67, "question": "According to Piaget, between ages 12 and 15, children reach formal operational stage. What are they capable of?", "options": {"A": "Focus on one aspect only", "B": "Solve abstract problems and think deductively", "C": "Reason inductively or deductively", "D": "Do multi-tasking"}, "answer": "B", "rationale": "Formal operational stage enables abstract, hypothetical, and deductive reasoning ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 68, "question": "To enable student success, you should use variety and choice. What does this mean?", "options": {"A": "Variety of teaching methodologies", "B": "Consider learning styles with assignment options", "C": "Allow flexibility in activities", "D": "All of the above"}, "answer": "D", "rationale": "Variety and choice encompass multiple methods, learning style consideration, and flexible activities ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 69, "question": "Which is true about ICT?", "options": {"A": "ICT has negative effects and many benefits", "B": "Benefits only", "C": "Effective only in industrialized countries", "D": "Negative effects only"}, "answer": "A", "rationale": "ICT offers benefits (access, efficiency) and drawbacks (e-waste, distraction) ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 70, "question": "Teacher R ensures all eyes are on her when demonstrating Bunsen burner use. Whose theory supports this?", "options": {"A": "Vygotsky's", "B": "Glasser's", "C": "Piaget's", "D": "Bandura's"}, "answer": "D", "rationale": "Bandura's social learning theory emphasizes attention as prerequisite for observational learning ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 71, "question": "To counteract destructive competition among students, use more:", "options": {"A": "Community involvement projects", "B": "Listening activities", "C": "Self-evaluation activities", "D": "Concept miming"}, "answer": "A", "rationale": "Community projects foster cooperation over competition, building collective efficacy ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 72, "question": "A student with a percentile score of 80 means the student scored _____.", "options": {"A": "Higher than 80% of the group", "B": "Better relative to competencies", "C": "High in all tested skills", "D": "80% of specified content"}, "answer": "A", "rationale": "Percentile rank indicates percentage of examinees scored below ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 73, "question": "To organize information about trees and planets, which tool should you use?", "options": {"A": "Spreadsheet", "B": "Database", "C": "Word processing", "D": "Desktop publishing"}, "answer": "B", "rationale": "Databases organize, store, and retrieve structured information efficiently ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 74, "question": "According to Bruner, intellectual development moves from enactive to iconic to symbolic. How should you teach?", "options": {"A": "Begin with concrete", "B": "Begin with abstract  Be interactive", "D": "Do direct instruction"}, "answer": "A", "rationale": "Bruner's theory requires concrete (enactive) before abstract (symbolic) representation ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 75, "question": "A girl tells the waiter \"'yong kagaya kahapon\" when asked about her order. With Piaget, what is this called?", "options": {"A": "Pre-operational egocentrism", "B": "Conservation", "C": "Reversibility", "D": "Transductive reasoning"}, "answer": "A", "rationale": "Egocentrism prevents seeing from others' perspectives—assumes waiter knows yesterday's order ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 76, "question": "If one wants to develop to the fullest, what need is being satisfied according to Maslow?", "options": {"A": "Safety needs", "B": "Belongingness", "C": "Physiological needs", "D": "Self-actualization"}, "answer": "D", "rationale": "Self-actualization is realizing one's full potential at Maslow's hierarchy peak ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 77, "question": "Which is most reliable for seeing development in pupils' writing ability?", "options": {"A": "Portfolio assessment", "B": "Scoring rubric", "C": "Interview of pupils", "D": "Self-assessment"}, "answer": "A", "rationale": "Portfolios show writing development over time through multiple samples ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 78, "question": "What is the overall stream for education, growth, and fulfillment in the teaching profession?", "options": {"A": "Pre-service", "B": "Lifelong career", "C": "Merit and promotion", "D": "Annual ranking"}, "answer": "B", "rationale": "Lifelong career development encompasses continuous professional growth ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 79, "question": "An Education graduate without a license is accepted to teach in a public school. Is this a violation of R.A. 7836?", "options": {"A": "No, if passed Civil Service", "B": "No", "C": "Yes, no one may teach without a license", "D": "Yes"}, "answer": "C", "rationale": "RA 7836 mandates professional license for all teachers ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 80, "question": "At K-12 assessment framework's heart, what learning area is deliberately considered?", "options": {"A": "Object permanence", "B": "Zone of proximal development", "C": "Fluid learning", "D": "Intelligence Quotient"}, "answer": "B", "rationale": "K-12 assessment recognizes ZPD—developmentally appropriate challenge ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 81, "question": "Which describes the process where schools accept children with special needs in regular classes?", "options": {"A": "Inclusive Education", "B": "Multicultural Education", "C": "Global Education", "D": "Progressive Education"}, "answer": "A", "rationale": "Inclusive education integrates special needs students into regular classrooms ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 82, "question": "Which skill does NOT provide high-level thinking opportunity?", "options": {"A": "Synthesis", "B": "Analysis", "C": "Creation", "D": "Memorization"}, "answer": "D", "rationale": "Memorization is lower-order thinking; synthesis, analysis, creation are higher-order ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 83, "question": "What is formative assessment's purpose during the lesson proper?", "options": {"A": "Informs teachers of student progress toward competencies", "B": "Helps teachers understand conceptual standing", "C": "Assesses whether objectives were achieved", "D": "Provides bases for instructional decisions"}, "answer": "A", "rationale": "Formative assessment monitors ongoing progress toward learning goals ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 84, "question": "Which philosophy does a teacher exemplify when lecturing most of the time and requiring memorization of rules?", "options": {"A": "Existentialism", "B": "Pragmatism", "C": "Idealism", "D": "Realism"}, "answer": "C", "rationale": "Idealism emphasizes transmitting knowledge through lecture and memorization ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 85, "question": "Teacher Sheena adds fifteen minutes of reading period to her instructional time. What level of operations does this exemplify?", "options": {"A": "Substitution", "B": "Restructuring", "C": "Variation", "D": "Alternation"}, "answer": "A", "rationale": "Adding reading time substitutes for other activities—modification without major change ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 86, "question": "What best describes \"puwede na\" mentality vs. excellence?", "options": {"A": "Committed work", "B": "Resignation to mediocrity", "C": "Striving to be best", "D": "Not doing at all"}, "answer": "B", "rationale": "\"Puwede na\" accepts minimal acceptable quality, not excellence ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 87, "question": "Which practice is NOT appropriate in routine management?", "options": {"A": "Using overlapping techniques", "B": "Planning distinct teacher-pupil activities", "C": "Collecting materials during first minutes", "D": "Minimizing discipline time"}, "answer": "C", "rationale": "Material collection should occur before instruction begins to maximize learning time ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 88, "question": "Since Teacher Rosal wants her test more reliable, what should she adopt?", "options": {"A": "Make the test difficult", "B": "Restrict ability range", "C": "Create longer test", "D": "Increase number of items"}, "answer": "D", "rationale": "More items increase reliability by reducing measurement error ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 89, "question": "Teacher Mario lets students create a diorama based on imagination and self-expression. What philosophy does he exemplify?", "options": {"A": "Progressivism", "B": "Perennialism", "C": "Existentialism", "D": "Idealism"}, "answer": "C", "rationale": "Existentialism emphasizes individual choice, creativity, and self-expression ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 90, "question": "Principal Heidi says she is against book-based instruction and rote memorization. What philosophy does she exemplify?", "options": {"A": "Progressivism", "B": "Perennialism", "C": "Existentialism", "D": "Idealism"}, "answer": "A", "rationale": "Progressivism opposes rote learning, advocating experiential, student-centered methods ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 91, "question": "Who believes learning requires disciplined attention, regular homework, and respect for authority?", "options": {"A": "Essentialist", "B": "Progressivist", "C": "Realist", "D": "Reconstructionist"}, "answer": "A", "rationale": "Essentialism emphasizes hard work, discipline, and respect for legitimate authority ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 92, "question": "Lucas, a five-year old, can hold his pen and write his name with his right hand. Which term describes this?", "options": {"A": "Growth", "B": "Learning", "C": "Maturation", "D": "Development"}, "answer": "C", "rationale": "Maturation refers to biological readiness—natural unfolding of physical abilities ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 93, "question": "What is a process involving behavior change resulting from experience?", "options": {"A": "Learning", "B": "Thinking", "C": "Teaching", "D": "Reading"}, "answer": "A", "rationale": "Learning is relatively permanent behavior change through experience ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 94, "question": "Which promotes maximum learning?", "options": {"A": "Exercises focused on right brain only", "B": "Exercises involving both brain sides", "C": "Exercises focused on cognitive objectives only", "D": "Exercises focused on left brain only"}, "answer": "B", "rationale": "Whole-brain learning integrates both hemispheres for optimal learning ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 95, "question": "What is the teacher's main role?", "options": {"A": "Model", "B": "Classroom manager", "C": "Facilitator of student learning", "D": "Counselor"}, "answer": "C", "rationale": "The primary role is facilitating student learning and development ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 96, "question": "Which statement on classroom climate is true?", "options": {"A": "Climate is affected by teacher leadership type", "B": "Climate is not affected by leadership type", "C": "Democratic leadership produces more task orientation", "D": "Both A and C"}, "answer": "D", "rationale": "Leadership type affects climate; democratic leadership yields better outcomes ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 97, "question": "Which is evidence of conducive learning environment?", "options": {"A": "Students make mistakes and ask for assistance", "B": "Students participate fully in learning process", "C": "Students are encouraged to ask and answer questions", "D": "All of the above"}, "answer": "D", "rationale": "All indicate psychological safety, engagement, and active learning ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 98, "question": "Which develops critical thinking among students?", "options": {"A": "Asking low level questions", "B": "Suspending judgment until sufficient evidence presented", "C": "Asking convergent questions", "D": "Blind obedience to authority"}, "answer": "B", "rationale": "Critical thinking requires evidence-based judgment, not premature conclusions ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 99, "question": "The teacher checks entry knowledge before new lessons. Which principle is this grounded in?", "options": {"A": "Proceed from concrete to abstract", "B": "Attention is essential", "C": "Learning increases with relevance", "D": "New learning builds on previous learning"}, "answer": "D", "rationale": "Prior knowledge is foundation for new learning (constructivism) ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 100, "question": "Which objective states a criterion level of success?", "options": {"A": "Heat and water", "B": "Assembles materials in five minutes", "C": "Answers questions in the book", "D": "Differentiates good and bad materials"}, "answer": "B", "rationale": "\"In five minutes\" specifies measurable criterion for successful performance ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 101, "question": "For advanced pupils, what activity should be given after the lesson?", "options": {"A": "Corrective activity", "B": "Interest activity", "C": "Reinforcement activity", "D": "Enrichment activity"}, "answer": "D", "rationale": "Enrichment provides advanced challenges for capable learners ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 102, "question": "To lead students in formulating generalizations, what question type should be asked?", "options": {"A": "Evaluation question", "B": "Rote-memory question", "C": "Hypothetical question", "D": "Focusing question"}, "answer": "A", "rationale": "Evaluation questions require synthesis and generalization formation ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 103, "question": "Which is NOT true when using the discovery approach?", "options": {"A": "Teacher uses many materials", "B": "Inductive method steps are used", "C": "The lesson taught is evaluated", "D": "Teacher begins by telling what students will learn"}, "answer": "D", "rationale": "Discovery approach begins with exploration, not advance notice of learning outcomes ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 104, "question": "Children learn mainly by observation, incorporating information into schemata. Which learning theory is observed?", "options": {"A": "Cognitive learning", "B": "Humanistic learning", "C": "Social learning", "D": "Behavioristic learning"}, "answer": "C", "rationale": "Observational learning is central to Bandura's social learning theory ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 105, "question": "Educational authorities agree character is \"caught\" not \"taught.\" What is the rationale?", "options": {"A": "Character depends on reasoning", "B": "Character is inborn, resists change", "C": "Character depends on what is seen and experienced", "D": "Character develops through trial and error"}, "answer": "C", "rationale": "Character forms through modeling and experiencing values in action ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 106, "question": "Miss X gives ten minutes of activity after discussion to help transfer information to long-term memory and relate to old lessons. What is this called?", "options": {"A": "Drill", "B": "Practice", "C": "Motivation", "D": "Review"}, "answer": "B", "rationale": "Practice strengthens neural connections and integrates new with existing knowledge ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 107, "question": "Miss W reviews past lessons before introducing new ones, establishing learning continuity. She upholds the principle of ________.", "options": {"A": "Cause and effect", "B": "Retention", "C": "Readiness", "D": "Exercise"}, "answer": "B", "rationale": "Review promotes retention by reactivating prior learning ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 108, "question": "Why should learning activities be carefully planned?", "options": {"A": "Objective accomplishment depends on it", "B": "To save time", "C": "To reduce teacher workload", "D": "To impress administrators"}, "answer": "A", "rationale": "Well-planned activities directly enable achievement of learning objectives ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 109, "question": "Which holds true for standardized tests?", "options": {"A": "Used for comparative purposes", "B": "Administered differently", "C": "Scored according to different standards", "D": "Used for assigning grades"}, "answer": "A", "rationale": "Standardized tests allow comparison across individuals and groups ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 110, "question": "A negative discrimination index tells that the test item lacks _____.", "options": {"A": "Objectivity", "B": "Reliability", "C": "Content validity", "D": "Construct validity"}, "answer": "B", "rationale": "Negative discrimination reduces test reliability ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 111, "question": "To teach concepts, patterns, and abstractions, which method is most appropriate?", "options": {"A": "Deductive method", "B": "Problem solving", "C": "Direct instruction", "D": "Indirect instruction"}, "answer": "D", "rationale": "Indirect instruction develops conceptual understanding through exploration ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 112, "question": "Which enhances spatial intelligence development?", "options": {"A": "Hands-on demonstrations", "B": "Environmental study", "C": "Concept miming", "D": "Concept mapping"}, "answer": "D", "rationale": "Concept mapping visually organizes information, developing spatial intelligence ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 113, "question": "What can teachers do to maximize community resources for effective instruction?", "options": {"A": "Have a learning resource center of teacher-prepared materials", "B": "Request school purchase materials", "C": "Require students to bring materials", "D": "Let a company sponsor a resource center"}, "answer": "A", "rationale": "Collaborative teacher-prepared centers maximize existing resources ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 114, "question": "Which is a right granted to parents as provided in B.P. 232, Sec. 8?", "options": {"A": "Right to receive relevant quality education", "B": "Right to free expression", "C": "Right to organize with teachers for discussion forum", "D": "Right of institutions to determine admission"}, "answer": "C", "rationale": "BP 232 grants parents right to organize with teachers for school program discussions ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 115, "question": "Which are the most important knowledge and skills for developing problem-solving and higher-order thinking?", "options": {"A": "Designing learning experiences and metacognitive processes", "B": "Cultural influences and identifying learning needs", "C": "Learning experience design and cultural influences", "D": "Metacognition and identifying learning needs"}, "answer": "A", "rationale": "Designing learning experiences and metacognitive processes develop higher-order thinking ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 116, "question": "Which is a type of graph where lines represent each score or set of scores?", "options": {"A": "Scattergram", "B": "Histogram", "C": "Frequency polygon", "D": "Scatterplot"}, "answer": "C", "rationale": "Frequency polygon uses lines to connect points representing score frequencies ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 117, "question": "Which is NOT an example of teacher's nonverbal communication?", "options": {"A": "Eye contact", "B": "Gestures", "C": "Pauses", "D": "Voice"}, "answer": "D", "rationale": "Voice involves verbal (words) and paralanguage (tone)—not purely nonverbal ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 118, "question": "Standard deviation is to variability as mean is to _____.", "options": {"A": "Coefficient of correlation", "B": "Central tendency", "C": "Discrimination index", "D": "Level of difficulty"}, "answer": "B", "rationale": "Mean measures central tendency as standard deviation measures variability ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 119, "question": "Teacher R observed a student excelling in strength, speed, flexibility, balance, and coordination. According to Gardner, this is _____ intelligence.", "options": {"A": "Bodily-kinesthetic", "B": "Intrapersonal", "C": "Interpersonal", "D": "Verbal-linguistic"}, "answer": "A", "rationale": "Bodily-kinesthetic intelligence involves physical skill and coordination ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 120, "question": "With-it-ness according to Kounin is an effective classroom manager characteristic. Which phrase goes with it?", "options": {"A": "Hands that write fast", "B": "Eyes on the back of your head", "C": "Mouth ready to speak", "D": "Mind packed with knowledge"}, "answer": "B", "rationale": "With-it-ness means awareness of all classroom activities—\"eyes in back of head\" ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 121, "question": "Which applies when there are extreme scores?", "options": {"A": "Median will not be reliable", "B": "Mode will be most reliable", "C": "No reliable measure exists", "D": "Mean will not be reliable"}, "answer": "D", "rationale": "Mean is sensitive to extreme scores; median is more robust ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 122, "question": "\"Learning occurs when a strong bond between stimulus and response is formed.\" This is based on the theory of _____.", "options": {"A": "Constructivism", "B": "Categorization", "C": "Predisposition", "D": "Connectionism"}, "answer": "D", "rationale": "Thorndike's connectionism (S-R bond theory) explains learning through strengthening associations ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 123, "question": "Which is equivalent to the average score of a group?", "options": {"A": "Mean", "B": "Median", "C": "Mode", "D": "Standard Deviation"}, "answer": "A", "rationale": "Mean is the arithmetic average of scores ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 124, "question": "Which is a valid test item for the objective \"To distinguish between proper and improper fractions\"?", "options": {"A": "Define proper and improper fractions", "B": "Put check on proper fractions and X on improper", "C": "Is an improper fraction really a fraction? Explain", "D": "Can you add proper and improper fractions together?"}, "answer": "B", "rationale": "This directly measures ability to distinguish (classify) fractions ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 125, "question": "The strongest disadvantage of alternate response tests is _____.", "options": {"A": "Demand for critical thinking", "B": "Absence of analysis", "C": "Encouragement of rote memory", "D": "High possibility of guessing"}, "answer": "D", "rationale": "True-false items have 50% chance of correct guessing ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 126, "question": "Which of the following viewed individual man and his native state as at war with himself?", "options": {"A": "William James", "B": "Karl Marx", "C": "Immanuel Kant", "D": "Thomas Hobbes"}, "answer": "D", "rationale": "Hobbes viewed natural human state as \"war of all against all\" ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 127, "question": "Teachers are encouraged to use authentic assessment. Which goes with authentic assessment?", "options": {"A": "Unrealistic performances", "B": "De-contextualized drills", "C": "Real world application of lessons learned", "D": "Answering high multiple choice test items"}, "answer": "C", "rationale": "Authentic assessment requires real-world application, not contrived tasks ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 128, "question": "This law made observance of the flag ceremony compulsory.", "options": {"A": "Republic Act No. 7079", "B": "Republic Act No. 1265", "C": "Republic Act No. 9155", "D": "Republic Act No. 3019"}, "answer": "B", "rationale": "RA 1265 mandates flag ceremony in all educational institutions ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 129, "question": "What do global learners enjoy most?", "options": {"A": "Working on puzzles", "B": "Generalize ideas from specific to general", "C": "Likes to plan ahead", "D": "Formulate generalization from details"}, "answer": "D", "rationale": "Global learners prefer holistic understanding, synthesizing details into generalizations ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 130, "question": "Knowledge of procedure in writing a report is an example of a _____ rubric.", "options": {"A": "Specific", "B": "Generic", "C": "Standard", "D": "Performance"}, "answer": "B", "rationale": "Generic rubrics apply to similar tasks across different content areas ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 131, "question": "Teachers should avoid _____ in assigning performance-based ratings.", "options": {"A": "Arbitrariness and bias", "B": "Unnecessary deductions", "C": "Partiality and calculation", "D": "Unnecessary evaluation"}, "answer": "A", "rationale": "Arbitrariness and bias violate fairness and validity principles ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 132, "question": "Teacher A teaches ESL using vocabulary cards, fill-in-the-blanks, dialogues, dictation, and writing exercises about grocery shopping. What valid conclusion can be drawn?", "options": {"A": "Applying Bloom's hierarchy", "B": "Teaching in various ways because not all students learn the same", "C": "Making teaching easier with less talk", "D": "Emphasizing reading and writing skills"}, "answer": "B", "rationale": "Multiple methods accommodate diverse learning styles ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 133, "question": "Which appraisal technique is most useful with many desired respondents?", "options": {"A": "Interview", "B": "Observation", "C": "Questionnaire", "D": "Autobiography"}, "answer": "C", "rationale": "Questionnaires efficiently gather data from large samples ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 134, "question": "Asked to do a learning task, Joe says \"Mahirap. Ayaw ko. 'Di ko kaya!\" Is it possible to motivate this student?", "options": {"A": "Yes, he can do something with his ability", "B": "Yes, he can change the nature of the job", "C": "No, impossible to motivate unmotivated student", "D": "No, motivation is totally dependent on the student"}, "answer": "A", "rationale": "External motivation can influence self-efficacy and persistence ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 135, "question": "Which are job-embedded requirements teachers must continuously develop?", "options": {"A": "Maintain records, conduct action research, maintain relationships, guide learners", "B": "Maintain records only", "C": "Conduct research only", "D": "Maintain relationships only"}, "answer": "A", "rationale": "All are professional responsibilities requiring ongoing development ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 136, "question": "Of goals of education, which relates to strengthening society's sense of belonging and identity?", "options": {"A": "Autonomy", "B": "Enculturation", "C": "Moral character", "D": "Citizenship"}, "answer": "B", "rationale": "Enculturation transmits cultural values, identity, and belonging ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 137, "question": "Which intervention directly aims at responding to the gap between academic achievement and employment?", "options": {"A": "Deregulation of tuition fees", "B": "Voluntary accreditation", "C": "School networking with business and industry", "D": "Identification of centers of excellence"}, "answer": "C", "rationale": "Industry partnerships provide employment-relevant skills ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 138, "question": "As a preventive measure for classroom discipline, the teacher may restructure the program. How is this NOT done?", "options": {"A": "Reteach difficult lessons", "B": "Remove tension before proceeding", "C": "Modify lesson", "D": "Skip whole lesson unit altogether"}, "answer": "D", "rationale": "Skipping entire units avoids rather than addresses problems ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 139, "question": "Among mistaken goals in the Acceptance Approach, what happens when students seek to hurt others to make up for being hurt or rejected?", "options": {"A": "Revenge seeking", "B": "Power seeking", "C": "Withdrawal", "D": "Attention getting"}, "answer": "A", "rationale": "Revenge seeking attempts to hurt others in response to perceived rejection ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 140, "question": "Among mistaken goals, what happens when students continually seek help and refuse to work unless the teacher hovers?", "options": {"A": "Attention getting", "B": "Withdrawal", "C": "Revenge seeking", "D": "Power seeking"}, "answer": "A", "rationale": "Attention-getting behavior demands constant teacher presence ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 141, "question": "What is the first basis for Mother-Tongue Based Multi-Lingual Education in the Philippines?", "options": {"A": "Schurman Commission", "B": "Monroe Survey", "C": "Gabaldon Survey", "D": "Swanson Commission"}, "answer": "B", "rationale": "Monroe Survey (1925) recommended using vernacular in early grades ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 142, "question": "Which characteristic of culture is exemplified by: \"Filipino family culture has grown from borrowed cultures from Chinese, Arabs, Indians\"?", "options": {"A": "Dynamic", "B": "Diverse", "C": "Multi-ethnic", "D": "Cumulative"}, "answer": "D", "rationale": "Cumulative culture builds upon borrowed elements from various sources ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 143, "question": "They were the first to introduce the printing press in the Philippines.", "options": {"A": "Chinese", "B": "British", "C": "Spanish", "D": "Japanese"}, "answer": "C", "rationale": "Spanish colonizers introduced printing press in the Philippines ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 144, "question": "Universities should impact their locality through purposeful programs in ___?", "options": {"A": "Conservation", "B": "Extension", "C": "Research", "D": "Production"}, "answer": "B", "rationale": "Extension programs directly serve community needs and development ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 145, "question": "Which is NOT a role of an existentialist teacher?", "options": {"A": "Authoritarian and strict", "B": "Good provider of experiences and opportunities", "C": "Effective questioner and communicator", "D": "Promotes development of self-identity"}, "answer": "A", "rationale": "Existentialist teachers are non-authoritarian, promoting individual freedom ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 146, "question": "Principal A says training in humanities is most important. Which philosophy does he adhere to?", "options": {"A": "Perennialism", "B": "Essentialism", "C": "Existentialism", "D": "Progressivism"}, "answer": "A", "rationale": "Perennialism emphasizes humanities and enduring ideas ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 147, "question": "He wrote \"The Schoolmaster\" condemning brutal punishment in English schools.", "options": {"A": "Herbart", "B": "Fontana", "C": "Comenius", "D": "Ascham"}, "answer": "D", "rationale": "Roger Ascham's \"The Schoolmaster\" criticized corporal punishment ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 148, "question": "Progressivists emphasize child individuality. What is reconstructionists' concern?", "options": {"A": "Social problem", "B": "Experiential learning", "C": "Socialization", "D": "Research"}, "answer": "A", "rationale": "Reconstructionism addresses social problems and societal improvement ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 149, "question": "Which school activity is NOT based on Social Reconstructionism?", "options": {"A": "Promoting culture and arts", "B": "Establishment of SDF", "C": "Oplan Brigada Eskwela", "D": "Annual Feeding Program"}, "answer": "A", "rationale": "Culture/arts promotion is perennialist; reconstructionism focuses on social reform ."}, {"set": "SET A: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 150, "question": "Which was the FIRST body to perform regulatory functions over the Philippine teaching profession?", "options": {"A": "Professional Board of Teachers", "B": "Civil Service Commission", "C": "Professional Regulation Commission", "D": "National Board of Teachers"}, "answer": "D", "rationale": "National Board of Teachers was first regulatory body for teaching"}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 1, "question": "Which philosophical belief describes that schools should develop political literacy among students so they can use it to improve quality of life?", "options": {"A": "Perennialism", "B": "Progressivism", "C": "Existentialism", "D": "Essentialism"}, "answer": "B", "rationale": "Progressivism emphasizes social reform and developing students' ability to address real-life problems, including political literacy for social improvement ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 2, "question": "What kind of knowledge process is involved when Teacher JC asked his students to reflect on themselves as self-learning?", "options": {"A": "Deduction", "B": "Observation", "C": "Metacognition", "D": "Induction"}, "answer": "C", "rationale": "Metacognition refers to \"thinking about one's own thinking\" – the awareness and regulation of one's learning processes ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 3, "question": "After the 1987 Constitution, what is the first legal basis that makes teaching a profession and considers teachers as professionals?", "options": {"A": "R.A. 7640", "B": "R.A. 7836", "C": "P.D. 1006", "D": "Code of Ethics for Professional Teachers"}, "answer": "C", "rationale": "Presidential Decree No. 1006 (1976) was the first legal basis that recognized teaching as a profession and required licensure for teachers ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 4, "question": "The Professional role of Teachers is not \"the sage on the stage\" but \"the guide from the side.\" This implies that:", "options": {"A": "Teachers must act more as facilitators of learning", "B": "Teachers must cling to their power to improve roles", "C": "Teachers assess based on their roles as lecturer", "D": "Teachers must project an \"Almighty-omniscient\" image"}, "answer": "A", "rationale": "The metaphor emphasizes shifting from teacher-centered lecture to student-centered facilitation, where teachers guide rather than dictate learning ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 5, "question": "What is the LATEST standards for teachers in the Philippines?", "options": {"A": "National Competency Based Teaching Standards", "B": "National Competency Based Teacher Standards", "C": "Philippine Professional Standards for Teachers", "D": "Philippine Professional Standards for Teaching"}, "answer": "C", "rationale": "The Philippine Professional Standards for Teachers (PPST) is the current framework that sets professional standards for teachers' career stages ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 6, "question": "According to RA 9293, are passers of the Professional Board Examination for Teachers (PBET) required to take the LET to obtain a license?", "options": {"A": "Yes, only the test for General Education", "B": "No, PBET passers may apply for conversion of their PBET rating into a license with PRC", "C": "No, PBET rating is a professional license itself", "D": "Yes, that's the only way to obtain a license"}, "answer": "B", "rationale": "RA 9293 allows PBET passers to convert their ratings into a professional license through PRC without taking the LET again ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 7, "question": "An option in a multiple choice test did not work. Which conclusion can you derive about the option?", "options": {"A": "It belongs to a category of options", "B": "It is highly plausible", "C": "It should be maintained", "D": "It is implausible"}, "answer": "D", "rationale": "A non-functioning option fails to attract examinees, making it implausible and ineffective as a distracter; it should be revised or removed ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 8, "question": "When Philosophy started, man thought logically inside his mind forgetting external physical reality, such that it is believed \"No one can step beside a river twice.\" What kind of reasoning is this?", "options": {"A": "Positivistic reasoning", "B": "Metaphysical reasoning", "C": "Inductive reasoning", "D": "Deductive reasoning"}, "answer": "B", "rationale": "Metaphysical reasoning deals with abstract concepts beyond physical reality, focusing on logical thought independent of sensory experience ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 9, "question": "What is the right attitude of a modern teacher towards the varied philosophies in the human history of ideas?", "options": {"A": "Adopt all philosophical systems as good", "B": "Adopt new philosophies and leave the old aside", "C": "Reject past philosophies for current philosophical thoughts", "D": "Adopt elements of philosophies that conform to the school's an
