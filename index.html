d country's educational system"}, "answer": "D", "rationale": "Eclecticism – selecting and integrating philosophical elements that fit the local educational context – is the most pragmatic approach for teachers ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 10, "question": "According to progressivist educators like Carl Rogers, what is the essence of creativity among school learners?", "options": {"A": "Novelty", "B": "Industry", "C": "Convention", "D": "Conformity"}, "answer": "A", "rationale": "Progressivism values creativity as the production of novel, original ideas and solutions, not mere conformity to established norms ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 11, "question": "What is the philosophy behind Philippine schools that seek to promote democratic opportunities for all and humanistic education through lifelong learning?", "options": {"A": "Progressivism", "B": "Classical education", "C": "Perennialism", "D": "Positivism"}, "answer": "A", "rationale": "Progressivism advocates democratic education, equal opportunities, and lifelong learning – aligning with Philippine educational philosophy ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 12, "question": "Which philosophy supports universal values in education, as these are important in molding young minds towards broad ideals such as democracy, freedom, human rights?", "options": {"A": "Pragmatism", "B": "Empiricism", "C": "Existentialism", "D": "Essentialism"}, "answer": "C", "rationale": "Existentialism emphasizes individual choice and universal human values, supporting education that develops democratic and human rights consciousness ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 13, "question": "What is the teacher's \"window\" or viewpoint of the world?", "options": {"A": "Philosophy of life", "B": "Love of children", "C": "Ethical values", "D": "Behaviorist classroom"}, "answer": "A", "rationale": "A teacher's philosophy of life shapes their perspective, decisions, and actions in the classroom ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 14, "question": "What principle is violated if a teacher uses offensive language to control a disruptive class?", "options": {"A": "Teaching is a one-way process", "B": "Teaching is communication", "C": "Teaching is classroom management", "D": "Teaching is a moral act"}, "answer": "D", "rationale": "Teaching is inherently moral – using offensive language violates ethical standards and respect for learners' dignity ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 15, "question": "To encourage introspection, which teaching method is MOST appropriate?", "options": {"A": "Cognitive", "B": "Reflective", "C": "Process", "D": "Cooperative learning"}, "answer": "B", "rationale": "Reflective methods explicitly encourage introspection and self-analysis of one's thoughts and actions ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 16, "question": "Which does NOT belong to indirect instruction?", "options": {"A": "Lecture-recitation", "B": "Experiential method", "C": "Inductive method", "D": "Discovery method"}, "answer": "A", "rationale": "Lecture-recitation is direct instruction; indirect instruction includes experiential, inductive, and discovery approaches where students construct knowledge ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 17, "question": "Which statement has a very limited definition of educational technology?", "options": {"A": "It is a profession composed of various job categories", "B": "It refers to computers used for teaching and learning", "C": "It includes audiovisual materials and multimedia", "D": "It improves human learning through development and evaluation"}, "answer": "B", "rationale": "Defining educational technology merely as computers is too narrow; educational technology encompasses all systematic tools, processes, and resources for learning ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 18, "question": "What is the most systematic process in preparing instructional materials?", "options": {"A": "Design, utilization, evaluation, development", "B": "Design, development, utilization, evaluation", "C": "Development, design, utilization, evaluation", "D": "Development, utilization, evaluation, design"}, "answer": "B", "rationale": "The systematic process follows: Design → Development → Utilization → Evaluation (D-D-U-E) for effective instructional materials ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 19, "question": "Which is the most important reason why teachers need to preview instructional materials?", "options": {"A": "To gain confidence in using them", "B": "To encourage viewers to be more focused", "C": "To avoid potential problems during use", "D": "To ensure appropriateness with objectives and target audience"}, "answer": "D", "rationale": "Alignment with learning objectives and audience appropriateness is the primary reason for previewing materials ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 20, "question": "Which factor is MOST important when selecting educational technology tools?", "options": {"A": "Cost of the tool", "B": "Popularity among students", "C": "Alignment with learning objectives", "D": "Ease of installation"}, "answer": "C", "rationale": "Alignment with learning objectives ensures technology serves educational purposes, not just entertainment or convenience ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 21, "question": "Which is an example of ethical use of technology by a teacher?", "options": {"A": "Downloading paid software without license", "B": "Giving students free access to copyrighted materials", "C": "Citing sources when using online materials", "D": "Sharing test answers online"}, "answer": "C", "rationale": "Citing sources respects intellectual property rights – a core ethical practice in technology use ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 22, "question": "Which is NOT a description of learner-centered curriculum?", "options": {"A": "Controlled cooperatively by learners, teachers, and parents", "B": "Education is a means to develop social, creative individuals", "C": "Emphasis on total growth and development of learners", "D": "Emphasis on facts and knowledge for future use"}, "answer": "D", "rationale": "Learner-centered curriculum prioritizes learner growth over mere accumulation of facts for future use ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 23, "question": "In elementary level, when English literature and Social Studies relate well, what curriculum design is shown?", "options": {"A": "Separate subject design", "B": "Correlation design", "C": "Discipline design", "D": "Broad field design"}, "answer": "B", "rationale": "Correlation design links related subjects while maintaining their identities, as shown by connecting English literature with Social Studies ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 24, "question": "What is the null curriculum?", "options": {"A": "Topics never taught in schools", "B": "Subjects deliberately excluded from curriculum", "C": "Values unintentionally learned through school routines", "D": "Topics repeated across grade levels"}, "answer": "C", "rationale": "The null curriculum refers to what is NOT taught – the implicit lessons from what schools choose to exclude ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 25, "question": "Which philosophical foundation supports the statement \"Knowledge is true if it is workable\"?", "options": {"A": "Idealism", "B": "Realism", "C": "Pragmatism", "D": "Essentialism"}, "answer": "C", "rationale": "Pragmatism's truth criterion is practicality – knowledge is true if it works and solves problems ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 26, "question": "Who controls the subject-centered curriculum?", "options": {"A": "Learner", "B": "Teacher", "C": "Parent", "D": "Teacher and parent"}, "answer": "B", "rationale": "Subject-centered curriculum places the teacher as primary controller of content delivery ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 27, "question": "Which goes with assessment OF learning?", "options": {"A": "Given at the end of a grading period", "B": "Done to diagnose learning needs", "C": "Conducted during the learning process", "D": "Used to improve instruction"}, "answer": "A", "rationale": "Assessment OF learning (summative) evaluates learning at the end of a period for grading purposes ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 28, "question": "What characteristic of a test yields the same score regardless of who checks it?", "options": {"A": "Similarity", "B": "Validity", "C": "Administrability", "D": "Objectivity"}, "answer": "D", "rationale": "Objectivity means scoring is free from subjective judgment – different scorers produce the same results ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 29, "question": "What does a negatively skewed score distribution imply?", "options": {"A": "Most scores are low", "B": "The scores congregate on the right side (high scores)", "C": "Scores are evenly distributed", "D": "Most scores are average"}, "answer": "B", "rationale": "Negative skew means the tail points left; most scores are high (right side), with few low scores ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 30, "question": "Which theory operates on the \"stimulus-response principle\"?", "options": {"A": "Contextual theory", "B": "Behaviorist theory", "C": "Cognitive theory", "D": "Constructivist theory"}, "answer": "B", "rationale": "Behaviorism, particularly Thorndike and Skinner, is founded on S-R (Stimulus-Response) principles ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 31, "question": "When a learner reaches a point where no further improvement is expected, this is called:", "options": {"A": "Regression", "B": "Learning plateau", "C": "Developmental crisis", "D": "Depression"}, "answer": "B", "rationale": "A learning plateau is a period in the learning curve where progress temporarily stops despite continued effort ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 32, "question": "Which is NOT an element of cooperative learning?", "options": {"A": "Positive interdependence", "B": "Group accountability for learning", "C": "Individual accountability for learning", "D": "Competition among group members"}, "answer": "D", "rationale": "Cooperative learning emphasizes collaboration, not competition; competition undermines cooperative goals ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 33, "question": "Which is NOT an example of environmental print?", "options": {"A": "Old boxes of powdered milk", "B": "Chocolate bar wrappers", "C": "Car stickers", "D": "Big books"}, "answer": "D", "rationale": "Environmental print includes everyday printed materials in the environment (boxes, wrappers, signs); big books are instructional materials ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 34, "question": "Which reading model focuses on building letters into words and words into sentences using flashcards?", "options": {"A": "Bottom-up model", "B": "Top-down model", "C": "Interactive model", "D": "Schema model"}, "answer": "A", "rationale": "Bottom-up model proceeds from smaller units (letters) to larger units (words, sentences) – phonics-based approach ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 35, "question": "Creative reading is:", "options": {"A": "Reading beyond the lines", "B": "Reading for evaluation", "C": "Acquiring directly stated ideas", "D": "Assessing clarity and precision"}, "answer": "A", "rationale": "Creative reading goes beyond literal meaning to generate new ideas, insights, and applications ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 36, "question": "Which level of comprehension requires interpreting ideas in the text?", "options": {"A": "Literal reading", "B": "Interpretive reading", "C": "Critical reading", "D": "Creative reading"}, "answer": "B", "rationale": "Interpretive reading involves understanding implied meanings, inferences, and relationships beyond literal statements ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 37, "question": "Which best describes the primary function of education in society?", "options": {"A": "To transmit cultural values and knowledge", "B": "To provide entertainment for students", "C": "To replace other social institutions", "D": "To eliminate all social inequalities"}, "answer": "A", "rationale": "Education's primary social function is cultural transmission – passing knowledge, values, and skills to new generations ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 38, "question": "The four pillars of learning include all EXCEPT:", "options": {"A": "Learning to know", "B": "Learning to do", "C": "Learning to compete", "D": "Learning to be"}, "answer": "C", "rationale": "UNESCO's four pillars are: Learning to Know, Learning to Do, Learning to Live Together, and Learning to Be – not competition ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 39, "question": "Which pillar of learning should be emphasized when addressing peace and cultural diversity?", "options": {"A": "Learning to know", "B": "Learning to do", "C": "Learning to live together", "D": "Learning to be"}, "answer": "C", "rationale": "\"Learning to Live Together\" directly addresses peace, diversity, and intercultural understanding ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 40, "question": "Multicultural education aims to:", "options": {"A": "Eliminate cultural differences", "B": "Promote understanding and respect for diversity", "C": "Emphasize one superior culture", "D": "Separate students by ethnicity"}, "answer": "B", "rationale": "Multicultural education fosters respect, understanding, and appreciation for cultural diversity ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 41, "question": "What statement is FALSE regarding Article VIII \"The Teacher and the Learners\"?", "options": {"A": "Teachers should not accept favors in exchange for undeserved concessions", "B": "Teachers should not inflict corporal punishment", "C": "Teachers may develop romantic relationships with learners", "D": "Teachers shall maintain a dignified personality"}, "answer": "C", "rationale": "The Code of Ethics prohibits romantic relationships between teachers and learners due to power imbalance ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 42, "question": "Every teacher must be:", "options": {"A": "Wealthy and influential", "B": "Physically, mentally, and morally fit to teach", "C": "A political activist", "D": "Connected to high officials"}, "answer": "B", "rationale": "The Code of Ethics requires teachers to be physically, mentally, and morally fit for the profession ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 43, "question": "The \"Code of Ethics for Professional Teachers\" covers:", "options": {"A": "College teachers only", "B": "Public school teachers only", "C": "All teachers from preschool to secondary level", "D": "Private school teachers only"}, "answer": "C", "rationale": "The Code covers all teachers in preschool, elementary, and secondary levels, both public and private ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 44, "question": "Why should a teacher participate in Continuing Professional Education (CPE)?", "options": {"A": "To improve efficiency", "B": "To enhance prestige", "C": "To strengthen competence and productivity", "D": "All of the above"}, "answer": "D", "rationale": "CPE enhances efficiency, prestige, competence, and productivity – all essential for professional growth ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 45, "question": "According to the Magna Carta for Public School Teachers (RA 4670), how many hours of workload per week should teachers render?", "options": {"A": "24 hours", "B": "30 hours", "C": "40 hours", "D": "48 hours"}, "answer": "A", "rationale": "RA 4670 mandates a maximum of six hours of actual classroom teaching per day, totaling 30 hours weekly, not 24 ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 46, "question": "Which of the following is NOT a provision for teacher welfare under the Magna Carta?", "options": {"A": "Sabbatical leave", "B": "Health insurance", "C": "Free tuition for children", "D": "Salary standardization"}, "answer": "C", "rationale": "Free tuition for teachers' children is NOT a provision of RA 4670 ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 47, "question": "Which is an effective way of developing a sense of ownership among students?", "options": {"A": "Abide totally by the students' suggestions", "B": "Make students participate in the formulation of class rules", "C": "Let students formulate the class rules", "D": "Involve students in all decision-making that involve the class"}, "answer": "C", "rationale": "Allowing students to formulate class rules creates the strongest sense of ownership and responsibility ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 48, "question": "Which of the following is one of the best practices in using learning resources for indigenous learners?", "options": {"A": "Highlight English language in primary years", "B": "Observe cultural sensitivity and protocols", "C": "Dismiss indigenous artifacts and other cultural resources", "D": "Violate indigenous community property rights"}, "answer": "B", "rationale": "Cultural sensitivity and respect for indigenous protocols are essential when using resources for indigenous learners ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 49, "question": "How would you best interpret the old proverb \"It takes the whole village to educate a child?\"", "options": {"A": "All teachers are responsible for child education", "B": "All stakeholders support education of the child", "C": "School buildings are needed for education", "D": "The community plays a role in child education"}, "answer": "B", "rationale": "The proverb means education requires collective responsibility from all stakeholders – family, school, and community ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 50, "question": "Your emphasis is the learner's affective development. Which pillar/s of learning should you focus on?", "options": {"A": "Learning to know and learning to be", "B": "Learning to live together", "C": "Learning to be and learning to live together", "D": "Learning to do"}, "answer": "C", "rationale": "Affective development aligns with \"Learning to Be\" (personal development) and \"Learning to Live Together\" (social-emotional skills) ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 51, "question": "Which of the following is the best relationship for the school and community?", "options": {"A": "Community rule", "B": "Partnership", "C": "School supervision", "D": "Teacher-led projects"}, "answer": "B", "rationale": "Partnership implies equal, collaborative relationship between school and community for mutual benefit ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 52, "question": "What is the appropriate teaching-learning strategy to respond to cultural diversity among learners?", "options": {"A": "Group entire class homogenously", "B": "Variety of teaching and assessment methods", "C": "One set of teaching-learning methods", "D": "Use of comparative assessment tools"}, "answer": "B", "rationale": "Diverse learners require diverse methods – differentiated instruction addresses cultural diversity effectively ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 53, "question": "Which of the following shows the teacher's respect for human dignity?", "options": {"A": "Practicing diligence and industry", "B": "Using social media", "C": "Joining professional associations", "D": "Working with people of different views"}, "answer": "D", "rationale": "Respecting human dignity means accepting and working with people holding different beliefs and perspectives ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 54, "question": "Teachers often complain of numerous non-teaching assignments. Does this mean teachers must be preoccupied only with teaching?", "options": {"A": "No, because to lead in community activities is the job of elected officials", "B": "Yes, because teaching is more than enough full time job", "C": "No, because every teacher is expected to provide leadership in activities for community betterment", "D": "Yes, if given other assignments, justice demands proper compensation"}, "answer": "C", "rationale": "The Code of Ethics expects teachers to provide leadership and initiative for community development beyond classroom teaching ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 55, "question": "To what is the Tyler Model of curriculum evaluation focused on?", "options": {"A": "Assessment results", "B": "Responsiveness of students", "C": "Instructional effectiveness", "D": "Curriculum objectives"}, "answer": "D", "rationale": "Tyler's model evaluates curriculum based on whether stated objectives were achieved ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 56, "question": "Which approach was used in teaching Science and Math before the K-12 Curriculum Reform?", "options": {"A": "Constructivist", "B": "Child-centered", "C": "Integrative", "D": "Discipline-based"}, "answer": "D", "rationale": "Pre-K-12 curriculum used discipline-based approach where subjects were taught separately ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 57, "question": "What kind of teaching-learning approach is adopted in teaching the same major subjects (English, Math, Science) in the K-to-12 curriculum?", "options": {"A": "Redundant teaching-learning", "B": "Higher order thinking teaching-learning", "C": "Differentiated teaching-learning", "D": "Spiral teaching-learning"}, "answer": "D", "rationale": "K-12 uses spiral progression – same topics revisited with increasing complexity across grade levels ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 58, "question": "As every teacher is a curricularist, what is the teacher's role in teaching along the curricular program of schools?", "options": {"A": "As evaluator", "B": "As implementer", "C": "As writer", "D": "As knower"}, "answer": "B", "rationale": "The teacher primarily implements the curriculum in the classroom ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 59, "question": "With PPST as guide, an ideal learning environment should have the following characteristic, EXCEPT:", "options": {"A": "The learning environment promotes fairness", "B": "Build many professional linkages", "C": "Establishes and maintains consistent standards of learner's behavior", "D": "Is safe and conducive for learning"}, "answer": "B", "rationale": "While professional linkages are important, they are not a direct characteristic of the learning environment itself ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 60, "question": "According to RA 10533 (Enhanced Basic Education Act of 2013), which language is the medium of instruction from K to 3?", "options": {"A": "Mother Tongue of the learners", "B": "The language chosen by parents", "C": "The language chosen by the school", "D": "English as official language"}, "answer": "A", "rationale": "RA 10533 mandates Mother Tongue-Based Multilingual Education (MTB-MLE) from Kindergarten to Grade 3 ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 61, "question": "Which of the following activities can guide student low-performance to achieve learning outcomes?", "options": {"A": "Lecturing", "B": "Mentoring", "C": "Demonstrating", "D": "Testing"}, "answer": "B", "rationale": "Mentoring provides personalized guidance and support for struggling students ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 62, "question": "Which of the following follows the principle of involving more senses for effective teaching-learning?", "options": {"A": "Rubrics assessment", "B": "Lecture lesson delivery", "C": "Multi-media presentation", "D": "Demonstration of skills"}, "answer": "C", "rationale": "Multi-media presentation engages multiple senses (visual, auditory), enhancing learning retention ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 63, "question": "What is a concrete instance of flexible learning?", "options": {"A": "Basic Education Curriculum initiative", "B": "Early childhood education program", "C": "Online learning during a pandemic", "D": "K-to-12 education approach"}, "answer": "C", "rationale": "Flexible learning adapts to learner needs and contexts – online learning during pandemic is a clear example ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 64, "question": "Who is the prime mover of the educational wheel in the teaching-learning process?", "options": {"A": "Teacher", "B": "Learner", "C": "Parent", "D": "Community"}, "answer": "B", "rationale": "The learner is central – all educational efforts revolve around the learner's development ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 65, "question": "The promulgation of the Code of Ethics for Professional Teachers under Resolution 435 of the PRC expressly covers teachers in all educational institutions at the following levels, and implicitly at the:", "options": {"A": "Preschool and primary", "B": "Secondary", "C": "Elementary", "D": "Tertiary level"}, "answer": "D", "rationale": "While the Code explicitly covers basic education, it implicitly applies to tertiary level teachers as professionals ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 66, "question": "In the context of 21st-century education, teachers and learners are branded as digital immigrants and digital natives respectively. How will you differentiate them?", "options": {"A": "Thinking style: Teachers think randomly, learners sequentially", "B": "Learning perspective: Teachers prefer experiencing, learners prefer intellectualizing", "C": "Use of senses: Teachers use emotion/touch, learners use hearing/seeing", "D": "Manner of response: Teachers tend to reflect, learners usually react"}, "answer": "D", "rationale": "Digital natives (learners) react quickly; digital immigrants (teachers) tend to reflect before responding ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 67, "question": "The following are contexts of 21st-century education as a paradigm shift from the 20th century, EXCEPT:", "options": {"A": "Outcome-based", "B": "Time-based", "C": "Performance-based", "D": "Student-centered"}, "answer": "B", "rationale": "21st-century education is outcome-based, not time-based; seat time is no longer the primary measure ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 68, "question": "The following refer to implications of 21st-century education for teachers EXCEPT:", "options": {"A": "Teachers must maintain students' interest by connecting learning to real world", "B": "Teachers must instill curiosity fundamental to lifelong learning", "C": "Teachers must be consistent in how they teach", "D": "Teachers must excite learners to become resourceful beyond formal school"}, "answer": "C", "rationale": "Rigid consistency contradicts 21st-century flexibility; teachers must adapt to diverse learner needs ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 69, "question": "The new breed of teachers takes advantage of technology enabling them to understand, integrate, create, communicate, and compute printed and written materials. Which best describes the 21st-century teacher?", "options": {"A": "Multiliterate", "B": "Multispecialist", "C": "Multiskilled", "D": "Multitasked"}, "answer": "A", "rationale": "Multiliterate teachers can use multiple forms of literacy – traditional, digital, media, and technological ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 70, "question": "The lesson presented must respond to learners' life survival today and career preparation for the future. This implies which critical attribute of 21st-century education?", "options": {"A": "Integrated and Interdisciplinary", "B": "Technologies and Multimedia", "C": "Global classrooms", "D": "Relevant and Real World"}, "answer": "D", "rationale": "Relevance to real life and career preparation is a core attribute of 21st-century education ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 71, "question": "The design of tracks and strands in senior high school that stresses exit competencies strongly adheres to which 21st-century skill category?", "options": {"A": "Learning and Innovation", "B": "Information, Media and Technology", "C": "Life and Career", "D": "Leadership and Responsibility"}, "answer": "C", "rationale": "Life and Career skills prepare students for workforce readiness and career success ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 72, "question": "To attain 21st-century skills among learners, which approach comes LAST when arranged by effectiveness?", "options": {"A": "Bring learners to the real world where action is", "B": "Expose them to research and inquiry-based modalities using technologies", "C": "Provide them with information on direct instruction principles", "D": "Guide them in searching for truth and exploring their own learning"}, "answer": "C", "rationale": "Direct instruction (lecture) is least effective for 21st-century skills; experiential and inquiry-based approaches are more effective ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 73, "question": "The teacher instills the Filipino value of respect for the elderly shown through provisions of spaces, discounts, and prioritization. What literacy is being implied?", "options": {"A": "Multicultural literacy", "B": "Social literacy", "C": "Financial literacy", "D": "Media literacy"}, "answer": "B", "rationale": "Social literacy involves understanding social values, norms, and responsible social behavior ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 74, "question": "The K to 12 curriculum aims at raising quality of Filipino learners while empowering lifelong learning requiring functional literacy. Which is NOT a perspective of this curriculum?", "options": {"A": "Providing more focus on total learning areas toward metacognitive skills", "B": "Implementing a unidisciplinary approach in treating every facet of the curriculum", "C": "Providing experiential learning areas applying knowledge and life skills", "D": "Making values development integral across disciplines"}, "answer": "B", "rationale": "K-12 uses interdisciplinary approaches, not unidisciplinary (single-subject isolation) ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 75, "question": "When you receive a suspicious e-mail asking you to withdraw money from a bank upon winning a raffle you never joined, what is your first and immediate move?", "options": {"A": "Ignore the email, do not open and delete it right away", "B": "Take the email and verify it to the concerned bank and relevant agencies", "C": "Contact the email owner to discuss the message content", "D": "Take the email and transact immediately, no harm in trying"}, "answer": "A", "rationale": "Cybersecurity best practice – delete suspicious emails without opening to avoid phishing scams ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 76, "question": "To develop the competency \"effectively analyze and evaluate evidence, arguments, claims, and beliefs,\" which teaching strategies should be employed? (Socio-drama, Dilemma, Jury trial, Parliamentary procedure)", "options": {"A": "I and II only", "B": "I, II, and III", "C": "II, III, and IV", "D": "I, II, III, and IV"}, "answer": "D", "rationale": "All four strategies develop critical thinking and argument analysis skills ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 77, "question": "Which is the most recommended mode of instructional delivery today that addresses gaps on distance to increase learning opportunities?", "options": {"A": "Modular Approach", "B": "Blended Learning", "C": "Internet-based", "D": "Face-to-face meeting"}, "answer": "B", "rationale": "Blended learning combines face-to-face and online modalities, addressing distance and access gaps ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 78, "question": "Which is the most appropriate assessment technique for \"Solve problems in both conventional and innovative ways as a 21st-century skill\"?", "options": {"A": "Students make a research capstone on developing a system to reduce traffic", "B": "Students answer an essay on \"A Solution to Graft and Corruption\"", "C": "Students critique a documentary film on solutions to conflict", "D": "Students answer a survey questionnaire on problem-solving skill assessment"}, "answer": "A", "rationale": "Research capstone requires authentic, innovative problem-solving – demonstrating both conventional and creative approaches ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 79, "question": "Pictures, models, and visual aids should be presented in which part of the lesson?", "options": {"A": "Initiating activities", "B": "Culminating activities", "C": "Evaluation activities", "D": "Developmental activities"}, "answer": "A", "rationale": "Visual aids are most effective during initiating activities to capture attention and activate prior knowledge ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 80, "question": "Which teaching method is most appropriate when students could not find information about a specific topic?", "options": {"A": "Project method", "B": "Discovery approach", "C": "Lecture method", "D": "Demonstration method"}, "answer": "C", "rationale": "When information is unavailable to students, direct lecture can efficiently provide necessary content ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 81, "question": "What does a difficulty index of 0.00 indicate?", "options": {"A": "Very easy item", "B": "Very difficult item", "C": "Average difficulty", "D": "Perfect discrimination"}, "answer": "B", "rationale": "Difficulty index of 0.00 means no examinee answered correctly – extremely difficult item."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 82, "question": "A discrimination index of +0.80 indicates:", "options": {"A": "Excellent discrimination", "B": "Poor discrimination", "C": "Negative discrimination", "D": "Zero discrimination"}, "answer": "A", "rationale": "+0.80 is excellent discrimination – effectively distinguishes high from low performers."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 83, "question": "Which assessment method is best for measuring psychomotor skills?", "options": {"A": "Paper-pencil test", "B": "Observation with checklist", "C": "Oral examination", "D": "Essay test"}, "answer": "B", "rationale": "Psychomotor skills require direct observation and demonstration, not written tests."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 84, "question": "The principle of \"primacy and recency\" suggests that learners remember best:", "options": {"A": "Information presented in the middle of the lesson", "B": "Information presented at the beginning and end", "C": "Information presented randomly", "D": "Information presented only once"}, "answer": "B", "rationale": "Primacy (beginning) and recency (end) effects show best retention of first and last information presented."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 85, "question": "Which is an example of a performance-based assessment?", "options": {"A": "Multiple choice test", "B": "True-False quiz", "C": "Science experiment demonstration", "D": "Matching type test"}, "answer": "C", "rationale": "Performance-based assessment requires actual demonstration of skills, not selecting answers."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 86, "question": "Teacher B uses a scoring rubric to grade student projects. What type of rubric assesses each criterion separately?", "options": {"A": "Holistic rubric", "B": "Analytic rubric", "C": "Generic rubric", "D": "Task-specific rubric"}, "answer": "B", "rationale": "Analytic rubrics evaluate each criterion independently, providing specific feedback on each component."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 87, "question": "Which is NOT a characteristic of authentic assessment?", "options": {"A": "Requires real-world application", "B": "Emphasizes product and process", "C": "Uses multiple choice items", "D": "Encourages integration of knowledge"}, "answer": "C", "rationale": "Authentic assessment rarely uses multiple choice – it requires demonstration of real-world skills."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 88, "question": "What does the \"T\" in SMART objectives stand for?", "options": {"A": "True", "B": "Traditional", "C": "Time-bound", "D": "Tabulated by objectives"}, "answer": "C", "rationale": "SMART objectives are Specific, Measurable, Attainable, Relevant, and Time-bound ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 89, "question": "What does the \"A\" in SMART objectives stand for?", "options": {"A": "Active", "B": "Achievement", "C": "Attainable", "D": "Advisable"}, "answer": "C", "rationale": "A in SMART stands for Attainable (or Achievable) – realistic within available resources ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 90, "question": "Teacher Mac recognizes that learners have strong sensual feelings, so she explores the learner's:", "options": {"A": "Pleasure Values", "B": "Values of the Holy", "C": "Spiritual Values", "D": "Vital Values"}, "answer": "A", "rationale": "Pleasure values relate to sensual and aesthetic experiences important to learners ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 91, "question": "The highest level in the life of a professional teacher as given in the PPST is:", "options": {"A": "Model", "B": "Distinguished", "C": "Most Proficient", "D": "Highly Proficient"}, "answer": "B", "rationale": "Distinguished is the highest career stage in PPST ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 92, "question": "Which is/are TRUE of a professional?", "options": {"A": "Completed college/university degree", "B": "Required NC IV from TESDA", "C": "Demonstrate solely ethical competence", "D": "Abides by personal Code of Ethics"}, "answer": "A", "rationale": "A professional must complete a college degree and pass licensure requirements ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 93, "question": "What principle was NOT applied when teacher Rita made no introductory orientation of lessons in the curriculum agenda?", "options": {"A": "Giving a pre-test and post-test for lessons", "B": "Preparing students to be quiet", "C": "Preparing instructional tools", "D": "Connecting present to previous lessons"}, "answer": "D", "rationale": "Connecting present to previous lessons activates prior knowledge – a crucial principle violated by skipping introduction ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 94, "question": "Which topics are appropriate for inviting a barangay chairman to share ideas with students and teachers?", "options": {"A": "Tips on health and nutritional care", "B": "Organizing a school sports tournament", "C": "Community development and local governance", "D": "Teaching strategies for teachers"}, "answer": "C", "rationale": "Barangay chairmen are experts in community development and local governance ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 95, "question": "What factor should Teacher Julie be careful about when teaching in a school for children in a poverty-stricken slum area?", "options": {"A": "Children's socio-economic status", "B": "Children's beliefs", "C": "Children's ethnicity", "D": "Children's race"}, "answer": "A", "rationale": "Socio-economic status affects resources, nutrition, and home support – teachers must be sensitive to these factors ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 96, "question": "Why are routines helpful for class management?", "options": {"A": "To eliminate stress", "B": "To ensure order", "C": "To punish offenders", "D": "To reward performers"}, "answer": "B", "rationale": "Routines establish predictable patterns that maintain classroom order and efficiency ."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 97, "question": "What is the primary purpose of classroom management?", "options": {"A": "To control student behavior", "B": "To maximize learning time", "C": "To punish misbehavior", "D": "To please administrators"}, "answer": "B", "rationale": "Classroom management aims to create conditions that maximize time for learning."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 98, "question": "Teacher G uses positive reinforcement to increase desired behaviors. Which theorist supports this practice?", "options": {"A": "Piaget", "B": "Vygotsky", "C": "Skinner", "D": "Bandura"}, "answer": "C", "rationale": "Skinner's operant conditioning emphasizes reinforcement to strengthen behaviors."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 99, "question": "A student cheated on a test. The teacher confiscates the paper and gives a zero. This is an example of:", "options": {"A": "Positive reinforcement", "B": "Negative reinforcement", "C": "Positive punishment", "D": "Negative punishment"}, "answer": "C", "rationale": "Adding an unpleasant consequence (zero) to decrease behavior is positive punishment."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 100, "question": "Teacher H allows students to choose their own research topics. This practice is based on which motivational theory?", "options": {"A": "Extrinsic motivation", "B": "Intrinsic motivation", "C": "Incentive theory", "D": "Drive reduction theory"}, "answer": "B", "rationale": "Choice and autonomy increase intrinsic motivation (self-determination theory)."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 101, "question": "The concept of \"scaffolding\" was introduced by:", "options": {"A": "Jean Piaget", "B": "Jerome Bruner", "C": "Lev Vygotsky", "D": "John Dewey"}, "answer": "C", "rationale": "Scaffolding is Vygotsky's concept of providing temporary support within ZPD."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 102, "question": "According to Erikson, adolescents face which psychosocial crisis?", "options": {"A": "Industry vs. Inferiority", "B": "Identity vs. Role Confusion", "C": "Intimacy vs. Isolation", "D": "Generativity vs. Stagnation"}, "answer": "B", "rationale": "Identity vs. Role Confusion is the crisis during adolescence (12-18 years)."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 103, "question": "Which statement about development is TRUE?", "options": {"A": "Development is solely determined by heredity", "B": "Development is solely determined by environment", "C": "Development results from heredity and environment interaction", "D": "Development ends after adolescence"}, "answer": "C", "rationale": "Development is shaped by nature (heredity) and nurture (environment) interacting."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 104, "question": "Teacher A uses cooperative learning structures. This approach is based on which learning theory?", "options": {"A": "Behaviorism", "B": "Social constructivism", "C": "Radical behaviorism", "D": "Information processing"}, "answer": "B", "rationale": "Social constructivism (Vygotsky) emphasizes learning through social interaction and collaboration."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 105, "question": "Which is an example of a metacognitive strategy?", "options": {"A": "Memorizing definitions", "B": "Self-questioning while reading", "C": "Repeating information aloud", "D": "Copying notes"}, "answer": "B", "rationale": "Self-questioning involves monitoring one's own understanding – a metacognitive strategy."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 106, "question": "The concept of \"multiple intelligences\" was proposed by:", "options": {"A": "B.F. Skinner", "B": "Howard Gardner", "C": "Jean Piaget", "D": "Lev Vygotsky"}, "answer": "B", "rationale": "Howard Gardner proposed Theory of Multiple Intelligences (1983)."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 107, "question": "A teacher uses a variety of activities addressing different intelligences. This practice aligns with:", "options": {"A": "Behaviorism", "B": "Multiple Intelligences Theory", "C": "Social Learning Theory", "D": "Information Processing Theory"}, "answer": "B", "rationale": "Gardner's theory directly supports addressing multiple intelligences through varied activities."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 108, "question": "Which learning style prefers hands-on activities and physical movement?", "options": {"A": "Visual", "B": "Auditory", "C": "Kinesthetic", "D": "Reading/Writing"}, "answer": "C", "rationale": "Kinesthetic learners learn best through physical movement and hands-on activities."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 109, "question": "Teacher F uses advance organizers before presenting new content. This is based on whose theory?", "options": {"A": "David Ausubel", "B": "Jerome Bruner", "C": "Robert Gagné", "D": "Jean Piaget"}, "answer": "A", "rationale": "Ausubel's meaningful learning theory emphasizes advance organizers to connect new with existing knowledge."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 110, "question": "The \"information processing model\" compares human memory to:", "options": {"A": "A computer", "B": "A telephone", "C": "A television", "D": "A radio"}, "answer": "A", "rationale": "Information processing model uses computer analogy – input, processing, storage, output."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 111, "question": "Which memory store holds information for less than one second?", "options": {"A": "Short-term memory", "B": "Long-term memory", "C": "Sensory memory", "D": "Working memory"}, "answer": "C", "rationale": "Sensory memory briefly holds sensory information (iconic 0.5 sec, echoic 3-4 sec)."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 112, "question": "What is the typical capacity of short-term memory?", "options": {"A": "3 +/- 1 items", "B": "5 +/- 2 items", "C": "7 +/- 2 items", "D": "10 +/- 2 items"}, "answer": "C", "rationale": "Miller's Magic Number – short-term memory holds approximately 7±2 chunks of information."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 113, "question": "\"Chunking\" is a strategy to:", "options": {"A": "Increase sensory memory", "B": "Expand short-term memory capacity", "C": "Improve long-term retrieval", "D": "Enhance working speed"}, "answer": "B", "rationale": "Chunking groups information into meaningful units, expanding effective short-term memory capacity."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 114, "question": "Which teaching strategy best promotes transfer of learning?", "options": {"A": "Rote memorization", "B": "Isolated skill drills", "C": "Teaching concepts in multiple contexts", "D": "Single example demonstration"}, "answer": "C", "rationale": "Teaching in multiple contexts helps learners apply knowledge to varied situations (transfer)."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 115, "question": "According to Thorndike's Law of Effect, behaviors followed by satisfying consequences are:", "options": {"A": "Eliminated", "B": "Strengthened", "C": "Weakened", "D": "Unchanged"}, "answer": "B", "rationale": "Law of Effect – satisfying consequences strengthen (reinforce) behavior."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 116, "question": "Which is an application of Thorndike's Law of Exercise?", "options": {"A": "Providing immediate feedback", "B": "Repeating and practicing skills", "C": "Making lessons interesting", "D": "Setting challenging goals"}, "answer": "B", "rationale": "Law of Exercise states practice strengthens learning connections."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 117, "question": "Teacher C provides immediate feedback on student performance. This applies:", "options": {"A": "Law of Readiness", "B": "Law of Exercise", "C": "Law of Effect", "D": "Law of Primacy"}, "answer": "C", "rationale": "Immediate feedback serves as satisfying consequence, strengthening correct responses."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 118, "question": "According to Bandura, which is essential for observational learning?", "options": {"A": "Reinforcement only", "B": "Punishment only", "C": "Attention to model", "D": "Direct experience"}, "answer": "C", "rationale": "Attention is first and essential step in Bandura's observational learning process."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 119, "question": "Which is NOT a stage in Bandura's observational learning?", "options": {"A": "Attention", "B": "Retention", "C": "Motivation", "D": "Punishment"}, "answer": "D", "rationale": "Stages are Attention, Retention, Reproduction, and Motivation – punishment is not a stage."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 120, "question": "A teacher models problem-solving steps while students observe. This is:", "options": {"A": "Discovery learning", "B": "Observational learning", "C": "Inquiry learning", "D": "Experiential learning"}, "answer": "B", "rationale": "Learning by observing and imitating a model is observational learning (Bandura)."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 121, "question": "Which is an example of intrinsic reinforcement?", "options": {"A": "Receiving a gold star", "B": "Getting a high grade", "C": "Feeling proud of one's work", "D": "Receiving praise"}, "answer": "C", "rationale": "Intrinsic reinforcement comes from within – satisfaction, pride, enjoyment of task."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 122, "question": "Teacher D uses verbal praise to reinforce student participation. This is:", "options": {"A": "Intrinsic reinforcement", "B": "Extrinsic reinforcement", "C": "Primary reinforcement", "D": "Negative reinforcement"}, "answer": "B", "rationale": "Praise is external reward – extrinsic reinforcement."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 123, "question": "According to Maslow, which need must be met before a student can focus on learning?", "options": {"A": "Self-actualization", "B": "Esteem needs", "C": "Physiological needs", "D": "Cognitive needs"}, "answer": "C", "rationale": "Basic physiological needs (hunger, thirst, sleep) are lowest hierarchy level – must be met first."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 124, "question": "Which classroom practice addresses students' belongingness needs?", "options": {"A": "Competitive grading", "B": "Individual seating", "C": "Cooperative learning groups", "D": "Independent study"}, "answer": "C", "rationale": "Cooperative learning creates social connection and belongingness."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 125, "question": "Teacher E creates a warm, accepting classroom climate. This addresses which level of Maslow's hierarchy?", "options": {"A": "Safety needs", "B": "Belongingness needs", "C": "Esteem needs", "D": "Self-actualization"}, "answer": "B", "rationale": "Warm, accepting environment meets belongingness and love needs."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 126, "question": "According to Glasser's Choice Theory, which is a basic psychological need?", "options": {"A": "Food and water", "B": "Power and freedom", "C": "Sleep and rest", "D": "Oxygen and shelter"}, "answer": "B", "rationale": "Glasser's five basic needs: Survival, Love/Belonging, Power, Freedom, Fun."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 127, "question": "Thematic Apperception Test (TAT) is what type of assessment?", "options": {"A": "Objective personality test", "B": "Projective technique", "C": "Intelligence test", "D": "Achievement test"}, "answer": "B", "rationale": "TAT uses ambiguous pictures to project unconscious feelings – projective technique."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 128, "question": "Rorschach Inkblot Test is also a:", "options": {"A": "Self-report inventory", "B": "Projective technique", "C": "Interest inventory", "D": "Aptitude test"}, "answer": "B", "rationale": "Rorschach uses inkblots to assess personality through projection."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 129, "question": "Which is NOT a projective technique?", "options": {"A": "TAT", "B": "Rorschach", "C": "Draw-a-Person", "D": "Likert Scale"}, "answer": "D", "rationale": "Likert Scale is a self-report rating scale, not projective."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 130, "question": "A student consistently misbehaves to gain teacher attention. This is an example of:", "options": {"A": "Revenge-seeking", "B": "Power-seeking", "C": "Attention-getting", "D": "Withdrawal"}, "answer": "C", "rationale": "Dreikurs' mistaken goal – attention-getting behavior seeks recognition."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 131, "question": "A student refuses to participate, claiming \"I can't do anything right.\" This is:", "options": {"A": "Attention-getting", "B": "Power-seeking", "C": "Revenge-seeking", "D": "Withdrawal"}, "answer": "D", "rationale": "Withdrawal (assumed inadequacy) – student gives up to avoid further failure."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 132, "question": "According to Dreikurs, how should teachers respond to power-seeking behavior?", "options": {"A": "Give attention", "B": "Withdraw from conflict", "C": "Punish severely", "D": "Ignore completely"}, "answer": "B", "rationale": "Withdrawing from power struggles avoids reinforcing the behavior."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 133, "question": "Which is NOT a component of Positive Discipline?", "options": {"A": "Being firm and kind", "B": "Punishment as first resort", "C": "Long-term effectiveness", "D": "Teaching life skills"}, "answer": "B", "rationale": "Positive Discipline avoids punishment as first resort, focusing on teaching."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 134, "question": "Teacher J uses class meetings to solve problems. This approach is associated with:", "options": {"A": "Skinner", "B": "Glasser", "C": "Piaget", "D": "Vygotsky"}, "answer": "B", "rationale": "Glasser's Reality Therapy and Choice Theory emphasize class meetings."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 135, "question": "Which is the best way to handle a student's chronic tardiness?", "options": {"A": "Public humiliation", "B": "After-school detention", "C": "Problem-solving conference", "D": "Suspension"}, "answer": "C", "rationale": "Problem-solving conference addresses underlying causes respectfully."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 136, "question": "Teacher K allows students to evaluate their own performance. This develops:", "options": {"A": "Dependency", "B": "Self-regulation", "C": "Competition", "D": "Anxiety"}, "answer": "B", "rationale": "Self-evaluation develops self-regulation and metacognitive skills."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 137, "question": "Which assessment type compares student performance to predetermined standards?", "options": {"A": "Norm-referenced", "B": "Criterion-referenced", "C": "Ipsative", "D": "Standardized"}, "answer": "B", "rationale": "Criterion-referenced compares to mastery standards, not other students."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 138, "question": "National Achievement Test (NAT) is an example of:", "options": {"A": "Criterion-referenced test", "B": "Norm-referenced test", "C": "Diagnostic test", "D": "Aptitude test"}, "answer": "A", "rationale": "NAT measures achievement against content standards – criterion-referenced."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 139, "question": "A percentile rank of 75 means the student scored:", "options": {"A": "75% of items correct", "B": "Better than 75% of examinees", "C": "Worse than 75% of examinees", "D": "75th item correctly"}, "answer": "B", "rationale": "Percentile rank indicates percentage of examinees scored below."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 140, "question": "Which measure of central tendency is most affected by extreme scores?", "options": {"A": "Mean", "B": "Median", "C": "Mode", "D": "Range"}, "answer": "A", "rationale": "Mean uses all scores – extreme values pull mean away from center."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 141, "question": "Which measure of variability is easiest to compute?", "options": {"A": "Standard deviation", "B": "Variance", "C": "Range", "D": "Interquartile range"}, "answer": "C", "rationale": "Range (highest minus lowest) is simplest to compute."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 142, "question": "A test with KR-20 reliability coefficient of 0.85 is considered:", "options": {"A": "Unreliable", "B": "Moderately reliable", "C": "Highly reliable", "D": "Perfectly reliable"}, "answer": "C", "rationale": "0.85 indicates high reliability (acceptable range 0.70-0.90)."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 143, "question": "Which type of validity is most important for a teacher-made achievement test?", "options": {"A": "Construct validity", "B": "Content validity", "C": "Concurrent validity", "D": "Predictive validity"}, "answer": "B", "rationale": "Content validity ensures test covers taught material – essential for achievement tests."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 144, "question": "A test has concurrent validity if it:", "options": {"A": "Predicts future performance", "B": "Correlates with another established test", "C": "Measures theoretical construct", "D": "Covers all content areas"}, "answer": "B", "rationale": "Concurrent validity correlates with another measure of same trait given simultaneously."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 145, "question": "Which is the first step in test construction?", "options": {"A": "Writing test items", "B": "Preparing Table of Specifications", "C": "Administering the test", "D": "Scoring the test"}, "answer": "B", "rationale": "TOS ensures content validity and guides item writing."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 146, "question": "A Table of Specifications ensures:", "options": {"A": "Test reliability", "B": "Test objectivity", "C": "Content validity", "D": "Test usability"}, "answer": "C", "rationale": "TOS aligns test items with content and objectives – ensuring content validity."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 147, "question": "Item analysis provides information about:", "options": {"A": "Test validity only", "B": "Item difficulty and discrimination", "C": "Test reliability only", "D": "Student attitudes"}, "answer": "B", "rationale": "Item analysis yields difficulty index and discrimination index for each item."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 148, "question": "A test item with difficulty index of 0.50 is considered:", "options": {"A": "Very difficult", "B": "Very easy", "C": "Ideal difficulty", "D": "Too easy"}, "answer": "C", "rationale": "0.50 is ideal – half of examinees answer correctly."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 149, "question": "What is the ideal discrimination index range?", "options": {"A": "Below 0.20", "B": "0.20 to 0.29", "C": "0.30 to 0.39", "D": "0.40 and above"}, "answer": "D", "rationale": "0.40 and above indicates excellent discrimination."}, {"set": "SET B: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 150, "question": "When revising a test item with negative discrimination, the teacher should:", "options": {"A": "Keep the item unchanged", "B": "Increase its difficulty", "C": "Analyze and revise or discard", "D": "Make it more complex"}, "answer": "C", "rationale": "Negative discrimination means item functions poorly – needs revision or removal."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 1, "question": "A branch of Psychology that studies how people grow and change throughout the course of their lives is _______________.", "options": {"A": "Social psychology", "B": "Biological Psychology", "C": "Developmental Psychology", "D": "Behavioral Psychology"}, "answer": "C", "rationale": "Developmental Psychology specifically focuses on human growth and changes across the lifespan, from conception to death ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 2, "question": "The term for the developing organism from 2 weeks to 8 weeks of conception is:", "options": {"A": "Zygote", "B": "Fetus", "C": "Embryo", "D": "Chromosomes"}, "answer": "C", "rationale": "The embryonic period spans from 2 to 8 weeks after conception, during which major organs and body systems begin to form ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 3, "question": "A developmental issue concerned with whether an individual is a product of his/her genes or of his/her culture is called:", "options": {"A": "Prenatal and postnatal", "B": "Nature and nurture", "C": "Continuity and stage", "D": "Stability and change"}, "answer": "B", "rationale": "The nature-nurture debate examines whether genetics (nature) or environment/culture (nurture) primarily shapes human development ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 4, "question": "Which principle is NOT TRUE about development?", "options": {"A": "Development is a function of nature and nurture", "B": "Development occurs at different rates", "C": "Development occurs in a predictable manner", "D": "Development occurs in an unpredictable manner"}, "answer": "D", "rationale": "Development follows predictable patterns and sequences, though individual rates may vary ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 5, "question": "During a counseling session, the student expressed distress in getting low scores because she feels that she has been doing her part in studying but still finds it hard to memorize for exams. What factor may have contributed to this?", "options": {"A": "Environment", "B": "Study habits", "C": "Heredity", "D": "None of the above"}, "answer": "C", "rationale": "Difficulty in memorization despite effort may be influenced by hereditary factors affecting cognitive processing and memory capacity ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 6, "question": "In which way does heredity affect the development of the learner?", "options": {"A": "By providing equal potential to all", "B": "By placing limits beyond which the learner cannot develop", "C": "By compensating for what environment fails to develop", "D": "By making acquired traits hereditary"}, "answer": "B", "rationale": "Heredity sets biological limits or ranges within which development can occur, though environment determines where within that range an individual falls ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 7, "question": "It is the brain's ability to change from experience:", "options": {"A": "Learning", "B": "Growth", "C": "Tabula rasa", "D": "Plasticity"}, "answer": "D", "rationale": "Neuroplasticity refers to the brain's capacity to reorganize and form new neural connections in response to learning and experience ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 8, "question": "It refers to an individual's bodily change in size and structure:", "options": {"A": "Maturation", "B": "Learning", "C": "Growth", "D": "Development"}, "answer": "C", "rationale": "Growth specifically refers to quantitative physical changes in size, height, weight, and bodily structure ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 9, "question": "Developmental changes due to aging is called:", "options": {"A": "Maturation", "B": "Learning", "C": "Growth", "D": "Development"}, "answer": "A", "rationale": "Maturation refers to the natural unfolding of biological changes programmed by genetics, independent of learning or experience ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 10, "question": "The degradation of synapses and dying off of neurons that are not strengthened by experience is called:", "options": {"A": "Retardation", "B": "Pruning", "C": "Forgetting", "D": "Aging"}, "answer": "B", "rationale": "Synaptic pruning eliminates unused neural connections to increase efficiency of frequently used pathways ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 11, "question": "Studies in the area of neurosciences disclosed that the human brain has limitless capacity. What does this imply?", "options": {"A": "Pupils can possibly reach a point where they have learned everything", "B": "Every child is a potential genius", "C": "Some pupils are admittedly not capable of learning", "D": "Every pupil has his own native ability and his learning is limited to this native ability"}, "answer": "B", "rationale": "The brain's neuroplasticity and limitless capacity suggest all children have high learning potential when properly stimulated ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 12, "question": "Which statement on IQ and EQ is correct?", "options": {"A": "EQ has greater contribution to performance than IQ", "B": "It is the blending of both IQ and EQ that can make a difference in performance", "C": "The contribution of IQ and EQ to performance is dependent on factors like age and gender", "D": "IQ has a greater contribution to performance than EQ"}, "answer": "B", "rationale": "Research shows both cognitive and emotional intelligence work together to predict success and performance outcomes ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 13, "question": "It was noticed by the mother that her 6 month-old child no longer cries when left in the room. What was developed by the child?", "options": {"A": "A feeling of trust", "B": "Independence", "C": "Object permanence", "D": "Initiative"}, "answer": "C", "rationale": "Object permanence – understanding that objects/people continue to exist when out of sight – develops around 6-8 months, reducing separation anxiety ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 14, "question": "During the first day of school, crying children are a common sight especially in the pre-school department. What explains this?", "options": {"A": "Object permanence", "B": "Stranger shyness", "C": "Separation anxiety", "D": "Egocentrism"}, "answer": "B", "rationale": "Stranger anxiety/shyness is a normal developmental phase where children show distress around unfamiliar people ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 15, "question": "According to the Universal Declaration of Human Rights, what are the three fundamental human rights?", "options": {"A": "Life, liberty and security", "B": "Life, dignity and security", "C": "Life, dignity and self-development", "D": "Life, liberty and self-development"}, "answer": "A", "rationale": "The Universal Declaration of Human Rights identifies the right to life, liberty, and security of person as fundamental human rights ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 16, "question": "Which is true about human rights?", "options": {"A": "Economic, social and cultural rights are not true rights", "B": "Human rights apply to everyone and are based on universal values", "C": "Human rights favor the status quo over social change", "D": "Human rights overemphasize rights over responsibilities"}, "answer": "B", "rationale": "Human rights are universal, inalienable, and based on shared global values applicable to all people regardless of status ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 17, "question": "Where are human rights for all peoples of the world enshrined?", "options": {"A": "Bill of Rights in the Constitution", "B": "Convention on the Elimination of all Forms of Discrimination Against Women", "C": "Universal Declaration of Human Rights", "D": "Magna Carta for Teachers"}, "answer": "C", "rationale": "The Universal Declaration of Human Rights (1948) is the foundational international document enshrining human rights for all peoples ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 18, "question": "Which among the following statements about Human Rights Education is correct?", "options": {"A": "Human Rights Education should focus more on rights based on \"law in books\" rather than \"law in real-life\"", "B": "HRE needs to focus on values, principles, standards of human rights and how they translate into day-to-day actions", "C": "HRE is more of the responsibilities of the state to implement human rights law rather than protection of rights holders", "D": "HRE is simply the exercise of legal rights of individuals"}, "answer": "B", "rationale": "Effective Human Rights Education emphasizes practical application of rights principles in daily life and actions ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 19, "question": "As stipulated in the 1987 Constitution, all educational institutions shall aim the following EXCEPT one. Which is the exception?", "options": {"A": "Encourage creative and critical thinking", "B": "Inculcate love for world class excellence", "C": "Foster respect for human rights", "D": "Develop appreciation of the role of national heroes"}, "answer": "B", "rationale": "The 1987 Constitution emphasizes critical thinking, human rights, and nationalism – but \"world class excellence\" is not explicitly stated as an aim ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 20, "question": "Which of the following is the first target of the Millennium Development Goals (MDGs)?", "options": {"A": "Achieve universal access to basic education", "B": "Reduce death due to HIV/AIDS and Malaria", "C": "Eradicate Extreme Poverty and Hunger", "D": "Ensure Environmental sustainability"}, "answer": "C", "rationale": "Eradicating extreme poverty and hunger was Goal 1 of the eight Millennium Development Goals ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 21, "question": "The basic value that is central to human rights education is:", "options": {"A": "Human diversity", "B": "Human dignity", "C": "Respect for individuality", "D": "Justice for all"}, "answer": "B", "rationale": "Human dignity is the foundational value upon which all human rights principles are built ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 22, "question": "John Dewey's major contributions to the sociological foundations of education are the following, EXCEPT:", "options": {"A": "School is a continuation of home; activities at home continue at school", "B": "Education is a social process beginning unconsciously at birth", "C": "\"True education\" is transmission of knowledge from the teacher to the learner", "D": "Facilitating education means being aware of the social condition of learners"}, "answer": "C", "rationale": "Dewey rejected the traditional view of education as mere knowledge transmission; he emphasized experiential, learner-centered education ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 23, "question": "Which of the following can be considered a form of civic engagement?", "options": {"A": "Patronizing Filipino products", "B": "Electoral participation", "C": "Red tape", "D": "Graft and Corruption"}, "answer": "B", "rationale": "Electoral participation (voting, campaigning) is a direct form of civic engagement in democratic processes ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 24, "question": "Which of the following is the political purpose of the school?", "options": {"A": "To foster patriotism and loyalty to the existing political order", "B": "To prepare every citizen for the world of work", "C": "To teach the basic cognitive skills", "D": "To familiarize every citizen of their various functions in society"}, "answer": "A", "rationale": "One of school's political functions is developing patriotic citizens loyal to and supportive of the political system ."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 25, "question": "Which developmental theory emphasizes that children actively construct knowledge through interaction with their environment?", "options": {"A": "Behaviorism", "B": "Social Learning Theory", "C": "Constructivism", "D": "Maturational Theory"}, "answer": "C", "rationale": "Piaget's constructivism posits that children actively build understanding through exploring and interacting with their world."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 26, "question": "According to Erikson, the psychosocial crisis during early childhood (ages 3-6) is:", "options": {"A": "Trust vs. Mistrust", "B": "Autonomy vs. Shame and Doubt", "C": "Initiative vs. Guilt", "D": "Industry vs. Inferiority"}, "answer": "C", "rationale": "Initiative vs. Guilt is the crisis where children begin asserting control and power over their environment during play years."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 27, "question": "A teacher who uses \"I-messages\" to express feelings without blaming students is applying which classroom management approach?", "options": {"A": "Assertive Discipline", "B": "Teacher Effectiveness Training", "C": "Positive Discipline", "D": "Reality Therapy"}, "answer": "B", "rationale": "Gordon's Teacher Effectiveness Training emphasizes \"I-messages\" as a non-blameful way to communicate concerns to students."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 28, "question": "According to Kohlberg, at which level of moral development do individuals follow rules to gain approval and maintain social order?", "options": {"A": "Pre-conventional", "B": "Conventional", "C": "Post-conventional", "D": "Universal ethical principle"}, "answer": "B", "rationale": "The Conventional level focuses on maintaining social order, following rules, and gaining approval from others."}, {"set": "SET C: 150 Multiple Choice Questions with Answer Key and Rationale", "num": 29, "question": "The \"Matthew Effect\" in education refers to:", "options": {"A": "Students helping each other learn", "B": "The rich getting richer and poor getting poorer in reading achievement", "C": "Equal distribution of educational resources", "D": "Competition among students"}, "answer": "B", "rationale": "The Matthew Effect describes how good readers improve while poor readers fall further behind – advantages accumulate."}, {"set": "SET C
